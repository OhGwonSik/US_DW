<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="fragments-mainContent">
	<main class="mobile-content tmp05">
		<div class="search-condition">
			<div class="row">
				<div class="condition-title col">
					<label for="inputGroupSelect02">[[#{tm.tmp.vhplnky}]]</label>
				</div>
				<div class="input-wrapper col">
					<div class="select-group">
						<input type="text" class="form-control" id="tmp07_vhplnky" disabled>
					</div>
				</div>
			</div>
			<div class="row">
				<div class="condition-title col">
					<label for="inputGroupSelect02">[[#{tm.tmp.vehicky}]]</label>
				</div>
				<div class="input-wrapper col">
					<div class="select-group">
						<select class="form-control" id="tmp07_vehicky" name="tmp07_vehicky">
							<option value ="">[[#{tm.tmp05.pltscan}]]</option>
						</select>
					</div>
				</div>
			</div>
			<div class="row">
				<div class="condition-title col">
					<button type="button" class="toggle-check" id="tmp07_toggle" value="check" disabled>[[#{tm.tmp05.saatc06}]]</button>
				</div>
				<div class="input-wrapper col">
					<input type="text" class="form-control" id="tmp07_input" name="tmp07_input">
				</div>
			</div>
			<div class="row">
				<button type="button" class="btn-clear btn-white col" id="tmp07_btnReset">[[#{bt.reset}]]</button>
				<button type="button" class="btn-save btn-main col" id="tmp07_btnSave">[[#{tm.tmp07.planCancle}]]</button>
			</div>
		</div>
		<div class="search-list flex-1">
			<div class="list-top align-center">
				<div class="list-title ic-title-mark" th:text="${gnatitle}"></div>
				<div class="list-text">
					<div id="tmp07_pallet">0</div>
					<div>[[#{tm.tmp.pallet}]]</div>
				</div>
			</div>
			<div class="table-wrapper con-box">
				<table class="mobile-table tmp05-table">
					<thead id="thtb">
						<tr>
							<th><input type="checkbox" id="tmp07TotalBox"></th>
							<th id="postdat" style="display: none">[[#{tm.tmp05.postdat}]]</th>
							<th id="vehicky" style="display: none">[[#{tm.tmp05.vehicky}]]</th>
							<th id="trnstat" style="display: none">[[#{tm.tmp05.trnstat}]]</th>
							<th id="saatc08">[[#{tm.tmp05.saatc08}]]</th>
							<th id="mintc10">[[#{tm.tmp05.mintc10}]]</th>
							<th id="maxtc10">[[#{tm.tmp05.maxtc10}]]</th>
							<th id="saatc06">[[#{tm.tmp05.saatc06}]]</th>
						</tr>
					</thead>
					<tbody class="table-body" id="tBody"></tbody>
				</table>
			</div>
		</div>
		<div class="spinner" id="tmp07Spinner"></div> 
	</main>
	<script>
		$(function() {
			const pageId = 'tmp07';
			let tmp07PltList;
			let tmpDestkey;
			let tmpVhplnky; // 배차계획번호
			let palletCnt = 0;

			//PDA니까 화면 처음 포커스 가게
			document.querySelector('#'+pageId+'_input').focus();
			
			//============================================================				
			//바코드 입력칸 포커스(가상 키보드 삭제)
			//============================================================	
			document.querySelector('#'+pageId+'_input').addEventListener('focus', async function(event) {
				document.querySelector('#'+pageId+'_input').setAttribute('inputmode', 'none');
			});
			//============================================================				
			//바코드 스캔시 키 입력이 될떄(가상 키보드 ON)
			//============================================================	
			document.querySelector('#'+pageId+'_input').addEventListener('keypress', async function(event) {
				document.querySelector('#'+pageId+'_input').removeAttribute('inputmode');
			});

			//============================================================
			//팔레트Num 입력시 있으면 해당 로우 체크 없으면 alert
			//============================================================
 			document.querySelector('#'+pageId+'_input').addEventListener('keyup', async function(){
 				if(event.keyCode === 13){
					const codeData = document.querySelector('#'+pageId+'_input').value;
 					const trObjs = document.querySelectorAll('#tBody tr');
 					
 					if(codeData.trim()){
 	 					if(trObjs.length){
 	 						
 	 	 					let matchCnt = 0;
 	 	 					
 	 						for(const trObj of trObjs){ //똑같은 상품이 있을 경우는 일단 패스
 	 							if(trObj.closest('tr').querySelector('.saatc06').innerHTML === codeData){
 	 								if(!trObj.closest('tr').querySelector('.checkbox').checked){
 	 	 								trObj.closest('tr').querySelector('.checkbox').checked = true;
 	 	 								rowCheckControl(trObj.closest('tr').querySelector('.checkbox'));
 	 								}
 	 								matchCnt++;
 	 							}
 	 						}
 	 						
 	 						if(!matchCnt){
 	 							alertOpen('[[#{ms.tmp05.unmacthplt}]]', function(){
 	 			 					document.querySelector('#'+pageId+'_input').value = '';
 	 			 					document.querySelector('#'+pageId+'_input').focus();
 	 							});
 	 						}
 	 	 				}else{
 	 	 	 				await getPltList();
 	 	 				}
	 				}
 					document.querySelector('#'+pageId+'_input').value = '';
 					document.querySelector('#'+pageId+'_input').focus();
 				}
			});

			//============================================================
			//초기화 버튼 클릭 시 검색 조건 초기화
			//============================================================
			$('#'+pageId+'_btnReset').click(function(){
				confirmOpen('[[#{ms.listViewRollback}]]', function(result){
					if(result){
						location.reload();
					}
					document.querySelector('#'+pageId+'_input').focus();
				});
			});
			//============================================================
			//상차 저장 버튼 클릭 시 검색 조건 초기화
			//============================================================
			$('#'+pageId+'_btnSave').click(async function(){
				const thObjs = document.querySelector('#thtb').querySelectorAll('th');
				const boxCheckedList = document.querySelector('#tBody').querySelectorAll('input[class*="checkbox"]:checked');
				const trTagList = Array.from(boxCheckedList).map(function(boxCheckedList){
					  return boxCheckedList.closest('tr');
				});

				if(!boxCheckedList.length){
					alertOpen('[[#{ms.wmp.noCheckList}]]', function(){
						document.querySelector('#'+pageId+'_input').focus();
					});
					return;
				}
				const keyArray = [];

				//체크박스떄문에 1부터 시작(키값 세팅)
				for(let i=1;i<thObjs.length;i++){
					keyArray.push(thObjs[i].getAttribute('id'));
				}
				let param;
				let tmp07SaveList = [];

				//키 : 벨류 형식 만들기
				for (const trTag of trTagList) {
				    param = {};
				    const tdList = trTag.querySelectorAll('td');

				    for (let j = 1; j < tdList.length; j++) {
				        param[keyArray[j - 1]] = tdList[j].innerHTML;
				    }
				    param['warekey'] = '[[${userattr.warekey}]]';
			    	param['vehicky'] = document.querySelector('#'+pageId+'_vehicky').value;
			    	param['vhplnky'] = tmpVhplnky;
			    	tmp07SaveList.push(param);
				}
				confirmOpen(palletCnt + '[[#{tm.tmp07.savePlanCacel}]]', async function(result){
					if(result){
						try{
							const rData =  await fetchUtil('POST','/tm/pda/tmp07/save',{addList : tmp07SaveList});
							if(rData.status === 200){
								palletCnt=0;
								document.querySelector('#tBody').innerHTML = '';
								document.querySelector('#'+pageId+'TotalBox').checked = false;
								document.querySelector('#'+pageId+'_vhplnky').value = '';
								document.querySelector('#'+pageId+'_pallet').innerHTML = palletCnt;
								document.querySelector('#'+pageId+'_vehicky').innerHTML = '<option value ="">[[#{tm.tmp05.pltscan}]]</option>';
								tmpDestkey = null;
								tmpVhplnky = null;
								document.querySelector('#'+pageId+'_input').value = '';
								document.querySelector('#'+pageId+'_input').focus();
							}
						}catch(err){
							alertOpen('[[#{ms.saveErr}]]');
							return;
						}
					}
					document.querySelector('#'+pageId+'_input').value = '';
					document.querySelector('#'+pageId+'_input').focus();
				});
			});

			//================================
			//PDA 배차된 PLT 리스트 불러오기
			//================================
			async function getPltList(){
				
				document.querySelector('#tmp07Spinner').style.display = 'block';
				
				const saatc06Data = document.querySelector('#'+pageId+'_input').value;
				const param = {
						warekey : '[[${userattr.warekey}]]',
						saatc06 : saatc06Data
				}

				const response = await fetchUtil('GET', '/tm/pda/tmp07/grid/1', param);

				tmp07PltList = await response.json();
				
				document.querySelector('#tBody').innerHTML = '';
				
				if(!tmp07PltList.length){
					document.querySelector('#'+pageId+'_vhplnky').value = '';
					document.querySelector('#tmp07Spinner').style.display = 'none';
					alertOpen('[[#{tm.tmp07.nonePlt}]]', function(){
						document.querySelector('#'+pageId+'_input').focus();
					});
					return;
				}
				
				let html = '';
				tmpVhplnky = tmp07PltList[0].vhplnky;
				
				document.querySelector('#'+pageId+'_vhplnky').value = tmp07PltList[0].vhplnky
				document.querySelector('#'+pageId+'_vehicky').innerHTML = '<option selected disabled value="'+ tmp07PltList[0].vehicky +'">'+ tmp07PltList[0].vhcfnam + ' ('+ tmp07PltList[0].sumvehi+')' +'</option>';
				
				for(const tmp07PltData of tmp07PltList){
					html += '<tr>';
					if(saatc06Data === tmp07PltData.saatc06){
						html += '<td><input type="checkbox" class="checkbox" checked onclick="rowCheckControl(this)"></td>';
					}else{
						html += '<td><input type="checkbox" class="checkbox" onclick="rowCheckControl(this)"></td>';
					}
					html += '<td class="postdat" style="display:none">' + tmp07PltData.postdat + '</td>';
					html += '<td class="vehicky" style="display:none">' + tmp07PltData.vehicky + '</td>';
					html += '<td class="trnstat" style="display:none">' + tmp07PltData.trnstat + '</td>';
					html += '<td class="saatc08">' + tmp07PltData.mcatenm + '</td>';
					html += '<td class="mintc10">' + tmp07PltData.mintc10 + '</td>';
					html += '<td class="maxtc10">' + tmp07PltData.maxtc10 + '</td>';
					html += '<td class="saatc06">' + tmp07PltData.saatc06 + '</td>';
					html += '</tr>';
				}
				
				document.querySelector('#tBody').insertAdjacentHTML('afterbegin', html);
				document.querySelector('#'+pageId+'_pallet').innerHTML = ++palletCnt;
				document.querySelector('#tmp07Spinner').style.display = 'none';
				document.querySelector('#'+pageId+'TotalBox').checked = document.querySelectorAll('#tBody input[class*="checkbox"]:checked').length === document.querySelectorAll('#tBody input[class*="checkbox"]').length;

			}
			
			//전체체크박스 컨트롤
			document.querySelector('#'+pageId+'TotalBox').addEventListener('click', function(){
				let checkedCnt = 0;
				palletCnt = 0;
				document.querySelectorAll('input[class*="checkbox"]').forEach(function(tagObj){
					tagObj.checked = document.querySelector('#'+ pageId +'TotalBox').checked;
					palletCnt += tagObj.checked ? 1 : 0;
				});
				document.querySelector('#'+pageId+'_pallet').innerHTML = palletCnt;
				document.querySelector('#'+pageId+'_input').focus();
			});
			
			//로우별 체크박스
			rowCheckControl = function(obj){
				let checkedCnt = 0;
				palletCnt = 0;
				document.querySelectorAll('input[class*="checkbox"]').forEach(function(element){
					if(element.checked){
						checkedCnt++;
						palletCnt++;
					}
					document.querySelector('#'+pageId+'_pallet').innerHTML = palletCnt;
					document.querySelector('#'+ pageId +'TotalBox').checked = document.querySelectorAll('input[class*="checkbox"]').length === checkedCnt;
				});
				document.querySelector('#'+pageId+'_input').focus();
			}
		});
	</script>
</div>
</html>

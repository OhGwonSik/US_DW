    $('#' + pageId + 'ShuttleMdSaveBt').click(async function () {
    	const orderGrid = pq.grid(gridId);
		const orderGridCheck = orderGrid.Checkbox('state').getCheckedNodes();

		const shuttleGrid = pq.grid(shuttleMdGridId);
		const shuttleGridCheck = shuttleGrid.Checkbox('state').getCheckedNodes();
		
		const itemGrid = pq.grid(itemGridId);

		if(shuttleGridCheck.length <= 0) {
			alert('[[#{tm.tma4.choiceShuttle}]]');
			return false;
		}

		let postdat = orderGridCheck[0].postdat.replaceAll('-', '');

		for(let i=0; i<orderGridCheck.length; i++) {
			if(postdat < orderGridCheck[i].postdat.replaceAll('-', '')) {
				postdat = orderGridCheck[i].postdat.replaceAll('-', '');
			}
		}

		let doccate = '';
		let warekey = '';
		let shtrtky = '';
		let vehicky = '';

		if(shuttleGridCheck.length > 1) {
			alert('[[#{ms.notMultiCheck}]]');
			return false;
		}else {
			for(let i=0; i<shuttleGridCheck.length; i++) {
				doccate = shuttleGridCheck[i].doccate;
				warekey = shuttleGridCheck[i].warekey;
				shtrtky = shuttleGridCheck[i].shtrtky;
				vehicky = shuttleGridCheck[i].vehicky;
			}
		}

		const data = {
				orderList: orderGridCheck,
				doccate: doccate,
				warekey: warekey,
				shtrtky: shtrtky,
				vehicky: vehicky,
				postdat: postdat
		}
		
		const result = confirm('[[#{tm.common.checkSave}]]');
		
		if(result === true) {
			try {
				const saveShuttle = await fetchUtil('POST', '/tm/order/tma04/shuttlesave', data);

				if(saveShuttle.status === 200) {
					$('#' + pageId + 'ShuttleModal').modal('hide');

					await tma04OrderSearch();

					shuttleGrid.option('dataModel', {data: []});
					shuttleGrid.refreshDataAndView();
					
					itemGrid.option('dataModel', {data: []});
					itemGrid.refreshDataAndView();
				}else {
					alert('[[#{ms.saveErr}]]');
				}
			}catch (err) {
				alert('[[#{ms.saveErr}]]');
			}
		}
    });

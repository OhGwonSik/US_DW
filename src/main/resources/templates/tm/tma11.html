  <div th:fragment="fragments-mainContent">
    <div class="tab-contents">
      <div class="location"></div>

            </div>
          </div>
          <label for="tma11_vhcsnam" class="setting-grid-title">[[#{tm.tvhcma.vhcsnam}]]</label>
          <div class="setting-grid-content">

              <input

              />
            </div>
          </div>
          <label for="tma11_saatc10" class="setting-grid-title">[[#{tm.tma11.saatc10}]]</label>

              <select
                id="tma11_destkey"
                name="tma11_destkey"
                data-cb-val="destkey"
                data-cb-name="denamlc"
                data-cb-url="/tm/area/common/destlist"
                data-cb-variable="destkeyList"
              >
                <option value="">[[#{tm.common.all}]]</option>
              </select>
            </div>
          </div>
          <label for="tma11_susernam" class="setting-grid-title">[[#{tm.tma11.usernam}]]</label>
          <div class="setting-grid-content">
            <div class="input-wrapper">
              <input
                type="text"
                id="tma11_usernam"
                th:placeholder="${#messages.msg('tm.tma11.usernam')}"
              />
            </div>
          </div>
          <label for="tma11_postdat" class="setting-grid-title">[[#{tm.tma11.postdat}]]</label>

            <div class="input-date-group">
              <input type="date" id="tma11_postdatFrom" onkeyup="setInputDateDel(this)" />
              <span>~</span>
              <input type="date" id="tma11_postdatTo" onkeyup="setInputDateDel(this)" />
            </div>
          </div>
          <label for="tma11_doctype" class="setting-grid-title">[[#{tm.tma11.doctype}]]</label>
          <div class="setting-grid-content">

              <select id="tma11_doctype" name="tma11_doctype"></select>

          <label for="tma11_retodyn" class="setting-grid-title">[[#{tm.tma11.retodyn}]]</label>

            <div class="input-group">
              <select id="tma11_retodyn" name="tma11_retodyn">
                <option value="">[[#{tm.common.all}]]</option>
                <option value="Y">[[#{tm.tma11.Y}]]</option>
                <option value="N">[[#{tm.tma11.N}]]</option>
              </select>
            </div>
          </div>

              <label class="check-box">
                <input
                  type="checkbox"
                  autocomplete="off"
                  id="tma11_plnstatAll"
                  name="tma11_plnstatAll"

            </div>
          </div>

        <div class="search-btn-group">
          <button type="button" class="btn-search btn-navy btn-green" id="tma11_search">
            <img />[[#{bt.search}]]

          <button type="button" class="btn-clear btn-white" id="tma11_reset">
            <img />[[#{bt.reset}]]
          </button>
        </div>
      </div>
      <div class="search-list">
        <div class="list-top">
          <div class="list-title ic-title-mark">

      <div class="search-list">
        <div class="list-grid-wrapper con-box">
          <div id="tma11_subGrid"></div>
        </div>
      </div>
    </div>
    <div
      class="modal fade modalTm"
      id="tma11QtyModal"
      tabindex="-1"
      role="dialog"
      aria-labelledby="tma11QtyModalTitle"
      aria-hidden="true"
      data-backdrop="static"
      data-keyboard="false"
    >
      <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
          <div class="modal-top">
            <button type="button" id="modalClose" class="close" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body" id="tma11_modal-body">
            <div id="image-box" class="image-box">
              <img id="tma11_image-view" alt="" />
              <!-- 그리드 컬럼 내부에 존재하는 src 경로로 조회된다. -->
              <div class="image-box-control">
                <button id="btn-memo" class="btn-memo" title="메모">
                  <img />
                </button>
                <div class="line"></div>
                <label for="uploadImg" class="btn-refresh" title="사진변경">
                  <img />
                </label>
                <input type="file" id="uploadImg" onchange="loadImg(this)" accept="image/*" />
                <!-- 사진변경을 하면 img-view가 새로운 데이터로 최신화 -->
              </div>
            </div>
            <input
              type="text"
              id="memo-content"
              class="memo-content"
              placeholder="메모를 입력해주세요"
            />
          </div>
          <div class="modal-bottom">
            <button type="button" class="btn-white" id="tma11_saveQtyModal">[[#{bt.save}]]</button>
            <button type="button" class="btn-save btn-navy btn-green" id="tma11_closeQtyModal">
              [[#{bt.close}]]
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div
    class="modal fade"
    id="tma11Modal"
    tabindex="-1"
    role="dialog"
    aria-labelledby="tma11QtyModalTitle"
    aria-hidden="true"
    data-backdrop="static"
    data-keyboard="false"
  >
    <div class="modal-dialog" role="document">
      <div class="modal-content popup-register modal-con" style="top: 120px; display: flex">
        <div class="modal-top" id="tma11QtyModalTitle">
          <h5 class="box-title">[[#{tm.tma11.saveAll}]]</h5>
          <button type="button" id="tma11modalClose" class="close" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <div class="setting-grid">
            <label for="tma11_m_plnstat" class="setting-grid-title ic-title-nece"

            <div class="setting-grid-content">
              <div class="input-check-group" id="tma11_plnstatModalCheckBox"></div>
            </div>
            <label for="tma11_m_stpitdt" class="setting-grid-title">[[#{tm.tma11.stpdttm}]]</label>
            <div class="setting-grid-content d">
              <div class="input-wrapper">
                <input
                  type="date"
                  max="2999-12-31"
                  id="tma11_m_stpitdt"
                  onkeyup="setInputDateDel(this)"

                />
              </div>
              <div class="input-wrapper">
                <input type="time" id="tma11_m_stpittm" onkeyup="setInputDateDel(this)" disabled />
              </div>
            </div>
            <label for="tma11_m_trfindt" class="setting-grid-title">[[#{tm.tma11.trfdttm}]]</label>
            <div class="setting-grid-content d">
              <div class="input-wrapper">
                <input
                  type="date"
                  max="2999-12-31"
                  id="tma11_m_trfindt"
                  onkeyup="setInputDateDel(this)"
                  disabled
                />
              </div>
              <div class="input-wrapper">
                <input type="time" id="tma11_m_trfintm" onkeyup="setInputDateDel(this)" disabled />
              </div>
            </div>
            <label for="tma11_m_shtrsts" class="setting-grid-title ic-title-nece"
              >[[#{tm.tma11.shtrsts}]]</label
            >
            <div class="setting-grid-content">
              <div class="input-check-group" id="tma11_shtrstsModalCheckBox"></div>
            </div>
            <label for="tma11_m_repitdt" class="setting-grid-title">[[#{tm.tma11.repdttm}]]</label>
            <div class="setting-grid-content d">
              <div class="input-wrapper">
                <input
                  type="date"
                  max="2999-12-31"
                  id="tma11_m_repitdt"
                  onkeyup="setInputDateDel(this)"
                  disabled
                />
              </div>
              <div class="input-wrapper">
                <input type="time" id="tma11_m_repittm" onkeyup="setInputDateDel(this)" disabled />
              </div>
            </div>
          </div>
        </div>
        <div class="modal-bottom">
          <button type="button" class="btn-white" id="tma11_saveModal">[[#{bt.save}]]</button>
          <button type="button" class="btn-save btn-navy btn-green" id="tma11_closeModal">
            [[#{bt.close}]]
          </button>
        </div>
      </div>
    </div>
  </div>

            type: "textbox",
            init: dateEditor,

              return ui.$cell.find("input").val();

          },
          editable: function (ui) {
            if (ui.rowData.plnstatOrigin === "PLAN") {
              return false;

                icons: {
                  up: "bi bi-chevron-up",

            getData: function (ui) {
              return ui.$cell.find("input").val();

          },
          editable: function (ui) {
            if (ui.rowData.plnstatOrigin === "PLAN") {

            options: [],

            let vhcsnam;
            vehiList.find(function (element, index) {
              if (ui.cellData === element.vehicky) {
                vhcsnam = element.vhcsnam;
              }

            return vhcsnam;

          dataIndx: "usernam",

            init: function (ui) {

        const currentTime = moment().format("HH:mm:ss");

        grid = pq.grid("#" + pageId + "_pqgrid");

        if (ui.source === "edit") {
          if (ui.updateList[0].rowData.plnstatOrigin === "PLAN") {
            this.updateRow({
              rowIndx: ui.updateList[0].rowData.pq_ri,
              newRow: {
                stpitdt: "",
                stpittm: "",
                trfindt: "",
                trfintm: "",
              },
              checkEditable: false,
            });
          }
          // a ? o : x
          if (ui.updateList[0].rowData.plnstatOrigin === "START") {
            this.updateRow({
              rowIndx: ui.updateList[0].rowData.pq_ri,
              newRow: {
                stpitdt: ui.updateList[0].rowData.stpitdt
                  ? ui.updateList[0].rowData.stpitdt
                  : currentDate,
                stpittm: ui.updateList[0].rowData.stpittm
                  ? ui.updateList[0].rowData.stpittm
                  : currentTime,
                trfindt: "",
                trfintm: "",
              },
              checkEditable: false,
            });
          }
          if (ui.updateList[0].newRow.plnstatOrigin === "FINISH") {
            this.updateRow({
              rowIndx: ui.updateList[0].rowData.pq_ri,
              newRow: {
                stpitdt: ui.updateList[0].rowData.stpitdt
                  ? ui.updateList[0].rowData.stpitdt
                  : currentDate,
                stpittm: ui.updateList[0].rowData.stpittm
                  ? ui.updateList[0].rowData.stpittm
                  : currentTime,
                trfindt: ui.updateList[0].rowData.trfindt
                  ? ui.updateList[0].rowData.trfindt
                  : currentDate,
                trfintm: ui.updateList[0].rowData.trfintm
                  ? ui.updateList[0].rowData.trfintm
                  : currentTime,
              },
              checkEditable: false,
            });
          }
          if (ui.updateList[0].newRow.plnstatOrigin === "START") {
            this.updateRow({
              rowIndx: ui.updateList[0].rowData.pq_ri,
              newRow: {
                trfindt: "",
                trfintm: "",
              },
              checkEditable: false,
            });
          }
          if (ui.updateList[0].newRow.trnmemo && ui.updateList[0].newRow.trnmemo.length > 1000) {
            alert(
              "[[#{tm.tma11.trnmemo}]] " +
                "[[#{ms.be1}]]" +
                " [[#{ms.validations.maxLenLength(1000)}]]"
            );
            this.updateRow({
              rowIndx: ui.updateList[0].rowIndx,
              newRow: { trnmemo: "" },
              checkEditable: false,
            });
            this.editCell({
              rowIndx: ui.updateList[0].rowIndx,
              dataIndx: "trnmemo",
            });
            return;
          }
          if (ui.updateList[0].newRow.pbilpay) {
            if (ui.updateList[0].newRow.pbilpay > 2147483647) {
              alert(
                "[[#{tm.tma11.pbilpay}]] " +
                  "[[#{ms.be1}]]" +
                  " [[#{ms.validations.maxLenLength(11)}]]"
              );

                rowIndx: ui.updateList[0].rowIndx,
                newRow: { pbilpay: 0 },
                checkEditable: false,
              });
              this.editCell({
                rowIndx: ui.updateList[0].rowIndx,
                dataIndx: "pbilpay",

              return;

                dataIndx: "pbilpay",

    async function tma11_transportInitData() {
      grid = pq.grid("#" + pageId + "_pqgrid");
      subGrid = pq.grid("#" + pageId + "_subGrid");
      let plnstatCheckedList = [];

      let plnstatList = document.querySelectorAll(
        "input[type=checkbox][name=" + pageId + "_plnstat]"
      );

      for (let i = 0; i < plnstatList.length; i++) {
        if (plnstatList[i].checked === true && plnstatList[i].id != pageId + "_plnstatAll") {
          plnstatCheckedList.push(plnstatList[i].value);
        }
      }

      let yesterday = moment().subtract(1, "days").format("YYYYMMDD");

      const data = {
        // 검색할 조건을 가지고 있는 변수
        warekey: $("#" + pageId + "_towarky").val(),
        vhcsnam: $("#" + pageId + "_vhcsnam")
          .val()
          .replace(/(\s*)/g, ""),
        saatc10: $("#" + pageId + "_saatc10")
          .val()
          .replace(/(\s*)/g, ""),
        destkey: $("#" + pageId + "_destkey").val(),
        usernam: $("#" + pageId + "_usernam")
          .val()
          .replace(/(\s*)/g, ""),
        postdatFrom: $("#" + pageId + "_postdatFrom")
          .val()
          .replaceAll("-", ""),
        postdatTo: $("#" + pageId + "_postdatTo")
          .val()
          .replaceAll("-", ""),
        doctype: $("#" + pageId + "_doctype").val(),
        retodyn: $("#" + pageId + "_retodyn").val(),
        plnstatList: plnstatCheckedList,
        tclosyn: "N",
      };
      grid.showLoading();
      try {
        const response = await fetchUtil("GET", "/tm/dispatch/common/grids/1", data);

        //============================================================
        //그리드 Option
        //============================================================
        if (response.status === 200) {
          const resContent = await response.json();

          grid.option("dataModel", {
            data: resContent,
            recIndx: "rowkey",
          });

          subGrid.option("dataModel", { data: [] });

          subGrid.refreshDataAndView();
          subGrid.hideLoading();

          grid.refreshDataAndView();
          grid.hideLoading();
        }
      } catch (err) {
        alert("[[#{ms.fetchError}]]");
      } finally {
        grid.hideLoading();
      }
    }

    //=======================================================
    // 모달 SAVE 후 실행하는 이벤트
    //=======================================================
    async function tma11QtyModalAction() {
      // 저장 시 메모정보와 변경된 이미지를 그리드 컬럼 내부의 데이터를 바꾸어 주어야 하며
      // 다시 인증모달을 띄울 경우 변경된 데이터로 조회가 되도록 한다.
      subGrid = pq.grid("#" + pageId + "_subGrid"); // 컬럼값 변경대상 그리드
      const uploadImg = document.querySelector("#uploadImg").files[0];
      const memo = document.querySelector("#memo-content");

      const gridData = subGrid.getData();

      if (!uploadImg && buttonId === "picture") {
        alert("[[#{tm.tma11.picflph}]] " + "[[#{ms.syncNo}]]");
        return;
      }
      if (!uploadImg && buttonId === "signiture") {
        alert("[[#{tm.tma11.sigflph}]] " + "[[#{ms.syncNo}]]");
        return;
      }
      if (uploadImg.size > 20971520) {
        alert("[[#{tm.tma11.uploadImgMaximumOver}]]");
        return;
      }
      if (!uploadImg.type.startsWith("image/")) {
        alert("[[#{tm.tma11.uploadImgExtError}]]");
        return;
      }
      let formData = new FormData();

      formData.append("file", uploadImg);
      formData.append("path", gridData[modalIdx].vhplnky); // 경로설정

      const response = callAjax("form", "POST", "/delivery/fileupload", formData);

      if (response.urls.length) {
        //정상처리 및 파일저장
        //response.data => 업로드한 파일 경로 리스트
        const fileData = response.urls[0].split("/");

        let fileName = "";
        let filePath = "";

        for (let i = 0; i < fileData.length; i++) {
          if (i !== fileData.length - 1) {
            filePath += fileData[i] + "/";
          } else {
            fileName = fileData[i];
          }
        }

        if (buttonId === "picture") {
          // 버튼 아이디별로 기능 구분
          subGrid.updateRow({
            rowIndx: modalIdx,
            newRow: {
              state: "Y",
              picflnm: fileName,
              picflph: filePath,
              trnmemo: memo.value,
            },
            checkEditable: false,
          });
        }
        if (buttonId === "signiture") {
          // 버튼 아이디별로 기능 구분
          subGrid.updateRow({
            rowIndx: modalIdx,
            newRow: {
              state: "Y",
              sigflnm: fileName,
              sigflph: filePath,
              trnmemo: memo.value,
            },
            checkEditable: false,
          });
        }

        $("#" + pageId + "QtyModal").modal("hide");
        modalIdx = ""; // 모달인덱스 초기화
        buttonId = ""; // Id 초기화
      } else {
        alert("[[#{ms.saveErr}]]]");
      }
    }

    async function shtrstsModalCheckbox() {
      let html = "";

      for (const shtrsts of responseData.shtrstsList) {
        if (
          shtrsts.combovl === "PLAN" ||
          shtrsts.combovl === "ARRIVAL" ||
          shtrsts.combovl === "LOADING" ||
          shtrsts.combovl === "UNLOADING"
        ) {
          html += '<label class="check-box" onclick="modalShtrstsClickEvt()">';
          html +=
            '<input type="checkbox" autocomplete="off" id="' +
            pageId +
            "_shtrsts_modal" +
            shtrsts.combovl +
            '" name="' +
            pageId +
            '_shtrsts_modal" value="' +
            shtrsts.combovl +
            '">';
          html += "<span>" + shtrsts.combonm + "</span>";
          html += "</label>";
        }
      }

      $("#tma11_shtrstsModalCheckBox").append(html);
    }

    //============================================================
    //init 데이터
    //============================================================
    async function tma11_initData() {
      responseData = await fetchUtil("GET", "/tm/dispatch/common/init", {
        warekey: $("#" + pageId + "_towarky").val(),
      });
      responseData = await responseData.json();

      await doctypeSetting();

      vehiList = await fetchUtil("GET", "/tm/area/tmm06/vehilist", {
        warekey: $("#" + pageId + "_towarky").val(),
      });
      vehiList = await vehiList.json();

      if ($('input:checkbox[name="' + pageId + '_plnstat"]').length === 0) {
        // 최초 한번만 실행
        await plnstatCheckbox();
      }
      if ($('input:checkbox[name="' + pageId + '_plnstat_modal"]').length === 0) {
        // 최초 한번만 실행
        await plnstatModalCheckbox();
      }
      if ($('input:checkbox[name="' + pageId + '_shtrsts_modal"]').length === 0) {
        // 최초 한번만 실행
        await shtrstsModalCheckbox();
      }
      return responseData;
    }

    //============================================================
    //창고 change 이벤트
    //============================================================
    $("#" + pageId + "_towarky").change(async function () {
      await doctypeSetting();
    });

    //============================================================
    //doctype Setting
    //============================================================
    async function doctypeSetting() {
      let mdocmaList = await fetchUtil("GET", "/tm/dispatch/common/doctypelist", {
        warekey: $("#" + pageId + "_towarky").val(),
      });
      mdocmaList = await mdocmaList.json();

      $("#" + pageId + "_doctype option").remove();
      $("#" + pageId + "_doctype").append(
        $("<option></option>").attr("value", "").text("[[#{tm.common.all}]]")
      );
      for (mdocma of mdocmaList) {
        $("#" + pageId + "_doctype").append(
          $("<option></option>").attr("value", mdocma.combovl).text(mdocma.combonm)
        );
      }
    }

    //============================================================
    //검색 엔터키 이벤트
    //============================================================
    async function enterKeySearch(event) {
      subGrid = pq.grid("#" + pageId + "_subGrid");

      if (event.key === "Enter") {
        subGrid.option("dataModel", { data: [] }); // 해당 서브그리드 초기화

        subGrid.refreshDataAndView();
        subGrid.hideLoading();

        await tma11_transportInitData(); // 헤드그리드 재조회
      }
    }

    // 모든 input 요소 가져오기
    const inputElements = document.querySelectorAll(".input-wrapper");

    // 각 input 요소에 이벤트 리스너 추가
    inputElements.forEach((input) => {
      input.addEventListener("keyup", enterKeySearch);
    });

    //============================================================
    // 파일업로드 시 화면에 해당이미지 최신화
    //============================================================
    function loadImg(obj) {
      let file = obj.files[0];
      let imgObj = document.querySelector("#tma11_image-view");
      if (file.type.startsWith("image/")) {
        // 이미지파일인 경우 URL 변경
        imgObj.src = URL.createObjectURL(file);
      } else {
        // 이미지 파일이 아닌경우 no_image
        imgObj.src = rPath + "/v2/assets/no_image.png";
        obj.value = "";
      }
      document.querySelector("#image-box").style.display = "";
    }

    //============================================================
    //  모달 화면 이벤트
    //============================================================
    $("#tma11_saveModal").click(async function () {
      await tma11ModalAction();
    });

    //모달 open 시 값 초기화
    $("#tma11Modal").on("shown.bs.modal", function () {});

    //modal close button click
    $("#tma11_closeModal, #tma11modalClose").click(function () {
      $("#tma11Modal").modal("hide");
    });

    async function tma11ModalAction() {
      if (!$('input:checkbox[name="' + pageId + '_plnstat_modal"]:checked').length) {
        alert("[[#{tm.tma11.plnstat}]]" + " [[#{ms.choiceValue}]]");
        return;
      }
      if ($('input:checkbox[name="' + pageId + '_plnstat_modal"]:checked').val() === "START") {
        if (!$("#tma11_m_stpitdt, #tma11_m_stpittm").val()) {
          alert("[[#{tm.tma11.stpdttm}]]" + " [[#{ms.choiceValue}]]");
          return;
        }
      }
      if ($('input:checkbox[name="' + pageId + '_plnstat_modal"]:checked').val() === "FINISH") {
        if (!$("#tma11_m_trfindt, #tma11_m_trfintm").val()) {
          alert("[[#{tm.tma11.trfdttm}]]" + " [[#{ms.choiceValue}]]");
          return;
        }
      }
      if (!$('input:checkbox[name="' + pageId + '_shtrsts_modal"]:checked').length) {
        alert("[[#{tm.tma11.shtrsts}]]" + " [[#{ms.choiceValue}]]");
        return;
      }
      if ($('input:checkbox[name="' + pageId + '_shtrsts_modal"]:checked').val() !== "PLAN") {
        if (!$("#tma11_m_repitdt, #tma11_m_repittm").val()) {
          alert("[[#{tm.tma11.repdttm}]]" + " [[#{ms.choiceValue}]]");
          return;
        }
      }

      grid = pq.grid("#" + pageId + "_pqgrid");
      subGrid = pq.grid("#" + pageId + "_subGrid");

      let plnstat = $('input:checkbox[name="' + pageId + '_plnstat_modal"]:checked').val();
      let shtrsts = $('input:checkbox[name="' + pageId + '_shtrsts_modal"]:checked').val();

      // 초기값 세팅
      let stpitdt = "";
      let stpittm = "";
      let trfindt = "";
      let trfintm = "";
      let repitdt = "";
      let repittm = "";

      if (plnstat === "PLAN") {
        // 배차계획상태인 경우 운송시간데이터 초기화
        stpitdt = " ";
        stpittm = " ";
        trfindt = " ";
        trfintm = " ";
      }

      if (plnstat === "START") {
        // 운행중 상태일 경우 운행완료시간 초기화
        stpitdt = $("#tma11_m_stpitdt").val().replaceAll("-", "");
        stpittm = $("#tma11_m_stpittm").val().replaceAll(":", "");
        trfindt = " ";
        trfintm = " ";
      }
      if (plnstat === "FINISH") {
        // 운행완료 상태인 경우
        stpitdt = $("#tma11_m_stpitdt").val().replaceAll("-", "");
        stpittm = $("#tma11_m_stpittm").val().replaceAll(":", "");
        trfindt = $("#tma11_m_trfindt").val().replaceAll("-", "");
        trfintm = $("#tma11_m_trfintm").val().replaceAll(":", "");
      }
      if (shtrsts !== "PLAN") {
        // 아이템의 운송상태가 배차계획이 아닌경우(상차, 하차)
        repitdt = $("#tma11_m_repitdt").val().replaceAll("-", "");
        repittm = $("#tma11_m_repittm").val().replaceAll(":", "");
      }

      if (shtrsts === "PLAN") {
        // 아이템의 운송상태가 배차계획인 경우 보고시간 초기화
        repitdt = " ";
        repittm = " ";
      }

      const gridCheck = grid.Checkbox("state").getCheckedNodes();

      const result = confirm("[[#{ms.checksave}]]");

      if (result) {
        const data = {
          tplnhdUpdateList: gridCheck,
          plnstat: plnstat,
          stpitdt: stpitdt,
          stpittm: stpittm,
          trfindt: trfindt,
          trfintm: trfintm,
          shtrsts: shtrsts,
          repitdt: repitdt,
          repittm: repittm,
        };

        grid.showLoading();
        subGrid.showLoading();

        try {
          const response = await fetchUtil("POST", "/tm/dispatch/tma11/updateall", data);

          if (response.status === 200) {
            // 저장 성공 후 데이터 조회
            subGrid.option("dataModel", { data: [] });

            subGrid.refreshDataAndView();
            subGrid.hideLoading();

            grid.refreshDataAndView();
            grid.hideLoading();

            $("#tma11Modal").modal("hide");

            await tma11_transportInitData();
          }
        } catch (err) {
          alert("[[#{ms.saveErr}]]");
        } finally {
          grid.hideLoading();
          subGrid.hideLoading();
        }
      }
    }

    //============================================================
    //그리드 render
    //============================================================
    function gridRender(ui) {
      let option = ui.column.editor.options.find(function (obj) {
        return !obj[ui.cellData];
      });
      return option ? option[ui.cellData] : ui.rowData.vhcsnam;
    }
  </script>
</html>

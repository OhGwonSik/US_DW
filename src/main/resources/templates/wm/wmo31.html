<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="fragments-mainContent" class="tab-content ">
	<div id="wmo31_modal_div"></div>
	<div class="tab-contents">
		<div class="location"></div>
		<div class="search-conditions con-box">
			<div class="setting-grid">
				<label for="inputGroupSelect01" class="setting-grid-title ic-title-nece">[[#{md.mwarma.whnamlc}]]</label>
				<div class="setting-grid-content">
					<div class="input-group">
						<select id="wmo31Warekey" data-cb-val="combovl"
							data-cb-name="combonm" data-cb-letiable="warekeyList"></select>
					</div>
				</div>
				<label for="inputGroupSelect01" class="setting-grid-title ic-title-nece">[[#{md.mowrma.ownamlc}]]</label>
				<div class="setting-grid-content">
					<div class="input-group">
						<select id="wmo31Ownerky" data-cb-val="combovl"
							data-cb-name="combonm" data-cb-letiable="ownerkyList">
							<option value="">[[#{wm.wmo31.all}]]</option>	
						</select>
					</div>
				</div>
				<label for="inputGroupSelect01" class="setting-grid-title">[[#{wm.wshpit.allgrky}]]</label>
				<div class="setting-grid-content">
					<div class="input-wrapper">
						<input type="text" id="wmo31Allgrky" th:placeholder="${#messages.msg('wm.wshpit.allgrky')}">
					</div>
				</div>
				<label for="inputGroupSelect01" class="setting-grid-title">[[#{wm.wshpit.shppday}]]</label>
				<div class="setting-grid-content">
					<div class="input-date-group">
						<input type="date" max="2999-12-31" id="wmo31ShsdateFrom"
							onkeyup="setInputDateDel(this)" /> <span>~</span> <input
							type="date" max="2999-12-31" id="wmo31ShsdateTo"
							onkeyup="setInputDateDel(this)" />
					</div>
				</div>
				<label for="inputGroupSelect01" class="setting-grid-title">[[#{wm.wtakit.tasksts}]]</label>
				<div class="setting-grid-content">
					<div class="input-group">
						<select id="wmo31Shpdcst">
							<option value="ING" selected>[[#{wm.wmo31.ing}]]</option>
							<option value="CMP">[[#{wm.wmo31.cmp}]]</option>
						</select>
					</div>
				</div>
				<label for="inputGroupSelect01" class="setting-grid-title">[[#{wm.wshpit.picktyp}]]</label>
				<div class="setting-grid-content">
					<div class="input-group">
						<select id="wmo31Picktyp"></select>
					</div>
				</div>
			</div>
			<div class="search-btn-group">
				<button type="button" class="btn-search btn-navy btn-green" id="wmo31Search">
					<img>[[#{bt.search}]]
				</button>
				<button type="button" class="btn-clear btn-white" id="wmo31Reset">
					<img>[[#{bt.reset}]]
				</button>
			</div>
		</div>
		<div class="search-list">
			<div class="list-top">
				<div class="list-title ic-title-mark">
					<span th:text="${gnatitle}"></span>
				</div>
				<div class="edit-btn-wrapper">
					<button class="btn-white d-none" id="wmo31Print"><img class="ic-bt-print"> [[#{bt.print}]]</button>
					<button class="btn-navy btn-green d-flex" id="wmo31ResoShipout">
						<img class="ic-bt-save">[[#{bt.resoShipout}]]
					</button>
				</div>
			</div>
			<div class="list-grid-wrapper con-box">
				<div id="wmo31ItemPqgrid"></div>
			</div>
		</div>
		<div class="spinner" id="spinner"></div>
	</div>

	<script>
	$(function(){
		const pageId = "[[${gprogrid}]]";
		const wmo31ItemGridId = '#'+ pageId + 'ItemPqgrid';
		const moduleName = 'wm';
		const wmo31IngValue = 'ING'; // 출고 상태
		const wmo31CmpValue = 'CMP'; // 출고 상태
		const wmo31PrintId = 'wmd30'; // 프린트 ID
		let wmo31GridObject;
		
		$('#' + pageId + 'Search').click(function() {
			searchwmo31ItemList();
		});	
		
		$('#' + pageId + 'Reset').click(function(){
			resetSearchConditions();
			$('#' + pageId + 'Ownerky').pqSelect('refreshData');
			wmo31GridObject.searchList([]);
	  	});
		
		$('#'+pageId+'Shpdcst').change(async function(){
	  		let wmo31Grid = pq.grid(wmo31ItemGridId);
	  		wmo31Grid.Checkbox('state').unCheckAll();
			if(this.value === wmo31IngValue){
				$('#' + pageId + 'ResoShipout').removeClass('d-none');	
				$('#' + pageId + 'ResoShipout').addClass('d-flex');	
				$('#' + pageId + 'Print').removeClass('d-flex');	
				$('#' + pageId + 'Print').addClass('d-none');
	  		}else if(this.value === wmo31CmpValue){
	  			$('#' + pageId + 'ResoShipout').removeClass('d-flex');	
				$('#' + pageId + 'ResoShipout').addClass('d-none');	
				$('#' + pageId + 'Print').removeClass('d-none');	
				$('#' + pageId + 'Print').addClass('d-flex');
	  		}
			wmo31GridObject.searchList([]);
		  });
		
		$('#' + pageId + 'ResoShipout').click(async function(){
			wmo31ResoShipout();
		});
		
		$('#' + pageId + 'Print').click(function() {
			wmo31Print();
	    });
		
	 	/**
	 	 * Item Grid
	  	 **/
	  	const wmo31GridColModel = [
	  		{ title: '', dataType: 'bool', dataIndx: 'state', align: 'center',
	            type: 'checkbox', sortable: false, editor: false,
	            cb: { all: false, header: true },
	       	},
			{ title: "[[#{wm.wshpit.rowkey}]]",  dataType: "string",  dataIndx:"rowkey",  hidden: true, editable:false },
			{ title: "[[#{wm.wshpit.compkey}]]", dataType: "string",  dataIndx:"compkey", hidden: true, editable:false },
			{ title: "[[#{wm.wshpit.warekey}]]", dataType: "string",  dataIndx:"warekey", hidden: true, editable:false },
			{ title: "[[#{md.mowrma.ownamlc}]]", dataType: "string",  dataIndx:"ownamlc", editable:false },
			{ title: "[[#{wm.wshpit.doccate}]]", dataType: "string",  dataIndx:"doccate", hidden: true, editable:false },
			{ title: "[[#{wm.wshpit.doctype}]]", dataType: "string",  dataIndx:"doctype", hidden: true, editable:false },
			{ title: "[[#{md.mdocma.doctynm}]]", dataType: "string",  dataIndx:"doctynm", editable:false },
			{ title: "[[#{wm.wmo30.shpdcst}]]", dataType: "string",  dataIndx:"shpdcst", editable:false },
			{ title: "[[#{wm.wshpit.cooutky}]]", dataType: "string",  dataIndx:"cooutky", editable:false },
			{ title: "[[#{wm.wshpit.cooutit}]]", dataType: "integer", dataIndx:"cooutit", editable:false },
			{ title: "[[#{wm.wmo31.shpdcky}]]", dataType: "string",  dataIndx:"shpdcky", editable:false },
			{ title: "[[#{wm.wshpit.shpdcit}]]", dataType: "string",  dataIndx:"shpdcit", hidden: true , editable:false },
			{ title: "[[#{wm.wshpit.allgrky}]]", dataType: "string",  dataIndx:"allgrky", editable:false },
			{ title: "[[#{wm.wshpit.destkey}]]", dataType: "string",  dataIndx:"destkey", hidden: true , editable:false },
			{ title: "[[#{md.mdesma.denamlc}]]", dataType: "string",  dataIndx:"denamlc", editable:false },
			{ title: "[[#{wm.wshpit.shcuqty}]]", dataType: "integer", dataIndx:"shcuqty", editable:false,
				summary: { type: "sum" }, format: "#,###"
			},
	
			{ title: "[[#{wm.wmo31.rgitqty}]]", dataType: "integer", dataIndx:"rgitqty", editable:false,
				summary: { type: "sum" }, format: "#,###"
			},
			{ title: "[[#{wm.wmo31.shalqty}]]", dataType: "integer", dataIndx:"shalqty", editable:false,
				summary: { type: "sum" }, format: "#,###"
			},
			{ title: "[[#{wm.wmo31.fordqty}]]", dataType: "integer", dataIndx:"fordqty", editable:false,
				summary: { type: "sum" }, format: "#,###"
			},
			{ title: "[[#{wm.wmo31.tcmpqty}]]", dataType: "integer", dataIndx:"tcmpqty", editable:false,
				summary: { type: "sum" }, format: "#,###"
			},
			{ title: "[[#{wm.wmo31.diffqty}]]", dataType: "integer", dataIndx:"diffqty", editable:false,
				summary: { type: "sum" }, format: "#,###"
			},
			{ title: "[[#{wm.wmo31.soutqty}]]", dataType: "integer", dataIndx: "soutqty",  editable: false,
				summary: { type: "sum" }, format: "#,###"
			},
			{ title: "[[#{wm.wmo31.shsdate}]]", dataType: "string", dataIndx: "shsdate",  editable: false },
			{ title: "[[#{wm.wmo31.shstime}]]", dataType: "string", dataIndx: "shstime",  editable: false },
			{ title: "[[#{wm.wmo31.shsuser}]]", dataType: "string", dataIndx: "shsuser", hidden: true , editable: false },
			{ title: "[[#{wm.wmo31.shsname}]]", dataType: "string", dataIndx: "shsname",  editable: false },
			{ title: "[[#{wm.wmo31.shedate}]]", dataType: "string", dataIndx: "shedate",  editable: false },
			{ title: "[[#{wm.wmo31.shetime}]]", dataType: "string", dataIndx: "shetime",  editable: false },
			{ title: "[[#{wm.wmo31.sheuser}]]", dataType: "string", dataIndx: "sheuser", hidden: true , editable: false },
			{ title: "[[#{wm.wmo31.shename}]]", dataType: "string", dataIndx: "shename",  editable: false },
		]
	    
	    wmo31GridObject = new GridUtil(wmo31GridColModel, "[[${gprogrid}]]", pageId+"ItemPqgrid");
	  	wmo31GridObject.setBeforeValidate(function (evt, ui) {
			if (ui.source != 'undo' && (ui.source == 'edit' || ui.source == 'paste' || ui.source == 'checkbox')){
				let gridData 	= wmo31GridObject.getGrid().getData();
				let grid 		= pq.grid(wmo31ItemGridId);
				if(ui.updateList[0].newRow.hasOwnProperty('state')){
					ui.updateList.forEach((updateRow)=> {
						gridData.filter(function(gridRow){
							if(gridRow.cooutky === updateRow.rowData.cooutky){
								grid.updateRow({
									rowIndx : gridRow.pq_ri ,
									newRow : {
										"state" : updateRow.newRow['state']
									},
									checkEditable : false
								});
							}
						});
				   });
				}
			}
	    });
	  	
	  	wmo31GridObject.setCreate(async function(evt, ui){
			const initData = await wmo31InitData();
			const item 	   = initData.item;
			comboCreateData(null, pageId + 'Warekey', item.warekeyList, {combovl : 'combovl', combonm : 'combonm'});
			comboCreateData(null, pageId + 'Ownerky', item.ownerkyList, {combovl : 'combovl', combonm : 'combonm'});
			comboCreateData(null, pageId + 'Picktyp', item.picktypList , {combovl : 'combovl', combonm : 'combonm'});
			$('#'+pageId+'ShsdateFrom').val(moment().subtract(1, 'days').format('YYYY-MM-DD'));
			$('#'+pageId+'ShsdateTo').val(moment().format("YYYY-MM-DD"));
	 	});
	  	
	  	wmo31GridObject.setFind();
	    wmo31GridObject.open();
	  	
	  	//============================================================	 
		//영역 검색 버튼 이벤트
		//============================================================
		async function searchwmo31ItemList(){
			let wmo31Grid = pq.grid(wmo31ItemGridId);
			let param = { 
				warekey : $('#' + pageId + 'Warekey').val(),
				ownerky : $('#' + pageId + 'Ownerky').val(),
				allgrky : $('#' + pageId + 'Allgrky').val(),
				custkey : $('#' + pageId + 'Custkey').val(),
				picktyp : $('#' + pageId + 'Picktyp').val(),
				shpdcst : $('#' + pageId + 'Shpdcst').val(),
				shsdatefrom : $('#' + pageId + 'ShsdateFrom').val().replaceAll('-',''),
				shsdateto : $('#' + pageId + 'ShsdateTo').val().replaceAll('-','')
			};
			
			wmo31Grid.showLoading();
			const res = await fetchUtil('GET', '/wm/outbound/' + pageId + '/grids/1', param);
			if(res.ok){
				const resData = await res.json();
				
				wmo31Grid.option( 'dataModel', { data: resData } );
				wmo31Grid.refreshDataAndView();
			}
			wmo31Grid.hideLoading();
		}
		
		async function wmo31InitData(){
			const res = await fetchUtil('GET', '/wm/outbound/' + pageId + '/init', {});
			if(res.ok){
				return await res.json();
			}
			return;
		}
		
		function comboCreateData(gridnm, colnm, obj, mapob, type){
			if(!gridnm){
				$('#' + colnm + ' option').not('[value=""]').remove();	//초기화
				if(mapob != null && mapob.combovl != undefined && mapob.combonm != undefined){
					$.each(obj, function(key, value) {
						$('#' + colnm) .append($('<option></option>').attr('value',value[mapob.combovl]).text(value[mapob.combonm])); 
					});
				}else{
					$.each(obj, function(key, value) { 
						$('#' + colnm) .append($('<option></option>').attr('value',value.combovl).text(value.combonm)); 
					});
				}
				if(colnm === pageId + "[[#{wm.wmo30.ownerkyValue}]]"){
					$('#' + colnm).pqSelect({
						deselect : false
					});
				}
			}
			else{
				let grid 	= pq.grid('#' + gridnm);
				let column 	= grid.getColumn({ dataIndx: colnm });
	
				let options = obj.map(function(obj){
		        	let rObj = {};
		        	if(mapob != null && mapob.combovl != undefined && mapob.combonm != undefined){
		        		rObj[obj[mapob.combovl]] = obj[mapob.combonm];
		        	}else{
						rObj[obj.combovl] = obj.combonm;
		        	}
					return rObj;
				});
		
				column.editor.options = options;
			}
		}
		
	
		async function wmo31ResoShipout(){
			let wmo31Grid = pq.grid(wmo31ItemGridId);
			let wmo31GridList = wmo31Grid.getChanges();
			let checkedList = wmo31Grid.Checkbox('state').getCheckedNodes().filter((obj) => { 
				obj.type = 'shipOrder', 
				obj.progrid = pageId 
				return obj.state === true;	
			});
			
			if(!checkedList.length){
				alert("[[#{ms.choiceRowZero}]]");
	    		return;
			}
			
			for(let checkedData of checkedList){
	            if(checkedData.tcmpqty == 0){
	                //출고완료된 로우
	                alert("[[#{wm.wmo31.checkPicking}]]");
	                wmo31Grid.Checkbox('state').unCheckAll();
	                return;
	             }
	         }
			wmo31GridList.updateList = checkedList;
			wmo31Grid.showLoading();
			const res = await fetchUtil('POST' , '/wm/outbound/' + pageId + '/resoPartShipout' ,  wmo31GridList);
			if(res.ok){
				const resData = await res.json();
				if(resData){
		        	wmo31Print();
		        	searchwmo31ItemList();
				}
			}
			wmo31Grid.hideLoading();
		}
	   
		
		async function wmo31Print(){
			let wmo31Grid = pq.grid(wmo31ItemGridId);
			let gridList  = wmo31Grid.getChanges();
			let checkList = wmo31Grid.getData().filter(function(e){
				e.progrid = pageId ,
				e.type    =  wmo31PrintId
				return e.state == true;
			});
			
			if(!checkList.length){
				alert('[[#{ms.choiceRowZero}]]');
				return;
			}
			
			if(confirm("[[#{wm.wmo31.printout}]]")) {
				let report = [];
				for(let checkRow of checkList){
					checkRow['user'] = "[[${userattr.useract}]]";
					checkRow['type'] = 'wmd30';
					checkRow['shpdcst'] = $('#' + pageId + 'Shpdcst').val();
					checkRow['progrid'] = pageId;
					
					let reportFilter = report.filter(function(e){
						return e.cooutky === checkRow.cooutky && e.allgrky === checkRow.allgrky && e.destkey === checkRow.destkey;
					});
					
					if(!reportFilter.length){
						report.push(checkRow);
					}
				}
				reportPrint(report , moduleName);
			}
		}
	});
	</script>
	<!--  mainConten 종료 -->
</div>
</html>

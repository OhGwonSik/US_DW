								if(columns[columnKey].styleHead?.['background-color'] === "[[#{grid.styleHead01}]]" && !gridRow[columnKey]){

						                alert(Number(gridRow.pq_ri + 1) + "[[#{wm.wmo40.rowNum}]]" + columns[columnKey].title + "[[#{ms.choiceValue}]]");   
						                return;

										if(!Number(gridRow[columnKey])) {
						                    alert(Number(gridRow.pq_ri + 1) + "[[#{wm.wmo40.rowNum}]]" + columns[columnKey].title + "[[#{ms.choiceValue}]]");   
											return;
				               			}
									}
								}
			   			  	}
			         	}

					comboCreateData(pageId + 'Grid', 'rsncode' , item.rsncodeList, {combovl : 'combovl', combonm : 'combonm'}); // 사유코드

								this.updateRow({

			//============================================================
			//검색 조건 이벤트
			//============================================================
			async function wmi42Init() {
				let res = await fetchUtil('GET' , '/wm/inventory/' + pageId + '/init',  {});
				try{
					if(res.status !==200){
						throw new Error('[[#{ms.saveErr}]]');
					}
					return await res.json();
				 } catch(err) {
					alert('code : ' + res.status + '\n' + err + '\n' + res.statusText); 
				 }
			}
			
			//============================================================
			// 재고 search
			//============================================================	
			async function wmi42SearchList(){
				const grid = pq.grid('#' + pageId +'Grid');
				let data = {	ownerky : $('#' + pageId +'Ownerky option:selected').val() , 
								warekey : $('#' + pageId +'Warekey option:selected').val() , 
								locakey : $('#' + pageId +'Locakey').val().toUpperCase() , 
								skumkey : $('#' + pageId +'Skumkey').val().toUpperCase() , 
								skudesc : $('#' + pageId +'Skudesc').val().toUpperCase() , 
								stkstat : $('#' + pageId +'Stkstat option:selected').val() 
							};
				grid.showLoading();
				let res = await fetchUtil( 'GET' , '/wm/inventory/' + pageId + '/grids/1', data );
				try {
					
					if(res.status !==200){
						throw new Error("[[#{ms.saveErr}]]");
					}
					const resData = await res.json();
				    grid.option( 'dataModel', { data: resData, recIndx: 'rowkey' } );
				    grid.refreshDataAndView();
				    grid.hideLoading();
				} catch(err) {
			   		alert('code : ' + res.status + '\n' + err + '\n' + res.statusText); // get method 통신의 경우
			   		grid.hideLoading();
				}
			}
			
			//============================================================
			// 검색영역 콤보 박스 생성
			//============================================================
			function comboCreateData(gridnm, colnm, obj, mapob, type) {
				if(!gridnm){
					$('#' + colnm + ' option').not('[value=""]').remove();	//초기화
					if(mapob != null && mapob.combovl != undefined && mapob.combonm != undefined){
						$.each(obj, function(key, value) {
							$('#' + colnm) .append($('<option></option>').attr('value',value[mapob.combovl]).text(value[mapob.combonm])); 
						});
					}else{
						$.each(obj, function(key, value) { 
							$('#' + colnm) .append($('<option></option>').attr('value',value.combovl).text(value.combonm)); 
						});
					}
					if(colnm === pageId + "[[#{wm.wmo30.ownerkyValue}]]"){
						$('#' + colnm).pqSelect({
							deselect : false
						});
					}
				}
				else{
					const grid 	= pq.grid('#' + gridnm);
					let column 	= grid.getColumn({ dataIndx: colnm });
					let options = obj.map(function(obj){
						let rObj = {};
			        	if(mapob != null && mapob.combovl != undefined && mapob.combonm != undefined){
			        		rObj[obj[mapob.combovl]] = obj[mapob.combonm];
			        	}else{
							rObj[obj.combovl] = obj.combonm;
			        	}
						return rObj;
					});
			
					column.editor.options = options;
				}
			}
			
			function skuListGroupByOwner(param) {
				let warekey = $('#' + pageId + 'Warekey option:selected').val();
				let options = param.reduce((acc , obj) => {
					let rObj = {};
					rObj[obj.combovl] = obj.combonm;
					if(acc[obj.ownerky]) {
						acc[obj.ownerky].push(rObj);
					}else {
						acc[obj.ownerky] = [rObj];
					}
					return acc;
				}, {});
				
				return options;
			}
		});

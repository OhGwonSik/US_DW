					<div class="input-group">

							<option value="" selected>[[#{ms.chooseAll}]]</option>

					</div>

				<label for="wmr60_doctype" class="setting-grid-title">[[#{wm.wstkky.doctype}]]</label>

			gridCheck.updateList = gridCheck.updateList.filter(function(item) {
				  return item.state === true;
			});//state가 true인 값만 가져오기
		
		if(gridCheck.updateList.length > 0){

	    	//체크된 데이터 값 체크
	    	//============================================================
			for(i=0;i<gridCheck.updateList.length;i++){

					return false;
				}
				if(gridCheck.updateList[i].stotqty < gridCheck.updateList[i].fordqty){
					alert("[[#{ms.fordqtyByStotqty}]]");	//지시수량이 총재고수량보다 많을 수 없습니다.

					return false;
				}
			}
			
			let result = confirm("[[#{ms.checksave}]]");
			if(result == true){

				grid.showLoading();
				
				try{
					let response = await fetchUtil('POST', "/wm/inbound/wmr60/grids/1", data);

       					});

function wmr60Init(){
// 	$('#wmr60_rcvdcdt_from').val(moment().subtract(1, "d").format("YYYY-MM-DD"));	// 어제
// 	$('#wmr60_rcvdcdt_to').val(moment().format("YYYY-MM-DD"));	//오늘
	let wmr60InitData = callAjax('data', 'GET', "/wm/inbound/wmr60/init/1");
	// 창고 리스트
	if(wmr60InitData.warekeyList){
		$("#wmr60_warekey option").not("[value='']").remove();
		$.each(wmr60InitData.warekeyList, function(key, value) {
			$('#wmr60_warekey').append($("<option></option>").attr("value",value.combovl).text(value.combonm)); 
		});
	}
	
	// 화주 리스트
	if(wmr60InitData.ownerkyList){
		$("#wmr60_ownerky option").not("[value='']").remove();
		$.each(wmr60InitData.ownerkyList, function(key, value) { 
			$('#wmr60_ownerky').append($("<option></option>").attr("value",value.combovl).text(value.combonm)); 
		});
	}
	
	// doctype 리스트
	if(wmr60InitData.doctypeList){
		$("#wmr60_doctype option").not("[value='']").remove();
		 function matchingDocType(obj) {
	        return obj['warekey'] === wmr60InitData.warekeyList[0]?.combovl && obj['doccate'] === '400';
	    }

	    let findList = wmr60InitData.doctypeList.filter(matchingDocType);

	    $.each(findList, function(key, value) {
	        $('#wmr60_doctype').append($("<option></option>").attr("value", value.doctype).text(value.doctynm)); 
	    });
	}
	//============================================================
	// 창고 Change 이벤트
	//============================================================
	$('#wmr60_warekey').on('change', function(){
		let wmr60InitChange = callAjax('data', 'GET', "/md/common/code/doctype", {warekey : $(this).val(), doccate: '400'});
		let grid = pq.grid("#wmr60_grid");
		
		$("#wmr60_doctype option").not("[value='']").remove();
		$.each(wmr60InitChange, function(key, value) { 
			$('#wmr60_doctype').append($("<option></option>").attr("value",value.combovl).text(value.combonm)); 
		});
	});
	
	
	return wmr60InitData;
}

//============================================================
//input 키보드 엔터 이벤트
//============================================================
function wmr60_keyup(){
	let key = this.event.key || this.event.keyCode;
	if (key === 'Enter' || key === 13) {
		wmr60Search();
	}
}

async function wmr60Search(){
	let grid = pq.grid("#wmr60_grid");
	let data = { 
		warekey : $('#wmr60_warekey').val()
	  , ownerky : $('#wmr60_ownerky').val()
	  , doctype : $('#wmr60_doctype').val()
	  , skudesc : $('#wmr60_skudesc').val()
	};
	
	grid.showLoading();
	let searchInit = await fetchUtil('GET', "/wm/inbound/wmr60/init/1", {warekey: data.warekey});
	
	let response = await fetchUtil("GET", "/wm/inbound/wmr60/grids/1", data);
	
	try{
		if(response.status === 200){
			let wmr60SearchInit = await searchInit.json();
			
			if(wmr60SearchInit.frlockyList){
	    		let column = grid.getColumn({ dataIndx: "locakey"});
	        	let options = wmr60SearchInit.frlockyList.map(function(obj){
	            	let rObj = {};
	            	rObj[obj.combovl] = obj.combonm;
	            	return rObj;
	    		});
	        	column.editor.options = options;
	    	}
			if(wmr60SearchInit.toarekyList){
	    		let column = grid.getColumn({ dataIndx: "toareky"});
	        	let options = wmr60SearchInit.toarekyList.map(function(obj){
	            	let rObj = {};
	            	rObj[obj.combovl] = obj.combonm;
	            	return rObj;
	    		});
	        	column.editor.options = options;
	    	}
			if(wmr60SearchInit.tozonkyList){
	    		let column = grid.getColumn({ dataIndx: "tozonky"});
	        	let options = wmr60SearchInit.tozonkyList.map(function(obj){
	            	let rObj = {};
	            	rObj[obj.combovl] = obj.combonm;
	            	return rObj;
	    		});
	        	column.editor.options = options;
	    	}
			if(wmr60SearchInit.tolockyList){
	    		let column = grid.getColumn({ dataIndx: "tolocky"});
	        	let options = wmr60SearchInit.tolockyList.map(function(obj){
	            	let rObj = {};
	            	rObj[obj.combovl] = obj.combonm;
	            	return rObj;
	    		});
	        	column.editor.options = options;
	    	}
			if(wmr60SearchInit.truntypList){
	    		let column = grid.getColumn({ dataIndx: "truntyp"});
	        	let options = wmr60SearchInit.truntypList.map(function(obj){
	            	let rObj = {};
	            	rObj[obj.combovl] = '[' + obj.combovl + '] ' + obj.combonm;
	            	return rObj;
	    		});
	        	column.editor.options = options;
	    	}
			
			resContent = await response.json();
			if(resContent.length === 0){
				grid.hideLoading();
			}
			grid.option( "dataModel", { data: resContent, recIndx: "rowkey" } );
			grid.refreshDataAndView();
		}
	}catch(err){
		console.log(err);
	}finally{
		grid.hideLoading();
	}
}

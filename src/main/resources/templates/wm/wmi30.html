			function wmi30Init(data) {
				const list = callAjax("data", "GET" , "/wm/inventory/wmi30/init", {});
				const wmi30Item = list.item;
				const item1 = $('#wmi30Ownerky') //화주
				const item2 = $('#wmi30Warekey') //창고
				const item3 = $('#wmi30Stkstat') //재고상태
				
				//화주 ( item1 )
				$(wmi30Item.ownerkyList).each(function(i) {
					item1.append('<option value="' + wmi30Item.ownerkyList[i].combovl + '">' + wmi30Item.ownerkyList[i].combonm + '</option>');
				});
				
				item1.pqSelect({
					deselect: false
				});

				//창고 ( item2 )
				$(wmi30Item.warekeyList).each(function(i) {
					item2.append('<option value="' + wmi30Item.warekeyList[i].combovl + '">' + wmi30Item.warekeyList[i].combonm + '</option>');
				});

				
				//재고상태 ( item3 )
				$(wmi30Item.wstkkyList).each(function(i) {
					item3.append('<option value="' + wmi30Item.wstkkyList[i].combovl + '">' + wmi30Item.wstkkyList[i].combonm + '</option>');
				});

			}
		
		//============================================================
		//검색 Call back
		//============================================================	
			function setWmi30WstkkyCallback(data){
				if(data == null){
					alert('[[#{ms.getDataZero}]]');
					$('#wmi30Grid').pqGrid({ dataModel : { data : [] , recIndx : "rowkey"} });
					$('#wmi30Grid').pqGrid("refreshDataAndView");
					return;
				}else{
					$('#wmi30Grid').pqGrid({ dataModel : { data : data , recIndx : "rowkey"} });
					$('#wmi30Grid').pqGrid("refreshDataAndView");
				}
			}
		
		//============================================================
		// 조회 search
		//============================================================	
			function wmi30SearchList(){
				const grid = pq.grid('#wmi30Grid');
				grid.showLoading();
				let data = { ownerky : $('#wmi30Ownerky option:selected').val() , warekey : $('#wmi30Warekey option:selected').val() , 
						     locakey : $('#wmi30Locakey').val().toUpperCase()   , skumkey : $('#wmi30Skumkey').val().toUpperCase() , 
						     skudesc : $('#wmi30Skudesc').val().toUpperCase()   , stkstat : $('#wmi30Stkstat option:selected').val() };
				let aul = new AjaxUtil_Order("/wm/inventory/wmi30/grids/1" , data , "GET");
				aul.setCallbackSuccess(setWmi30WstkkyCallback);	
				aul.setComplete(function(data){
					grid.hideLoading();
				});
				aul.send();
			}
		//============================================================
		//재고 블럭 처리 Call back
		//============================================================	
			function setWmi30WadjitCallback(data){
				if(data){
// 					alert("[[#{ms.saveSuccess}]]");
				}else{
					alert("[[#{ms.saveErr}]]");
				}
				wmi30SearchList();
			}
		</script>

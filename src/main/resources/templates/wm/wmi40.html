<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="fragments-mainContent" class="tab-content">
	<div class="tab-contents">
		<div class="search-conditions con-box">
			<div class="setting-grid">
				<label class="setting-grid-title" for="wmi40Warekey">[[#{wm.wtakit.taskoky}]]</label>
                  <div class="setting-grid-content">
                      <div class="input-wrapper">
                          <input type="text" id="wmi40Taskoky" th:placeholder="${#messages.msg('wm.wtakit.taskoky')}">
                      </div>
                  </div>
                 <label for="wmi40Warekey" class="setting-grid-title ic-title-nece">[[#{md.mwarma.whnamlc}]]</label>
                 <div class="setting-grid-content">
                     <div class="input-group">
                        <select id="wmi40Warekey"
								data-cb-val="combovl"
								data-cb-name="combonm"
								data-cb-url="/md/common/organization/warehouse-user" data-cb-variable="warekeyList"
								data-cb-select=""
						></select>
                     </div>
                 </div>
                 <label for="wmi40Ownerky" class="setting-grid-title ic-title-nece">[[#{md.mowrma.ownamlc}]]</label>
                 <div class="setting-grid-content">
                     <div class="input-group">
                         <select id="wmi40Ownerky"
                         	data-cb-val="combovl"
							data-cb-name="combonm"
							data-cb-url="/md/common/partner/owner" data-cb-variable="ownerkyList"
							data-cb-select=""
                         ><option value="">[[#{wm.wmi40.all}]]</option></select>
                     </div>
                 </div>
                 <label for="inputGroupSelect01" class="setting-grid-title">[[#{wm.wstkdy.stkdate}]]</label>
				 <div class="setting-grid-content">
					<div class="input-date-group">
						<input type="date" max="2999-12-31" id="wmi40DateFrom"
							th:value="${#dates.format(#dates.createToday(), 'yyyy-MM-dd')}" onkeyup="setInputDateDel(this)" /> <span>~</span> 
						<input type="date" max="2999-12-31" id="wmi40DateTo" 
							th:value="${#dates.format(#dates.createToday(), 'yyyy-MM-dd')}" onkeyup="setInputDateDel(this)" />
					</div>
				</div>
				<label class="setting-grid-title" for="wmi40Skumkey">[[#{md.mskuwc.skumkey}]]</label>
                <div class="setting-grid-content">
                    <div class="input-wrapper">
                        <input type="text" id="wmi40Skumkey" th:placeholder="${#messages.msg('md.mskuma.skumkey')}" name="wmi40Skumkey" />
                    </div>
                </div>
				<label class="setting-grid-title" for="wmi40Skudesc">[[#{md.mskuwc.skudesc}]]</label>
                <div class="setting-grid-content">
                    <div class="input-wrapper">
                        <input type="text" id="wmi40Skudesc" th:placeholder="${#messages.msg('md.mskuma.skudesc')}" name="wmi40Skudesc" />
                    </div>
                </div>
			</div>
			<div class="search-btn-group">
                <button type="button" class="btn-search btn-navy btn-green" id="wmi40Search"><img>[[#{bt.search}]]</button>
                <button type="button" class="btn-clear btn-white" id="wmi40Reset"><img>[[#{bt.reset}]]</button>
            </div>
		</div>
		<div class="search-list">
			<div class="list-top">
				<div class="list-title ic-title-mark">
					<span th:text="${gnatitle}"></span>
				</div>
			</div>
			<div class="list-grid-wrapper con-box">
				<div id="wmi40Grid"></div>
			</div>
		</div>
	</div>
	<script>
      $(function(){
         const pageId = "[[${gprogrid}]]";
         const list = "List";
         let wmi40Grid;
         
      	// 조회 이벤트
		$('#' + pageId + 'Search').click(async function(){
			await wmi40List();
		});
      	
		$('#' + pageId + 'Reset').click(function(){
			resetSearchConditions();
			$('#' + pageId + 'Ownerky').pqSelect("refreshData");
			wmi40Grid.searchList([]);
		});
     
         const wmi40GridCM = [
        	 { title: "rowkey", width: 100, dataType: "string", dataIndx: "rowkey", hidden: true, editable: false},
				{ title: "[[#{wm.wstkdy.compkey}]]", width: 100, dataType: "string", dataIndx: "compkey" , hidden: true },
				{ title: "[[#{wm.wstkdy.stkdate}]]", width: 100, dataType: "string", dataIndx: "stkdate" , editable: false }, 
				{ title: "[[#{wm.wstkdy.stktime}]]", width: 100, dataType: "string", dataIndx: "stktime" , editable: false }, 
				{ title: "[[#{wm.wstkdy.stockky}]]", width: 100, dataType: "string", dataIndx: "stockky" , editable: false },
				{ title: "[[#{grid.whnamlc}]]", width: 100, dataType: "string", dataIndx: "warekey" , editable: false },
				{ title: "[[#{grid.ownamlc}]]", width: 100, dataType: "string", dataIndx: "ownerky" , editable: false },
				{ title: "[[#{md.marema.areanam}]]", width: 100, dataType: "string", dataIndx: "areakey" , editable: false },
				{ title: "[[#{md.mzonma.zonenam}]]", width: 100, dataType: "string", dataIndx: "zonekey" , editable: false },
				{ title: "[[#{md.mlocma.locanam}]]", width: 100, dataType: "string", dataIndx: "locakey" , editable: false },
				{ title: "[[#{wm.wstkdy.lotnmky}]]", width: 100, dataType: "string", dataIndx: "lotnmky", editable: false },
				{ title: "[[#{wm.wstkdy.skumkey}]]", width: 100, dataType: "string", dataIndx: "skumkey" , editable: false },
				{ title: "[[#{wm.wstkdy.skudesc}]]", width: 100, dataType: "string", dataIndx: "skudesc" , editable: false },
				{ title: "[[#{wm.wstkdy.stotqty}]]", width: 100, dataType: "integer", dataIndx: "stotqty" , format: '###,###,###' , editable: false ,
					summary: { type: "sum" },		
				},
				{ title: "[[#{wm.wmi40.avalqty}]]", width: 100, dataType: "integer", dataIndx: "avalqty" , format: '###,###,###' , editable: false ,
					summary: { type: "sum" },		
				},
				{ title: "[[#{wm.wstkdy.sinbqty}]]", width: 100, dataType: "integer", dataIndx: "sinbqty" , format: '###,###,###' , editable: false ,
					summary: { type: "sum" },		
				},
				{ title: "[[#{wm.wstkdy.soubqty}]]", width: 100, dataType: "integer", dataIndx: "soubqty" , format: '###,###,###' , editable: false ,
					summary: { type: "sum" },		
				},
				{ title: "[[#{wm.wstkdy.sbloqty}]]", width: 100, dataType: "integer", dataIndx: "sbloqty" , format: '###,###,###' , editable: false ,
					summary: { type: "sum" },		
				},
				{ title: "[[#{wm.wstkdy.suomkey}]]", width: 100, dataType: "string", dataIndx: "suomkey" , editable: false },
				{ title: "[[#{wm.wstkdy.proddat}]]", width: 100, dataType: "string", dataIndx: "proddat" , editable: false },
				{ title: "[[#{wm.wstkdy.stkstat}]]", width: 100, dataType: "string", dataIndx: "stkstat" , editable: false },
				{ title: "[[#{wm.wstkdy.physrow}]]", width: 100, dataType: "string", dataIndx: "physrow" , editable: false },
				{ title: "[[#{wm.wstkdy.physsec}]]", width: 100, dataType: "string", dataIndx: "physsec" , editable: false }, 
				{ title: "[[#{wm.wstkdy.physflo}]]", width: 100, dataType: "string", dataIndx: "physflo" , editable: false }, 
				{ title: "[[#{wm.wstkdy.rcvdcky}]]", width: 100, dataType: "string", dataIndx: "rcvdcky" , editable: false }, 
				{ title: "[[#{wm.wstkdy.rcvdcit}]]", width: 100, dataType: "string", dataIndx: "rcvdcit" , editable: false }, 
				{ title: "[[#{wm.wtakit.taskoky}]]", width: 100, dataType: "string", dataIndx: "taskoky" , editable: false }, 
				{ title: "[[#{wm.wstkdy.taskoit}]]", width: 100, dataType: "string", dataIndx: "taskoit" , editable: false }, 
				{ title: "[[#{wm.wstkdy.adjsoky}]]", width: 100, dataType: "string", dataIndx: "adjsoky" , editable: false }, 
				{ title: "[[#{wm.wstkdy.adjsoit}]]", width: 100, dataType: "string", dataIndx: "adjsoit" , editable: false }, 
				{ title: "[[#{wm.wstkdy.physoky}]]", width: 100, dataType: "string", dataIndx: "physoky" , editable: false }, 
				{ title: "[[#{wm.wstkdy.physoit}]]", width: 100, dataType: "string", dataIndx: "physoit" , editable: false }, 
				{ title: "[[#{wm.wstkdy.storfky}]]", width: 100, dataType: "string", dataIndx: "storfky" , editable: false }, 
				{ title: "[[#{wm.wstkdy.credate}]]", width: 100, dataType: "string", dataIndx: "credate" , editable: false },
				{ title: "[[#{wm.wstkdy.cretime}]]", width: 100, dataType: "string", dataIndx: "cretime" , editable: false },
				{ title: "[[#{wm.wstkdy.creuser}]]", width: 100, dataType: "string", dataIndx: "creuser" , editable: false },
				{ title: "[[#{wm.wstkdy.lmodate}]]", width: 100, dataType: "string", dataIndx: "lmodate" , editable: false },
				{ title: "[[#{wm.wstkdy.lmotime}]]", width: 100, dataType: "string", dataIndx: "lmotime" , editable: false },
				{ title: "[[#{wm.wstkdy.lmouser}]]", width: 100, dataType: "string", dataIndx: "lmouser" , editable: false },
         ];
         
         wmi40Grid = new GridUtil(wmi40GridCM, pageId , pageId + 'Grid');
         
         wmi40Grid.setFind();
         
         wmi40Grid.setCreate(async function(evt , ui){
        	 await _commonInit();	 
        	 $('#' + pageId + 'Ownerky').pqSelect({
				deselect : false
			 });
         });
         
         wmi40Grid.open();
       
       	 async function wmi40List(){
 			let grid = pq.grid('#' + pageId + 'Grid');
       		let param = {
     			taskoky  : $('#' + pageId + 'Taskoky').val() ,
       			warekey  : $('#' + pageId + 'Warekey option:selected').val() ,
       			ownerky  : $('#' + pageId + 'Ownerky option:selected').val() ,
       			datefrom : $('#' + pageId + 'DateFrom').val() ,
       			dateto   : $('#' + pageId + 'DateTo').val() ,
       			skumkey  : $('#' + pageId + 'Skumkey').val() ,
       			skudesc  : $('#' + pageId + 'Skudesc').val() 
       		};
       		
 			grid.showLoading();
			const wmi40Res = await fetchUtil('GET' , '/wm/inventory/' + pageId + '/grids/1' , param);
			try{
			    if(wmi40Res.status !== 200){
			       throw new Error("[[#{ms.saveErr}]]");
			    }
			    const rData = await wmi40Res.json();
				wmi40Grid.searchList(rData);
				grid.hideLoading();
			}catch(err){
				alert('code : ' + wmi40Res.status + '\n' + err + '\n' + wmi40Res.statusText); // get method 통신의 경우 
				grid.hideLoading();
			}
		 }
      });
      </script>
	</div>
</html>

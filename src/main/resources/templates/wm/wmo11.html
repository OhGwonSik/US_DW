	    wmo11SkuGridObject.setCreate(async function(evt, ui){
	    	initData = await wmo11GridInit();
			const dataKeys = Object.keys(initData);
			const colModels = ui.colModel;
			for(const dataKey of dataKeys){
				for(const colModel of colModels){
					const column = colModel.dataIndx;
			 		const gridColumn = this.getColumn({dataIndx : column});
					if(dataKey.indexOf(column) !== -1){
						const options = initData[dataKey].map(function(obj){
							let rObj = {};
				 			rObj[obj.combovl] = obj.combonm;
				 			return rObj;
						});
			 			gridColumn.editor.options = options;
					}
				}
			}
	    });
	    
	    wmo11SkuGridObject.setChange(function (evt, ui) {
			if (ui.source == 'edit' || ui.source == 'paste'){
				let updateList  = ui.updateList[0];
	       		let rownum 		= ui.updateList[0].rowIndx;
	       		let rowData		= ui.updateList[0].rowData;
	       		let newRow		= ui.updateList[0].newRow;
	       		
	       		if(newRow.hasOwnProperty('tchnqty')){
	       			// 입력수량 - 가용수량 비교
		       		if(newRow.tchnqty > rowData.stotqty){
		       			alert('[[#{wm.wmo11.checkTchnqty}]]');
		       			this.updateRow({
							rowIndx:rownum ,
		    	   		    newRow: { 
		    	   		    	state : 'N',
		    	   		    	tchnqty : 0
		    	   		    }
		    	   		});
		       			
		       		}else{
		       			const itemGrid = pq.grid(wmo11ItemGridId);
		       			const itemCheckedList = pq.grid(wmo11ItemGridId).Checkbox('state').getCheckedNodes().filter((obj) => obj.state === 'Y');
		       			const headCheckedList = pq.grid(wmo11HeadGridId).Checkbox('state').getCheckedNodes().filter((obj) => obj.state === 'Y');
		       			let sumFordqty = 0;
		       			// Head Check Row 확인
		       			if(!headCheckedList.length){
		       				alert('[[#{ms.choiceHeadRowZero}]]');
		       				this.updateRow({
	       						rowIndx: rowData.pq_ri ,
	    	    	   		    newRow: { 
	    	    	   		    	state : 'N',
	    	    	   		    	tchnqty : 0
	    	    	   		    },
	       					});
		       				return;
		       			}
		       			itemCheckedList.forEach((obj) => {
		       				sumFordqty += Number(obj.tchnqty);
		       			});
		       			sumFordqty += Number(newRow['tchnqty']);
		       			
	       				let state   = headCheckedList[0].fordqty < sumFordqty ? 'N' : 'Y';
	       				let tchnqty = headCheckedList[0].fordqty < sumFordqty ? 0 : newRow['tchnqty'];
	       				console.log(tchnqty)
	       				if(headCheckedList[0].fordqty < sumFordqty) {
	       					alert('[[#{wm.wmo11.totalCount}]]' + ' ' + headCheckedList[0].fordqty + '[[#{wm.wmo11.totalQty}]]');
	       					sumFordqty -= Number(newRow['tchnqty']);
	       				}
	       				
       					this.updateRow({
       						rowIndx: rowData.pq_ri ,
    	    	   		    newRow: { 
    	    	   		    	state : state,
    	    	   		    	tchnqty : tchnqty
    	    	   		    },
       					});
		       		}
	       		}
			}
	    });

			const res = await fetchUtil('GET' , '/wm/outbound/' + pageId +'/grid/init' ,'');
			if(res.ok){
				return res.json();	
			}
			return;
		};

		//============================================================
		async function wmo11SearchInitData(){
			const res = await fetchUtil('GET' , '/wm/outbound/' + pageId + '/init');
			if(res.ok){
				return res.json();	
			}
			return;
		}
		
		async function comboInit(param){
			const item = param.item;
			comboCreateData(null, pageId + 'Warekey', item.warekeyList, {combovl : 'combovl', combonm : 'combonm'});
			comboCreateData(null, pageId + 'Ownerky', item.ownerkyList, {combovl : 'combovl', combonm : 'combonm'});
			comboCreateData(null, pageId + 'Picktyp', item.picktypList);
			$('#'+pageId+'ShsdateFrom').val(moment().subtract(1, 'days').format('YYYY-MM-DD'));
			$("#"+pageId+"ShsdateTo").val(moment().format("YYYY-MM-DD"));
		}
	   	
	  	//============================================================	 
		//  HeadGrid 조회
		//============================================================
		async function searchWmo11AllGroupList(){
	  		let headGrid = pq.grid(wmo11HeadGridId);
	  		let itemGrid = pq.grid(wmo11ItemGridId);
	  		
			let param = { 
				warekey : $('#' + pageId + 'Warekey').val(),
				ownerky : $('#' + pageId + 'Ownerky').val(),
				allgrky : $('#' + pageId + 'Allgrky').val(),
				picktyp : $('#' + pageId + 'Picktyp').val(),
				shsdatefrom : $('#' + pageId + 'ShsdateFrom').val().replaceAll('-',''),
				shsdateto : $('#' + pageId + 'ShsdateTo').val().replaceAll('-','')
			}
			
			headGrid.showLoading();
			itemGrid.showLoading();

			const res = await fetchUtil('GET' , '/wm/outbound/' + pageId + '/grid/1',  param);
			if(res.ok){
				const resData = await res.json();
				
				headGrid.option( 'dataModel', { data: resData } );
		        headGrid.refreshDataAndView();
		        
		        itemGrid.option( 'dataModel', { data: [] } );
		        itemGrid.refreshDataAndView();
			}
			
			headGrid.hideLoading();
			itemGrid.hideLoading();   
		}
	  	
		//============================================================	 
		//  ItemGrid 조회
		//============================================================
		async function searchWmo11SkuList(param){
			const itemGrid = pq.grid(wmo11ItemGridId);
			if(param != null){
				itemGrid.showLoading();
				
				const res = await fetchUtil('GET' , '/wm/outbound/' + pageId + '/grid/2',  param);
				if(res.ok){
					const resData = await res.json();
				 	
					itemGrid.option( 'dataModel', { data: resData });
				 	itemGrid.refreshDataAndView();
				}
				itemGrid.hideLoading();
			}
		}
		
		//============================================================	 
		//  검색영역 콤보박스 생성
		//============================================================
		function comboCreateData(gridnm, colnm, obj, mapob, type){
			if(!gridnm){
				$("#" + colnm + " option").not("[value='']").remove();	//초기화
				if(mapob != null && mapob.combovl != undefined && mapob.combonm != undefined){
					$.each(obj, function(key, value) {
						$('#' + colnm) .append($("<option></option>").attr("value",value[mapob.combovl]).text(value[mapob.combonm])); 
					});
				}else{
					$.each(obj, function(key, value) { 
						$('#' + colnm) .append($("<option></option>").attr("value",value.combovl).text(value.combonm)); 
					});
				}
				
				if(colnm === pageId + "[[#{wm.wmo11.ownerkyValue}]]"){
					$('#' + colnm).pqSelect({
						deselect : false
					});
				}
			}
			else{
				let grid 	= pq.grid("#" + gridnm);
				let column 	= grid.getColumn({ dataIndx: colnm });
	
				let options = obj.map(function(obj){
		        	let rObj = {};
		        	if(mapob != null && mapob.combovl != undefined && mapob.combonm != undefined){
		        		rObj[obj[mapob.combovl]] = obj[mapob.combonm];
		        	}else{
						rObj[obj.combovl] = obj.combonm;
		        	}
					return rObj;
				});
		
				column.editor.options = options;
			}
		}
		
	});
	</script>

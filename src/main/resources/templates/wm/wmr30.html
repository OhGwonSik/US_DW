<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="fragments-mainContent">
	<div class="tab-contents">
		<div class="location"></div>
		<div class="search-conditions con-box">
			<div class="setting-grid">
				<label for="wmr30_warekey" class="setting-grid-title ic-title-nece">[[#{md.mwarma.whnamlc}]]</label>
				<div class="setting-grid-content">
					<div class="input-group">
						<select id="wmr30_warekey"></select>
					</div>
				</div>
				<label for="wmr30_ownerky" class="setting-grid-title ic-title-nece">[[#{md.mowrma.ownamlc}]]</label>
				<div class="setting-grid-content">
					<div class="input-group">
						<select id="wmr30_ownerky"></select>
					</div>
				</div>
			</div>
		</div>
		<div class="search-list">
			<div class="list-top">
				<div class="list-title ic-title-mark">
					<span th:text="${gnatitle}"></span>
				</div>
				<div class="edit-btn-wrapper">
					<button class="btn-navy btn-green" id="wmr30_save"><img class="ic-bt-save">[[#{bt.save}]]</button>
				</div>
			</div>
			<div class="list-grid-wrapper con-box">
				<div id="wmr30_grid"></div>
			</div>
		</div>
	</div>
	
<script>
$(function(){
	/*  wmr30 - 기타입고등록
	*   최초 생성일시	: 2023-12-12 11:30
	*   최초 생성자	: 최강호 
	*   설명			: ASN번호가 등록되지 않은 재고에 대해 등록하는 페이지
	*   수정 내역		:
	*   수정일시		:
	*	수정자		: 
	*	변경 사항		: 
	*/
	let wmr30InitData = wmr30Init();
	let wmr30List = wmr30SkuList();
	let wmr30ChangeInit; //전체SKU를 담을 변수
	
	$("#wmr30_save").click(async function () {
		let grid = pq.grid("#wmr30_grid"); 
		let gridCheck = grid.getChanges({ all: true });
			gridCheck.addList = gridCheck.addList.filter(function(item) {
				  return item.state === true;
			});//state가 true인 값만 가져오기
		
		let gridCheckLength = gridCheck.addList.filter(item => item.state === true);
		
		if(gridCheck.addList.length>0){
			//============================================================	 
	    	//체크된 데이터 값 체크
	    	//============================================================
			for(i=0;i<gridCheck.addList.length;i++){
				if(!gridCheck.addList[i].warekey){
					alert("[[#{wm.wasnif.warekey}]]" + "[[#{ms.choiceValue}]]");	//창고를/을 선택해주세요.
					grid.setSelection( {rowIndx: gridCheck.addList[i].pq_ri, dataIndx: 'warekey'} );
					return false;
				}
				if(!gridCheck.addList[i].ownerky){
					alert("[[#{wm.wasnif.ownerky}]]" + "[[#{ms.choiceValue}]]");	//화주를/을 선택해주세요.
					grid.setSelection( {rowIndx: gridCheck.addList[i].pq_ri, dataIndx: 'ownerky'} );
					return false;
				}
				
				if(!gridCheck.addList[i].skumkey){
					alert("[[#{wm.wasnif.skumkey}]]" + "[[#{ms.choiceValue}]]");	//상품를/을 선택해주세요.
					grid.setSelection( {rowIndx: gridCheck.addList[i].pq_ri, dataIndx: 'skumkey'} );
					return false;
				}
				if(!gridCheck.addList[i].rcveqty){
					alert("[[#{wm.wmr30.rcveqty}]]" + "[[#{ms.inputValue}]]");		//입하대상 수량를/을 입력해주세요.
					grid.editCell( { rowIndx: gridCheck.addList[i].pq_ri, dataIndx: "rcveqty" } );
					return false;
				}
				if(!gridCheck.addList[i].rcvrscd){
					alert("[[#{wm.wmr30.rcvrscd}]]" + "[[#{ms.choiceValue}]]");	//입고 사유코드를/을 선택해주세요.
					grid.setSelection( {rowIndx: gridCheck.addList[i].pq_ri, dataIndx: 'rcvrscd'} );
					return false;
				}
			}
			
			let result = confirm("[[#{ms.checksave}]]");
			if(result == true){
				grid.showLoading();
				try{
					let response = await fetchUtil('POST', "/wm/inbound/wmr30/grids/1", gridCheck);
					if(response.status === 200){
	          			//alert("[[#{ms.saveSuccess}]]"); //저장 성공하였습니다.
						grid.option( "dataModel", { data: [] } );
	        			grid.refreshDataAndView();
	        			grid.hideLoading();
		        	}
				} catch(err){
					console.log(err);
				} finally{
					grid.hideLoading();
				}
			}
		}else{
			alert("[[#{ms.choiceRowZero}]]"); //선택된 row가 없습니다
		}
	});
	
	let wmr30GridCM = [
		{ title: "", dataType: 'bool', dataIndx: "state", maxWidth: 30, minWidth: 30,
            type: 'checkbox', sortable: false, editor: false,
            cb: { all: false, header: true }
     	},
		{ title: "[[#{wm.wasnif.compkey}]]", dataType: "string",  dataIndx: "compkey", editable: false, hidden: true },	//Company Key
		{ title: "[[#{grid.whnamlc}]]", dataType: "string",  dataIndx: "warekey", editable: false,
			editor: {
				type: "select",
				init: function(ui){
					 ui.$cell.find("select").pqSelect({ search:false, singlePlaceholder: ''});
					 setTimeout(function () {
	                	 ui.$cell.find("select").pqSelect('open'); 
	                 }, 250); 
				   },
				options: [],
				prepend : { "" : '[[#{ms.selectOption}]]' }
				},
				render: gridRenderAndValue
				
		},	//창고
		{ title: "[[#{grid.ownamlc}]]", dataType: "string",  dataIndx: "ownerky", editable: false,
			editor: {
				type: "select",
				init: function(ui){
					 ui.$cell.find("select").pqSelect({ search:false, singlePlaceholder: '' });
					 setTimeout(function () {
	                	 ui.$cell.find("select").pqSelect('open'); 
	                 }, 250); 
				   },
				options: [],
				prepend : { "" : '[[#{ms.selectOption}]]' }
				},
				render: gridRenderAndValue
		},	//화주
		{ title: "[[#{wm.wasnif.doccate}]]", dataType: "string",  dataIndx: "doccate", editable: false,
			editor: {
	                type: "text",
	            },
			 render : gridRenderAndValue	
		},	//문서유형
		{ title: "[[#{wm.wasnif.doctype}]]", dataType: "string",  dataIndx: "doctype", editable: false,
			editor: {
	                type: "text",
	            },
			 render : gridRenderAndValue
		},	//문서타입
		{ title: "[[#{wm.wmr30.vendkey}]]", dataType: "string",  dataIndx: "vendkey",
			styleHead: { 'background-color':'[[#{grid.styleHead02}]]' },
			editor: {
                type: "select",
                init: function (ui) {
                	ui.$cell.find("select").pqSelect({search: false, multiplePlaceholder: '' });
                	setTimeout(function () {
	                	ui.$cell.find("select").pqSelect('open'); 
	                }, 250);
                },
                options: [],
                prepend : { "" : '[[#{ms.selectOption}]]' }
            },
            render: gridRenderAndValue
		},	//입고처
		{ title: "[[#{grid.skuCode}]]", dataType: "string",  dataIndx: "skumkey",	//부품
			styleHead: { 'background-color':'[[#{grid.styleHead01}]]' },
			editor: {
                type: "select",
                attr: "multiple='multiple'",
                init: function (ui) {
                	ui.$cell.find("select").pqSelect({search: true, multiplePlaceholder: '', checkbox :true, searchId : "wmr30_skumkey" });
                	setTimeout(function () {
	                	ui.$cell.find("select").pqSelect('open'); 
	                }, 250);
                },
                options: []
            },
			render: gridRenderAndValue
		},
		{ title: "[[#{wm.wmr30.rcveqty}]]", dataType: "integer", dataIndx: "rcveqty",	//입하대상 수량
			styleHead: { 'background-color':'[[#{grid.styleHead01}]]' },
			summary: { type: "sum" },
			format :  "#,###",
			validations : [{ type: 'gte', value: 0, msg: '[[#{ms.validations.minLenLength(1)}]]'},
						   { type: 'lte', value: 1000000000, msg: "[[#{ms.validations.maxLenLength(9)}]]" },
						   { type : 'regexp', value : /^[0-9]{1,9}$/, msg: '[[#{ms.validations.maxLenLength(9)}]]'}]
		},
		{ title: "[[#{wm.wmi10.avalqty}]]", dataType: "integer",  dataIndx: "stotqty", format: '###,###,###', editable: false }, //가용수량
		{ title: "[[#{wm.wasnif.auomkey}]]", dataType: "string",  dataIndx: "auomkey", editable: false },
		{ title: "[[#{wm.wmr30.rcvrscd}]]", dataType: "string",  dataIndx: "rcvrscd",	//입고 사유코드
			styleHead: { 'background-color':'[[#{grid.styleHead01}]]' },
			editor: {
				type: "select",
				init: function (ui) { 
					ui.$cell.find("select").pqSelect({ search:false, singlePlaceholder: '' });
					setTimeout(function () {
	                	ui.$cell.find("select").pqSelect('open'); 
	                }, 250);
				},
				options: [],
				prepend : { "" : '[[#{ms.selectOption}]]' }
			},
			render: gridRenderAndValue
		},
		{ title: "[[#{wm.wmr30.rcvrsnm}]]", dataType: "string",  dataIndx: "rcvrsnm",	//입고 내용
			styleHead: { 'background-color':'[[#{grid.styleHead02}]]' },
			validations : [{ type: 'minLen', value: 0, warn: true }, { type: 'maxLen', value: 200, msg: "[[#{ms.validations.maxLenLength(200)}]]" }]
		},
		{ title: "[[#{wm.wasnif.asndate}]]", dataType: "string",  dataIndx: "asndate", editable: false }, //일자
		{ title: "[[#{wm.wstkky.expidat}]]", dataType: "date", format:"yy-mm-dd",  dataIndx: "expidat", hidden: true,
			styleHead: { 'background-color':'[[#{grid.styleHead02}]]' },
			cls: 'pq-calendar pq-side-icon',
			editor: {
				type: 'textbox',
				init: dateEditor,
				getData: function (ui) {
					return ui.$cell.find("input").val();
				}
			},
			validations: [ { type: 'regexp', value: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$', msg: 'Not in date format', warn: true } ]
		},//유통기간
		{ title: "[[#{wm.wmr30.boxqty}]]", dataType: "integer",  dataIndx: "boxqty", editable: false }//박스갯수
	];
	
	let wmr30Grid = new GridUtil(wmr30GridCM, '[[${gprogrid}]]', 'wmr30_grid');
	
	wmr30Grid.setCreate(async function (evt, ui) {
		let grid = pq.grid('#wmr30_grid');
		grid.showLoading();
		let wmr30InitList = await wmr30InitData;
		$('#wmr30_ownerky').pqSelect({
			deselect: false
		});
		if(wmr30InitList.warekeyList){
			let column = this.getColumn({ dataIndx: "warekey" });
			let options = wmr30InitList.warekeyList.map(function(obj){
            	let rObj = {};
            	rObj[obj.combovl] = obj.combonm;
            	return rObj;
			});
			column.editor.options = options;
		}
		if(wmr30InitList.ownerkyList){
			let column = this.getColumn({ dataIndx: "ownerky" });
			let options = wmr30InitList.ownerkyList.map(function(obj){
            	let rObj = {};
            	rObj[obj.combovl] = obj.combonm;
            	return rObj;
			});
			column.editor.options = options;
		}
		if(wmr30InitList.doccateList){
			let column = this.getColumn({ dataIndx: "doccate" });
			let options = wmr30InitList.doccateList.map(function(obj){
            	let rObj = {};
            	rObj[obj.doccate] = obj.docctnm;
            	return rObj;
			});
			column.editor.options = options;
		}
		if(wmr30InitList.doctypeList){
			let column = this.getColumn({ dataIndx: "doctype" });
			let options = wmr30InitList.doctypeList.map(function(obj){
            	let rObj = {};
            	rObj[obj.combovl] = obj.combonm;
            	return rObj;
			});
			column.editor.options = options;
		}
		let vendkeyList = await fetchUtil('GET', '/md/common/partner/vender', {ptnrtyp : 'VENDER'});
		let wmr30Vendkey = await vendkeyList.json();
		if(wmr30Vendkey){
		    let column = this.getColumn({  dataIndx: "vendkey"});
			let options = wmr30Vendkey.map(function(obj){
	           	let rObj = {};
	           	rObj[obj.combovl] = obj.combonm;
	           	return rObj;
	   		});
	       		column.editor.options = options;
   		}
		
		wmr30ChangeInit = await wmr30List;
		if(wmr30ChangeInit){
			let column = this.getColumn({  dataIndx: "skumkey"});
			let options = wmr30ChangeInit.map(function(obj){
	           	let rObj = {};
	           	rObj[obj.combovl] = '[' + obj.combovl + ']' + obj.combonm + '([[#{wm.wmi10.avalqty}]] :' + obj.stotqty + ')';
	           	return rObj;
	   		});
	       	column.editor.options = options;
		}
		let wmr30ReasonList = await fetchUtil('GET', "/md/common/code/reason-code", {doccate: '400', doctype: '490'})
		wmr30Rcvrscd = await wmr30ReasonList.json();
		if(wmr30Rcvrscd){
			let column = this.getColumn({  dataIndx: "rcvrscd"});
			let options = wmr30Rcvrscd.map(function(obj){
            	let rObj = {};
            	rObj[obj.combovl] = obj.combonm;
            	return rObj;
    		});
        	column.editor.options = options;
		}
		grid.hideLoading();
	});

	
	wmr30Grid.setCellClick(function(evt, ui){
		let data = {
			warekey : ui.rowData.warekey
		   ,ownerky : ui.rowData.ownerky
		   ,doccate : ui.rowData.doccate
		   ,doctype : ui.rowData.doctype
		   ,rscate1 : "NORMAL"
		};
		if(ui.dataIndx === "skumkey"){
			const skuList = wmr30ChangeInit.filter(item => item.warekey === data.warekey && item.ownerky === data.ownerky);
			if(skuList){
				let column = this.getColumn({ dataIndx: "skumkey" });
				let options = skuList.map(function(obj){
	            	let rObj = {};
	            	rObj[obj.combovl] = '[' + obj.combovl + ']' + obj.combonm + '([[#{wm.wmi10.avalqty}]] :' + obj.stotqty + ')';
	            	return rObj;
	    		});
	        	column.editor.options = options;
			}
		}
	});
	
	wmr30Grid.setCellKeyDown(function(evt, ui){ //enter 이벤트
		if(evt.key === 'Enter'){
			let data = {
					warekey : ui.rowData.warekey
				   ,ownerky : ui.rowData.ownerky
				   ,doccate : ui.rowData.doccate
				   ,doctype : ui.rowData.doctype
				   ,rscate1 : "NORMAL"
				};
			if(ui.dataIndx == "skumkey" && data.warekey && data.ownerky){
				const skuList = wmr30ChangeInit.filter(item => item.warekey === data.warekey && item.ownerky === data.ownerky);
				if(skuList){
					let column = this.getColumn({ dataIndx: "skumkey" });
					let options = skuList.map(function(obj){
		            	let rObj = {};
		            	rObj[obj.combovl] = '[' + obj.combovl + ']' + obj.combonm + '([[#{wm.wmi10.avalqty}]] :' + obj.stotqty + ')';
		            	return rObj;
		    		});
		        	column.editor.options = options;
				}
			}
		}
		
	});
	
	wmr30Grid.setAdd(function(evt, ui){
		wmr30WindowKeyAddRow();
	});
	
	wmr30Grid.setDelete(function(evt, ui){
		wmr30WindowKeyDeleteRow();
	});
	
	//창고명과 화주가 이전 Row의 값과 다를경우 제거하는 이벤트
	wmr30Grid.setCellSave(function(evt, ui){
		if(ui.newVal !== null){
			if(ui.dataIndx === 'warekey' || ui.dataIndx === 'ownerky'){
				let gridList = this.getData().filter((obj) => {
					return obj.state === true && (obj.pq_ri !== ui.rowIndx);	
				});
				
				if(gridList){
					for(const checkList of gridList){
						if(checkList[ui.dataIndx] !== '' && checkList[ui.dataIndx] !== null){
							if(checkList[ui.dataIndx] !== ui.newVal){
								alert('[[#{wm.wmr30.warekeyAndOwnerky}]]');
								this.deleteRow({ rowIndx: ui.rowIndx});
								return;
							}
						}
					}
				}
			}
		}
	});
	
	wmr30Grid.setChange(function (evt, ui) {
		if(ui.source === 'edit'){
			let grid = pq.grid('#wmr30_grid');
			let skumkeyArr;
			if(ui.updateList[0]){
				if(ui.updateList[0].rowData.skumkey){
					skumkeyArr = ui.updateList[0].rowData.skumkey.split(',');
					if(skumkeyArr.length >= 1){
						ui.updateList[0].rowData.skumkey = skumkeyArr[0];
					}
				}
			}
		} else if(ui.source === 'paste'){
			if(ui.addList.length > 0){
				let formattedDate = getTodayDate();
				let boxqty = 0;
				let boxqtyList;
				let data;
				let todayDate = getTodayDate();
				//붙여넣기로 Row가 추가되는 경우
				for(i=0; i<ui.addList.length; i++){
						boxqtyList = wmr30ChangeInit.filter(obj => obj.warekey ===  $('#wmr30_warekey option:selected').val()
		           				&& obj.ownerky === $('#wmr30_ownerky option:selected').val()
		           				&& obj.combovl === ui.addList[i].rowData.skumkey
		           		);
						
						if(boxqtyList.length >= 1){
							data = { 
		           					warekey : $('#wmr30_warekey option:selected').val(), 
		              				ownerky : $('#wmr30_ownerky option:selected').val(), 
			   	            		packkey : boxqtyList[0].packkey,
			   	            		truntyp : boxqtyList[0].truntyp
			   	        		};
						}
						
						ui.addList[i].newRow.state = true;
						ui.addList[i].newRow.compkey = "[[${userattr.compkey}]]";
						ui.addList[i].newRow.warekey = $('#wmr30_warekey option:selected').val(); 
						ui.addList[i].newRow.ownerky = $('#wmr30_ownerky option:selected').val(); 
						ui.addList[i].newRow.doccate = '400'; 
						ui.addList[i].newRow.doctype = '490'; 
						ui.addList[i].newRow.asndate = formattedDate;
						
						let box;
						
						if(boxqtyList.length >= 1){
							ui.addList[i].newRow.skumkey = boxqtyList[0].combovl;
							ui.addList[i].newRow.stotqty = boxqtyList[0].stotqty;
	           				ui.addList[i].newRow.auomkey = boxqtyList[0].suomkey;
						}
						
						//입하대상수량이 추가된 경우 박스수량을 가져오는 이벤트
						if(ui.addList[i].newRow.rcveqty){
							box = callAjax('data', 'GET', "/wm/inbound/boxqty", data);
	           				
							if(box.length !== 0){
								let result = Math.ceil(Math.ceil(Number(ui.addList[i].newRow.rcveqty) / box[0].packqty ));
		           				if(Number.isInteger(result)){
		           					boxqty = result;
		           				} else {
		           					boxqty = 1;
		           				}
							} else boxqty = 1;
							
		           		}
						//[사용안함] 2023-12-13 09:00 로직변경으로 주석 처리
// 						if(ui.addList[i].newRow.expidat){
			          		
// 			          		let updateShelife = new Date(ui.addList[i].newRow.expidat);
// 	                  		let updateDate = new Date(todayDate);
// 	                  		let diff = Math.abs(updateShelife.getTime() - updateDate.getTime());
// 	                  		diff = Math.ceil(diff / (1000 * 60 * 60 * 24));
			          		
// 						}
						ui.addList[i].rowData.boxqty = boxqty;
				}
			}
		}
		
	});
	
	wmr30Grid.setBeforeValidate(function (evt, ui) {
		let todayDate = getTodayDate();
		
       	if (ui.source == 'edit'){
	  		let updateNewRow 		= ui.updateList[0].newRow;
  			let updateOldRow 		= ui.updateList[0].oldRow;
  			let updateRowData 		= ui.updateList[0].rowData;
  			let skumkeyList 		= ui.updateList[0].newRow.skumkey == undefined ? updateRowData.skumkey : ui.updateList[0].newRow.skumkey;
  			let boxqty = 0;
           	ui.updateList[0].rowData.state = true;
            //state 값은 true로 변경되었음에도 화면에 반영되지 않아 추가
           	let grid = pq.grid('#wmr30_grid');
			for(let i = 0; i<ui.updateList.length; i++){
				if(ui.updateList[i].newRow){
					grid.refreshCell({rowIndx: ui.updateList[i].rowIndx, dataIndx: 'state'});
				}
			}
           	
           	let result;
           	let boxResult;
           		
           	//입하대상수량 입력시 박스수량을 가져오는 이벤트
           	if(updateRowData.skumkey && updateNewRow.rcveqty){
           		let boxqtyList = wmr30ChangeInit.filter(obj => obj.warekey ===  ui.updateList[0].rowData.warekey
           				&& obj.ownerky === ui.updateList[0].rowData.ownerky
           				&& obj.combovl === skumkeyList
           		);
           		
           		let data = {
            			ownerky : ui.updateList[0].rowData.ownerky, 
            			warekey : ui.updateList[0].rowData.warekey, 
            			packkey : boxqtyList[0].packkey,
            			truntyp : boxqtyList[0].truntyp
       				  };
           		
	       		let box = callAjax('data', 'GET', "/wm/inbound/boxqty", data);

async function wmr30Init(){
	let wmr30Init = await fetchUtil('GET', "/wm/inbound/wmr30/init/1");
	let wmr30InitData = await wmr30Init.json();
	let grid = pq.grid("#wmr30_grid");
	
	// 창고 리스트
	if(wmr30InitData.warekeyList){
		$("#wmr30_warekey option").not("[value='']").remove();
		$.each(wmr30InitData.warekeyList, function(key, value) {
			$('#wmr30_warekey').append($("<option></option>").attr("value",value.combovl).text(value.combonm)); 
		});
	}
	//화주 리스트
	if(wmr30InitData.ownerkyList){
		$("#wmr30_ownerky option").not("[value='']").remove();
		$.each(wmr30InitData.ownerkyList, function(key, value) {
			$('#wmr30_ownerky').append($("<option></option>").attr("value",value.combovl).text(value.combonm)); 
		});
	}
	
	let prevWarekey = $('#wmr30_warekey').val();
	let prevOwnerky = $('#wmr30_ownerky').val();
	
	$("#wmr30_warekey").on('change', async function(){
		if(grid.getData().length >=1){
			if(confirm('[[#{ms.listViewRollback}]]')){
				let wmr30ReasonList = await fetchUtil('GET', "/md/common/code/reason-code", {doccate: '400', doctype: '490', warekey: $('#wmr30_warekey').val()})
				wmr30Rcvrscd = await wmr30ReasonList.json();
				if(wmr30Rcvrscd){
					let column = grid.getColumn({  dataIndx: "rcvrscd"});
					let options = wmr30Rcvrscd.map(function(obj){
		            	let rObj = {};
		            	rObj[obj.combovl] = obj.combonm;
		            	return rObj;
		    		});
		        	column.editor.options = options;
				}
				
				grid.option('dataModel', { data: [] });
				grid.refreshDataAndView();
			} else{
				document.querySelector('#wmr30_warekey').value = prevWarekey;
			}
		} else{
			let wmr30ReasonList = await fetchUtil('GET', "/md/common/code/reason-code", {doccate: '400', doctype: '490', warekey: $('#wmr30_warekey').val()})
			wmr30Rcvrscd = await wmr30ReasonList.json();
			if(wmr30Rcvrscd){
				let column = grid.getColumn({  dataIndx: "rcvrscd"});
				let options = wmr30Rcvrscd.map(function(obj){
	            	let rObj = {};
	            	rObj[obj.combovl] = obj.combonm;
	            	return rObj;
	    		});
	        	column.editor.options = options;
			}
			prevWarekey = $('#wmr30_warekey').val();
		}
	});
	
	$("#wmr30_ownerky").on('change', async function(){
		if(grid.getData().length >=1){
			if(confirm('[[#{ms.listViewRollback}]]')){
				grid.option('dataModel', { data: [] });
				grid.refreshDataAndView();
			} else{
				document.querySelector('#wmr30_ownerky').value = prevOwnerky;
				$('#wmr30_ownerky').pqSelect('refreshData');
			}
		} else{
			prevOwnerky = $('#wmr30_ownerky').val();
		}
	});
	return wmr30InitData;
}

function wmr30WindowKeyAddRow(){
	let grid = pq.grid("#wmr30_grid");
	
	let formattedDate = getTodayDate();
	let addRowWarekey = $('#wmr30_warekey option:selected').val();
	let addRowOwnerky = $('#wmr30_ownerky option:selected').val();
	let gridList = grid.getData();
	
	let rowData = { 
		state   : true,
		warekey : addRowWarekey,
		ownerky : addRowOwnerky,
		compkey : "[[${userattr.compkey}]]",
		doccate : '400', 
		doctype : '490', 
		asndate : formattedDate,
		boxqty  : 0
	};
	let rowIndx = grid.addRow({ rowData: rowData, checkEditable: false });
	grid.goToPage({ rowIndx: rowIndx });
}

//============================================================	
//window key delete row 이벤트
//============================================================
function wmr30WindowKeyDeleteRow(){
	let grid = pq.grid("#wmr30_grid"), checkList = grid.Checkbox('state').getCheckedNodes(), rows = [];
	
	if(checkList.length > 0){
		for(let i=0; i<checkList.length; i++){
			rows.push({rowIndx : checkList[i].pq_ri});
        }
        
		setTimeout(function () {
    		let ans = window.confirm("[[#{ms.rowDelete}]]");	//행을 삭제하시겠습니까?
    		if (ans) {
            	grid.deleteRow({ rowList: rows });
            	grid.setSelection(null);
            }
		});
	}else if(checkList.length == 0){
		alert("[[#{ms.choiceRowZero}]]");	//선택된 Row가 없습니다.
	}
}

//================================
//ASN Date
//================================
function getTodayDate(){
	let today = new Date();
	let year = today.getFullYear();
	let month = today.getMonth() + 1;
	let date = today.getDate();
	
		if (month < 10) {
		  month = '0' + month;
		}
		if (date < 10) {
		  date = '0' + date;
		}
	let formattedDate =  year + '-' + month + '-' + date;
	return formattedDate;
}

	<script>

	$(function() {
		
		const bmb10Init = initBmb10();
		$('#bmb10Btrdate').val(moment().format('YYYY-MM')); //현재년도 현재 월

		
		//============================================================
		//검색영역 창고나 정산년월 변경되면 그리드 초기화
		//============================================================
 	    $("#bmb10Warekey, #bmb10Btrdate").change(function() { 
	    	//resetSearchConditions();

	        const grid = pq.grid('#bmb10Grid');
	        if(grid.pdata.length > 0){
	        	const result = confirm('[[#{ms.listViewRollback}]]');
	        	if(result){
	        		grid.option('dataModel', {data: []});
	        		grid.refreshDataAndView();
	        		grid.refreshDataAndView();
	                grid.hideLoading();
	        	}
	        }
	    }); 
		
		
		
		$('#bmb10Save').click(function(){
			const grid = pq.grid('#bmb10Grid'), gridCheck = grid.Checkbox('state').getCheckedNodes();
			const gridChange = grid.getChanges({all:true});
				  gridChange.addList = gridChange.addList.filter(function(item) {
			            return item.state !== false;
			       });//state가 true인 값만 가져오기
			      gridChange.updateList = gridChange.updateList.filter(function(item) {
			            return item.state !== false;
			       });//state가 true인 값만 가져오기
 			
			
			if(gridCheck.length>0){
				//============================================================	 
		    	//체크 데이터 중 필수 값 체크
		    	//============================================================
				for(let i=0; i<gridCheck.length; i++){
		    	  	if(!gridCheck[i].vehicky){
		    	  		alert((gridCheck[i].pq_ri+1)+'[[#{ms.row}]] '+'[[#{ms.requiredValue}]]');	//필수입력 값을 입력해주세요.
						grid.editCell({rowIndx: gridCheck[i].pq_ri, dataIndx: 'vehicky'});
		    	  		return false;
		    	  	}

		    	}	
		    		
				//===============================================================	
				//체크된 데이터 중복 체크
				//===============================================================
					let gridData = grid.getData();
					let checkedGridData = gridData.filter(item => item['state'] === true);

				//updateList 체크 데이터 정제
				for(let z=0; z<gridChange.updateList.length; z++){
					if(gridChange.updateList[z].state !== true){
						gridChange.updateList.splice(z, 1);
						gridChange.oldList.splice(z, 1);
					}
				}
				
				//addList 체크 데이터 정제
				for(let x=0; x<gridChange.addList.length; x++){
					if(gridChange.addList[x].state !== true){
						gridChange.addList.splice(x, 1);
					}
				}
			
				let result = confirm('[[#{ms.checksave}]]');
				if(result === true){
					const data = gridChange;
					saveBmb10List(data);
				}
			} else {
				alert('[[#{ms.choiceRowZero}]]');
			} 
		});
		
		
		function initBmb10(){
			let bmb10Init = callAjax("data", "GET", "/bm/billing/bmb10/init", {});

			// 창고 리스트
			if(bmb10Init.item.warekeyList){
				$("#bmb10Warekey option").not("[value='']").remove();
				$.each(bmb10Init.item.warekeyList, function(key, value) {
					$('#bmb10Warekey').append($("<option></option>").attr("value",value.combovl).text(value.combonm)); 
				});
			}
			return bmb10Init;
		}

	            	var rObj = {};
	            	rObj[obj.combovl] = obj.combonm;

	    		});

	            	var rObj = {};
	            	rObj[obj.vehicky] = obj.vhcsnam;
	            	return rObj;
	    		});

	    	}

		bmb10Grid.setAdd(function(evt, ui){
			let rowData = { state : true,
							compkey : "[[${userattr.compkey}]]",
							warekey : $('#bmb10Warekey').val(),

							btrdate : $('#bmb10Btrdate').val(),

							vatval : 0, //부가세(차주)
							sumval : 0 //합계(차주)

			this.goToPage({ rowIndx : rowIndx });
			//this.editCell({ rowIndx : rowIndx, dataIndx: 'vehicky' });
		});
		
		bmb10Grid.setFind();
		

		function validateNegativeValue(grid, ui, dataIndx) {
		    if (ui.rowData[dataIndx] < 0) {
		        alert('[[#{bm.bmb10.notMinus}]]'); //공제비는 음수 입력이 불가능합니다.
		        grid.updateRow({ rowIndx: ui.rowIndx, newRow: { [dataIndx]: '' }, checkEditable: false });
		    }
		}

		bmb10Grid.setCellSave(function(evt, ui) {
		    this.refreshRow({ rowIndx: ui.rowIndx });

		    const validatedColumns = ['transportation', 'supplyprice', 'vatval', 'sumval'
									, 'btmitct', 'btprmct', 'btvatct', 'btenvct', 'btoduct'
									, 'btdpsct', 'btcvict', 'btiaict'];
		    
		    if (validatedColumns.includes(ui.dataIndx)) {
		        validateNegativeValue(this, ui, ui.dataIndx);
		    }
		    
		});

		 
		 bmb10Grid.setCellClick(function(evt, ui){
				const initList = bmb10Init.item;
			    // 창고값 가져오기
			    const warekeyValue = ui.rowData.warekey;
			    
			    if (initList.vehickyList) {
			        // 창고 고려하여 차량코드
				    const foundVehicky = initList.vehickyList.filter(element => {
				        if (warekeyValue) {
				        	return element.warekey === warekeyValue;
				        } 
				        return false;
			        });
			        // 문서 타입 컬럼에 옵션 설정
			        const vehickyColumn = this.getColumn({ dataIndx: "vehicky" });
			        const vehickyOptions = foundVehicky.map(function(obj){
			            return {[obj.vehicky]: obj.vhcsnam};
			        });
			        vehickyColumn.editor.options = vehickyOptions;
			    }
			    
			});

	  async function saveBmb10List(saveData){
			if(!saveData){
				return false;
			}
			const grid = pq.grid('#bmb10Grid');
			grid.showLoading();
			const saveBmb10Response = await fetchUtil('POST', '/bm/billing/bmb10/confirm', saveData);
			if(saveBmb10Response.status===200){
				//alert('[[#{ms.saveSuccess}]]');
				grid.option( "dataModel", { data:[] } );
				grid.refreshDataAndView();
			}
			grid.hideLoading();
		}
		
	});
		
	</script>
</div>
</html>

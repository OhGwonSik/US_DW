          {

          {

            editable: false,

          },
          {

            editable: false,

          },
          {

            dataIndx: "sinbqty",
            editable: false,
            summary: { type: "sum" },
            format: "#,###"
          },
          {
            title: "[[#{om.omi02.soubqty}]]",
            dataType: "integer",
            dataIndx: "soubqty",
            editable: false,
            summary: { type: "sum" },
            format: "#,###",
          },
          {
            title: "[[#{om.omi01.sbloqty}]]",
            dataType: "integer",
            dataIndx: "sbloqty",
            editable: false,
            summary: { type: "sum" },
            format: "#,###"
          },
          {
            title: "[[#{om.omi01.stkstat}]]",
            dataType: "String",
            dataIndx: "stkstat",
            editable: false
          }, //재고상태
          {
            title: "[[#{om.omi02.suomkey}]]",
            dataType: "String",
            dataIndx: "suomkey",
            editable: false
          }, //단위
          {
            title: "[[#{om.omi04.oeinsdt}]]",
            dataType: "String",
            dataIndx: "oeinsdt",
            editable: false
          }, //조정지시일자
          {
            title: "[[#{om.omi04.oeinstm}]]",
            dataType: "String",
            dataIndx: "oeinstm",
            editable: false
          }, //조정지시시간
        ];
        omi05GridObject = new GridUtil(
          omi05GridCm,
          "[[${gprogrid}]]",
          "omi05Grid"
        );
        omi05GridObject.setFind();
        
        omi05GridObject.setCreate(async function(event, ui){
        	await _commonInit();
        	
    		if(!('[[${userattr.ownerky}]]')) { 													//3PL ROLE 접근 시 전체 option 태그 삽입.
				const html = '<option value="" selected>[[#{om.omr.all}]]</option>';
				document.querySelector('#omi05_ownerky').insertAdjacentHTML('afterbegin', html); 
				$('#omi05_ownerky').pqSelect({ deselect : false }); 
			}
    		
            omi05Warekey = document.querySelector('#omi05_warekey').value;
    		omi05Ownerky = document.querySelector('#omi05_ownerky').value;	
    		
    		// 231005 SMA 수정 -> 화주 로그인 관련 수정 요청
/*     		 $('#omi05_ownerky').pqSelect().on('change', async function(){ 
    			const grid = omi05GridObject.getGrid();	
    			if(grid.pdata.length) {
    				if(!confirm('[[#{ms.listViewRollback}]]')){
    					document.querySelector('#omi05_ownerky').value = omi05Ownerky;
    					$('#omi05_ownerky').pqSelect('refreshData');
    					return;
    				}
    				grid.option('dataModel', { data: [] });
    				grid.refreshDataAndView();
    			}
    			omi05Ownerky = document.querySelector('#omi05_ownerky').value;
    			//initList.skuwcList = await getSkuwcList();
    		 }); */
    		
        });
        omi05GridObject.open();

        //페이지 로딩 후 1회 호출
        getAdjustmentCancelList();

        //============================================================
        //영역 검색 버튼 이벤트
        //============================================================
        $("#" + pageId + "_btnSearch").click(async function () {
          await searchOmi05List();

          if (!omi05GridObject.getGrid().pdata.length) {
            //alert("[[#{ms.getDataZero}]]");
            omi05GridObject.getGrid().option("dataModel", { data: [] });
            omi05GridObject.getGrid().refreshDataAndView();
          }
        });

        async function searchOmi05List() {
          const grid = pq.grid('#omi05Grid')
          const omi05Param = {
            skumkey: $("#" + pageId + "_skumkey").val(),
            skudesc: $("#" + pageId + "_skudesc").val(),
            warekey: $("#" + pageId + "_warekey").val(),
            ownerky: $("#" + pageId + "_ownerky").val(),
            fromOeinsdt: formatDate($("#" + pageId + "_fromOeinsdt").val()),
            toOeinsdt: formatDate($("#" + pageId + "_toOeinsdt").val()),
            rsncdnm: $("input[name='omi05_rsncdnm']:checked")
              .map(function () {
                return $(this).val();
              })
              .get(),
          };
          grid.showLoading();
          const response = await fetchUtil(
            "GET",
            "/om/inventory/omi05/grids/1",
            omi05Param
          );
          initData = await response.json();

          grid.hideLoading();
          omi05GridObject.searchList(initData.oeadjiCancelList);
        }

        //============================================================
        //초기화 버튼 클릭 시 검색 조건 초기화
        //============================================================
        $("#" + pageId + "_btnReset").click(function () {
          $("#" + pageId + "_warekey").prop("selectedIndex", 0);
          $("#" + pageId + "_ownerky").prop("selectedIndex", 0);
          $('#' + pageId + '_ownerky').pqSelect('refreshData');
          $("#" + pageId + "_skudesc").val("");
          $("#" + pageId + "_skumkey").val("");
          $("#" + pageId + "_toOeinsdt").val(moment().format("YYYY-MM-DD"));
          $("#" + pageId + "_fromOeinsdt").val(
        	moment().subtract(1, "d").format("YYYY-MM-DD")
          );

          document
            .querySelectorAll('div[id*="omi05_"].input-check-group input')
            .forEach(function (element) {
              element.checked = element.id || element.disabled ? true : false;
            });

          //searchOmi05List();
          omi05GridObject.searchList([]);
        });

        //============================================================
        //날짜 -빼주는 함수
        //============================================================
        function formatDate(dateString) {
          return dateString.replace(/-/g, "");
        }
        //================================
        //검색날짜 벨리데이션
        //================================
        //230927 SMA 추가
        //검색조건 수주일자 input 클릭시 일자 선택 제한
        $("#omi05_fromOeinsdt , #omi05_toOeinsdt").on("click", function () {
          //수주일자 from 최대 일자 선택
          $("#omi05_fromOeinsdt").attr("max", omi05OeinsstTo.value);

          //수주일자 to 최소 일자 선택
          $("#omi05_toOeinsdt").attr("min", omi05OeinsstFrom.value);
        });
        
        //================================
        //조정취소현황조회 값 불러오기
        //================================
        async function getAdjustmentCancelList(param) {
            param = {
          		  fromOeinsdt: null,
          		  toOeinsdt: null,
            };
            
          const response = await fetchUtil(
            "GET",
            "/om/inventory/omi05/grids/1",
            param
          );
          initData = await response.json();
          await setCheckboxByUsertyp("rsncdnm");

          omi05GridObject.searchList(initData.oeadjiCancelList);
        }

        /* 230821 체크박스 변경으로 인해 SMA 추가 */
        async function setCheckboxByUsertyp(columnName) {

          let html = "";
          for (const column of initData[columnName + "List"]) {
            html += '<label class="check-box">';
            html +=
              '<input type="checkbox" name="omi05_' +
              columnName +
              '" value="' +
              column.combovl +
              '">';
            html += "<span>" + column.combonm + "</span></label>";
          }
          document
            .querySelector("#" + pageId + "_" + columnName + "Checkbox")
            .insertAdjacentHTML("beforeend", html);

          //3PL, 화주 공동화면. 3PL과 화주에게 다른 doctype checkbox 노출. 화주 : 400 입고, 420 부품사입고만 조회 가능 / 3PL : 전체 조회 가능
          if (initData[columnName + "List"].length !== 1) {
            let allCheckHTML = '<label class="check-box">';
            allCheckHTML +=
              '<input type="checkbox" id="omi05_' +
              columnName +
              'AllCheck" name="omi05_' +
              columnName +
              '" value="">';
            allCheckHTML += "<span>전체</span></label>";
            document
              .querySelector("#" + pageId + "_" + columnName + "Checkbox")
              .insertAdjacentHTML("afterBegin", allCheckHTML);
            document.querySelector(
              "#omi05_" + columnName + "AllCheck"
            ).checked = true;
            checkboxEvent(columnName);
            return;
          }

          const columnObj = document.querySelector(
            'input[name="omi05_' + columnName + '"]'
          );
          columnObj.checked = true;
          columnObj.addEventListener("click", function (event) {
            event.preventDefault();
          });
        }

        //checkboxEvent. 전체 선택 시 나머지 체크박스 해제. 전체를 제외한 체크박스 모두 선택 시 전체 선택.
        function checkboxEvent(columnName) {
          document
            .querySelectorAll('input[name="omi05_' + columnName + '"]')
            .forEach(function (element) {
              element.addEventListener("change", function () {
                document.querySelector(
                  "#omi05_" + columnName + "AllCheck"
                ).checked = false;
                const checkedObjs = document.querySelectorAll(
                  'input[name="omi05_' + columnName + '"]:checked'
                );
                const notAllCheckObjs = document.querySelectorAll(
                  'input[name="omi05_' +
                    columnName +
                    '"]:not(#omi05_' +
                    columnName +
                    "AllCheck)"
                );
                if (
                  notAllCheckObjs.length === checkedObjs.length ||
                  element.id === "omi05_" + columnName + "AllCheck"
                ) {
                  document.querySelector(
                    "#omi05_" + columnName + "AllCheck"
                  ).checked = true;
                  for (const checkedObj of checkedObjs) {
                    checkedObj.checked = false;
                  }
                } else if (!checkedObjs.length) {
                  document.querySelector(
                    "#omi05_" + columnName + "AllCheck"
                  ).checked = true;
                }
              });
            });
        }
        /* 230821 체크박스 변경으로 인해 SMA 추가 */
      });
    </script>

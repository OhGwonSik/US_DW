				const gridDataList 	= grid.getData();

					return e.state == 'Y';
				});
				for(const gridData of checkList){
					if(!gridData.doctype){
						alert('[[#{om.omi.doctype}]]');
						omi02GridObject.getGrid().editCell({ rowIndx : gridData.pq_ri, dataIndx: 'doctype' });
						return;
					}
					if(!gridData.rsncode){
						alert('[[#{om.omi.rescode}]]');
						omi02GridObject.getGrid().editCell({ rowIndx : gridData.pq_ri, dataIndx: 'rsncode' });
						return;
					}
					if(!gridData.rtodqty){ //지시수량 미입력, 지시수량이 0인 경우

						return;
					}
					if(!gridData.atkstat){
						alert('[[#{om.omi.atkstat}]]');
						omi02GridObject.getGrid().editCell({ rowIndx : gridData.pq_ri, dataIndx: 'atkstat' });
						return;
					}
				}
				//조정지시 저장
				if(checkList.length){
					if(confirm('[[#{ms.checksave}]]')){

						const data = {
								addList : checkList
						};
						try{
							omi02GridObject.getGrid().showLoading();
							const rData = await fetchUtil('POST','/om/inventory/omi02/save', data);
							if(rData.status !==200){

							}
// 							alert('[[#{ms.saveSuccess}]]');
						}catch(err){
							throw new Error('[[#{ms.saveErr}]]');

							omi02GridObject.getGrid().hideLoading();
							await searchOmi02List();
							omi02GridObject.getGrid().option( 'dataModel', { data: omi02List } );

			omi02GridObject.setBeforeValidate(function(event, ui) {
				if (ui.source != 'undo'
					&& (ui.source == 'edit' || ui.source == 'paste' || ui.source == 'checkbox')) {

					for(const updateData of ui.updateList){
						if(updateData.newRow.doctype) {
							this.updateRow({
								rowIndx : updateData.rowIndx,
								newRow : {
									state : 'Y'
								},
								checkEditable : false,
							});
						}
					}
				}
				//조정지시수량 벨리데이션
				if(ui.source === 'edit'){
					for(const updateData of ui.updateList){
						if(updateData.newRow.rtodqty){
							let currentRow = this.getRowData({rowIndx : ui.updateList[0].rowIndx});

							let rtodqty = updateData.newRow.rtodqty;

							if(rtodqty < 0){
								alert('[[#{om.omi.rtodqty_negative}]]');
								updateData.newRow.rtodqty = 0;
								this.setSelection({ rowIndx: ui.updateList[0].rowIndx });

			//============================================================
			// ajaxCall init
			//============================================================
			async function initData() {
				const initDataList = await fetchUtil('GET', '/om/inventory/omi02/init', {doccate : '300'});

 				omi02List = await initDataList.json();
				await setCheckboxByUsertyp("stkstat");

				return omi02List;
			}


			//============================================================
			// 재고현황조회 검색
			//============================================================
			async function searchOmi02List(){
				const grid = pq.grid('#omi02Grid');
				grid.showLoading();
				
				const omi02Param = {
						skumkey : $('#'+pageId+'_skumkey').val(),
						skudesc : $('#'+pageId+'_skudesc').val(),
						warekey : $('#'+pageId+'_warekey').val(),
						ownerky : $('#'+pageId+'_ownerky').val(),
						stkstat: $("input[name='omi02_stkstat']:checked")
			              .map(function () {
			                return $(this).val();
			              })
			              .get(),
			           cootype : $('#'+pageId+'_doctype').val(),
				};
				
				const rData = callAjax('data', 'GET', '/om/inventory/omi02/grids/1', omi02Param);

				// 231004 SMA 추가 -> 문서타입 검색영역 구분때문에
				if (omi02Param.cootype) {
					let selectedValue = $('#omi02_doctype').val();
					let selectedItem = initDataList.doctypeList.find(item => item.combovl === selectedValue);

					if(selectedItem) {
					    comboCreateData('omi02Grid', 'doctype', [selectedItem], {
					        combovl: 'combovl',
					        combonm: 'combonm'
					    });
					}
				}
				if($('#omi02_doctype').val() === '310'){
					const findStkstat = initDataList.stkstatList.find(item => item.combovl === '00');

				    comboCreateData('omi02Grid', 'atkstat', [findStkstat], {
				        combovl: 'combovl',
				        combonm: 'combonm'
				    });
				}else{
					comboCreateData('omi02Grid', 'atkstat', initDataList.stkstatList, {
						combovl : 'combovl',
						combonm : 'combonm'
					});
				}
				if(rData){
					omi02List = rData;
					grid.option('dataModel', { data: omi02List, recIndx: 'rowkey' });
				}
				grid.hideLoading();
				grid.refreshDataAndView();
			}

			function comboCreateData(gridnm, colnm, obj, mapob, type) {
				let grid = pq.grid('#' + gridnm);
				let column = grid.getColumn({
					dataIndx : colnm
				});

				let options = obj.map(function(obj) {
					let rObj = {};
					if (mapob != null && mapob.combovl != undefined
							&& mapob.combonm != undefined) {
						rObj[obj[mapob.combovl]] = obj[mapob.combonm];
					} else {
						rObj[obj.combovl] = obj.combonm;
					}
					return rObj;
				});
				column.editor.options = options;
			}

			/* 230821 체크박스 변경으로 인해 SMA 추가 */
			async function setCheckboxByUsertyp(columnName) {

	          let html = "";
	          for (const column of omi02List[columnName + "List"]) {
	            html += '<label class="check-box">';
	            html +=
	              '<input type="checkbox" name="omi02_' +
	              columnName +
	              '" value="' +
	              column.combovl +
	              '">';
	            html += "<span>" + column.combonm + "</span></label>";
	          }
	          document
	            .querySelector("#" + pageId + '_' + columnName + "Checkbox")
	            .insertAdjacentHTML("beforeend", html);

	          //3PL, 화주 공동화면. 3PL과 화주에게 다른 doctype checkbox 노출. 화주 : 400 입고, 420 부품사입고만 조회 가능 / 3PL : 전체 조회 가능
	          if (omi02List[columnName + "List"].length !== 1) {
	            let allCheckHTML = '<label class="check-box">';
	            allCheckHTML +=
	              '<input type="checkbox" id="omi02_' +
	              columnName +
	              'AllCheck" name="omi02_' +
	              columnName +
	              '" value="">';
	            allCheckHTML += "<span>전체</span></label>";
	            document
	              .querySelector("#" + pageId + '_' + columnName + "Checkbox")
	              .insertAdjacentHTML("afterBegin", allCheckHTML);
	            document.querySelector(
	              "#omi02_" + columnName + "AllCheck"
	            ).checked = true;
	            checkboxEvent(columnName);
	            return;
	          }

	          const columnObj = document.querySelector(
	            'input[name="omi02_' + columnName + '"]'
	          );
	          columnObj.checked = true;
	          columnObj.addEventListener("click", function (event) {
	            event.preventDefault();
	          });
	        }

	        //checkboxEvent. 전체 선택 시 나머지 체크박스 해제. 전체를 제외한 체크박스 모두 선택 시 전체 선택.
	        function checkboxEvent(columnName) {
	          document
	            .querySelectorAll('input[name="omi02_' + columnName + '"]')
	            .forEach(function (element) {
	              element.addEventListener("change", function () {
	                document.querySelector(
	                  "#omi02_" + columnName + "AllCheck"
	                ).checked = false;
	                const checkedObjs = document.querySelectorAll(
	                  'input[name="omi02_' + columnName + '"]:checked'
	                );
	                const notAllCheckObjs = document.querySelectorAll(
	                  'input[name="omi02_' +
	                    columnName +
	                    '"]:not(#omi02_' +
	                    columnName +
	                    "AllCheck)"
	                );
	                if (
	                  notAllCheckObjs.length === checkedObjs.length ||
	                  element.id ==="omi02_" + columnName + "AllCheck"
	                ) {
	                  document.querySelector(
	                    "#omi02_" + columnName + "AllCheck"
	                  ).checked = true;
	                  for (const checkedObj of checkedObjs) {
	                    checkedObj.checked = false;
	                  }
	                } else if (!checkedObjs.length) {
	                  document.querySelector(
	                    "#omi02_" + columnName + "AllCheck"
	                  ).checked = true;
	                }
	              });
	            });
	        }
			        /* 230821 체크박스 변경으로 인해 SMA 추가 */
		});
	</script>

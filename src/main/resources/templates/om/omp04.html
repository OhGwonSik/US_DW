<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="fragments-mainContent">
	<div class="tab-contents">
		<div class="location"></div>
		  <div class="search-conditions con-box">
			<div class="setting-grid">
				<label for="omp04_warekey" class="setting-grid-title ic-title-nece">[[#{search.whnamlc}]]</label>
				<div class="setting-grid-content">
					<div class="input-group">
						<select id="omp04_warekey" name="omp04_warekey" 
						data-cb-val="combovl" data-cb-name="combonm" data-cb-url="/md/common/organization/warehouse-user" 
						data-cb-select="" data-cb-variable="warekeyList">
						</select>
					</div>
				</div>
				<label for="omp04_ownerky" class="setting-grid-title" >[[#{search.ownamlc}]]</label>
				<div class="setting-grid-content">
					<div class="input-group">
						<select id="omp04_ownerky" name="omp04_ownerky" 
						data-cb-val="combovl" data-cb-name="combonm" data-cb-url="/md/common/partner/owner" 
						data-cb-select="" data-cb-variable="ownerkyList">
						</select>
					</div>
				</div>
				<label class="setting-grid-title">[[#{wm.wasnif.asndate}]]</label>
				<div class="setting-grid-content">
					<div class="input-date-group">
						<input type="date" max="2999-12-31" id="omp04_asndateFrom" onkeyup="setInputDateDel(this)" name="omp04_asndateFrom"/>
						<span>~</span>
						<input type="date" max="2999-12-31" id="omp04_asndateTo"   onkeyup="setInputDateDel(this)" name="omp04_asndateTo"/>
					</div>
				</div>
				<label for="omp04_skumkey" class="setting-grid-title">[[#{search.skuCode}]]</label>
				<div class="setting-grid-content">
					<div class="input-wrapper">
						<input type="text" th:placeholder="${#messages.msg('search.skuCode')}" onkeyup="omp04KeyUp()" id="omp04_skumkey" name="omp04_skumkey"/>
					</div>
				</div>
				<label for="omp04_skudesc" class="setting-grid-title">[[#{search.skunm}]]</label>
				<div class="setting-grid-content">
					<div class="input-wrapper">
						<input type="text" th:placeholder="${#messages.msg('search.skunm')}" onkeyup="omp04KeyUp()" id="omp04_skudesc" name="omp04_skudesc"/>
					</div>
				</div>
				<label class="setting-grid-title" >[[#{wm.wasnif.asnstat}]]</label>
				<div class="setting-grid-content">
					<div class="input-check-group" id="omp04_asnstatCheckbox" >
					</div>
				</div>
				<label for="omp04_custkey" class="setting-grid-title">[[#{wm.wasnif.custkey}]]</label>
				<div class="setting-grid-content">
					<div class="input-group">
						<select id="omp04_custkey" name="omp04_custkey" 
						data-cb-val="ptnrkey" data-cb-name="ptnamlc" data-cb-url="/om/purchase/common/partner/customer" 
						data-cb-select="" data-cb-variable="custkeyList">
							<option value="">[[#{om.omp.all}]]</option>
						</select>
					</div>
				</div>
				<label for="omp04_destkey" class="setting-grid-title" >[[#{wm.wasnif.destkey}]]</label>
				<div class="setting-grid-content">
					<div class="input-group">
						<select id="omp04_destkey" name="omp04_destkey">
							<option value="">[[#{om.ocopur.custkey}]][[#{ms.choiceValue}]]</option>
						</select>
					</div>
				</div>
				<label class="setting-grid-title" >[[#{wm.wasnif.doctype}]]</label>
				<div class="setting-grid-content">
					<div class="input-check-group" id="omp04_doctypeCheckbox" >
					</div>
				</div>
			</div>
			<div class="search-btn-group">
				<button type="button" class="btn-search btn-navy btn-green" id="omp04_btnSearch"><img>[[#{bt.search}]]</button>
				<button type="button" class="btn-clear btn-white" id="omp04_btnReset"><img>[[#{bt.reset}]]</button>
			</div>
		</div>
		<div class="search-list">
			<div class="list-top">
				<div class="list-title ic-title-mark">
					<span th:text="${gnatitle}"></span>
				</div>
				<div class="edit-btn-wrapper">
					<button class="btn-white" id="omp04_btnPrint"><img class="ic-bt-print">[[#{bt.print}]]</button>
				</div>
			</div>
			<div class="list-grid-wrapper con-box">
				<div id="omp04_pqgrid"></div>
			</div>
			<!-- 로딩 이미지 부분 -->
			<div class="spinner" id="spinner">
			</div>
		</div>
	</div>
<script>
/* *******************************************************************************
 * 최초 생성일시 : 2023-07-30
 * 최초 생성자 : 한지수
 * 설명 : 3PL 및 부품사가 입고예정정보 ASN 데이터를 조회하는 화면입니다.
 *********************************************************************************/
$(function() {
	const pageId = 'omp04';
	
	let omp04GridColModel;
	let omp04GridObject;
	let initList;
	let initWarekey;
	const tempDestkeyArr = [];
	
	const asndateTo = document.querySelector('#omp04_asndateTo');
	const asndateFrom = document.querySelector('#omp04_asndateFrom');
	asndateFrom.value = moment().subtract(1, 'd').format('YYYY-MM-DD');					//작일
	asndateTo.value = moment().format("YYYY-MM-DD");									//금일
	
	//date validation
	document.querySelectorAll('input[type="date"]').forEach(function(element) {
		element.addEventListener('change', function() {
			if((asndateFrom.value && asndateTo.value) && (asndateFrom.value > asndateTo.value)) { 
				alert('[[#{ms.dateCheck}]]');
				asndateFrom.value = moment().subtract(1, 'd').format('YYYY-MM-DD');		//작일
				asndateTo.value = moment().format("YYYY-MM-DD");						//금일
				element.focus();
			}
		});
		
		element.addEventListener('keydown', function(event) {
			if(event.key === 'Backspace' || event.key === 'Delete') {
				element.value = '';
			}
		});
	});
	
	//custkey change event. 고객 미선택 시 도착지 비활성화. 고객 선택 시 활성화.
	document.querySelector('#omp04_custkey').addEventListener('change', async function() {
		if(custkeyList.length === 1) {
			return;
		}
		
		const param = document.querySelector('#omp04_custkey').value;
		if(!param) {
			document.querySelector('#omp04_destkey').innerHTML = '<option value="">[[#{om.ocopur.custkey}]][[#{ms.choiceValue}]]</option>';
			$('#omp04_destkey').pqSelect('refreshData');
			return;
		}
		
		const destkeyList = await getDestkeyByCustkey(param, tempDestkeyArr);
		if(!destkeyList.length) {
			let html = '<option value="">[[#{om.common.noDestkey}]]</option>';
			document.querySelector('#omp04_destkey').innerHTML = html;
			$('#omp04_destkey').pqSelect('refreshData');
			return;
		}
		
		let html = '<option value="">[[#{ms.chooseAll}]]</option>';
		for(const destkey of destkeyList) {
			html += '<option value="' + destkey.destkey + '">' + destkey.denamlc + '</option>';
		}
		document.querySelector('#omp04_destkey').innerHTML = html;
		$('#omp04_destkey').pqSelect('refreshData');
	});
	
	//창고 변경 시 문서타입 체크박스 변경.
	document.querySelector('#omp04_warekey').addEventListener('change', async function() {
		
		const data = {
				warekey : document.querySelector('#omp04_warekey').value,
				doccate : '400'
		};
		
		const doctypeData = await fetchUtil('GET', '/md/common/code/doctype', data);
		const doctypeList = await doctypeData.json();

		document.querySelector('#omp04_doctypeCheckbox').innerHTML = '';
		setCheckboxInSearchArea('doctype', doctypeList, pageId);
	});
	
	//==================================================================================================
	//초기화 버튼 클릭 시 검색 조건 초기화 (3PL, 화주 공동화면. 화주 계정일 시에는 화주, 문서타입 selectbox 초기화 안되도록.)
	//==================================================================================================
	document.querySelector('#omp04_btnReset').addEventListener('click', function() {
		document.querySelectorAll('input[id*="omp04_"][type="text"], select[id*="omp04_"]').forEach(function(element) {
			if(element.localName === 'select') {
				if(element.id === 'omp04_destkey' && custkeyList.length !== 1) {
					element.innerHTML = '<option value="">[[#{om.ocopur.custkey}]][[#{ms.choiceValue}]]</option>';
				}
				element.selectedIndex = 0;
				if(element.className === 'pq-select') {
					$('#' + element.id).pqSelect('refreshData');
				}
			}else if(element.localName === 'input') {
				element.value = '';
			}
		});
		
		document.querySelectorAll('div[id*="omp04_"].input-check-group input').forEach(function(element) {
			element.checked = (element.id || element.disabled);
		});
		
		if(warekeyList.length > 1) {
			document.querySelector('#omp04_doctypeCheckbox').innerHTML = '';
			setCheckboxInSearchArea('doctype', initList.doctypeList, pageId);
		}
		
		asndateFrom.value = moment().subtract(1, 'd').format('YYYY-MM-DD');					//작일
		asndateTo.value = moment().format("YYYY-MM-DD");									//금일

		omp04GridObject.getGrid().showLoading(); 
		omp04GridObject.getGrid().option('dataModel', { data : [] });
		omp04GridObject.getGrid().hideLoading();
		omp04GridObject.getGrid().refreshDataAndView();
	});
	
	//============================================================	 
	//그리드 search 버튼 이벤트 
	//============================================================
	$('#'+pageId+'_btnSearch').click(async function() { 
		await omp04Search();
	});
	
	$('#'+pageId+'_btnPrint').click(async function() {
		
		const grid 			= omp04GridObject.getGrid();
		const gridDataList 	= grid.getData();  

		const checkList = gridDataList.filter(function(obj) {
			return obj.state === 'Y';
		});
		
		if(!checkList.length) {
			alert('[[#{ms.choiceRowZero}]]');
			return;
		}
		
		if(confirm('[[#{om.omp02.printOut}]]')) {
			//로딩 이미지.
			$('#lodingImg').css('display', '');
			
			const report = [];
			for(const checkData of checkList) {
				const findData = report.find(function(obj) {
					return obj.warekey === checkData.warekey && obj.eoasnky === checkData.eoasnky;
				});
				
				if(!findData) {
					const reportObj = {
							eoasnky : checkData.eoasnky,
							compkey : '[[${userattr.compkey}]]',
							progrid : '[[${gprogrid}]]',	
							warekey : checkData.warekey,	
							user : '[[${userattr.useract}]]',
							type : 'omd10'
					};
					report.push(reportObj);
				}
			}
			await reportPrint(report, 'om');
		}
	});
	
	omp04GridColModel = [
		{ title: '', dataType: 'String',  dataIndx: 'state', type: 'checkBoxSelection', align: 'center', 
		    maxWidth:'30', maxHeight:'30', menuIcon: false, sortable: false, editor: false,
		    cb: { all: false, header: true, check: 'Y', uncheck: 'N' }, 
		    editable : function(ui) {
			    return ui.rowData.asnstat !== 'CANCEL'; 
		    }
		},
     	{ title: 'rowkey', dataType: 'string', dataIndx: 'rowkey', editable: false, hidden: true },
		{ title: '[[#{wm.wasnif.compkey}]]', dataType: 'string', dataIndx: 'compkey', editable: false , hidden: true},							// Company Key
		{ title: '[[#{wm.wasnif.eoasnky}]]', dataType: 'string', dataIndx: 'eoasnky', editable: false },										// 입고예정번호
		{ title: '[[#{wm.wasnif.eoasnit}]]', dataType: 'integer', dataIndx: 'eoasnit', editable: false, format: '#,###' },						// 입고예정아이템
		{ title: '[[#{grid.wareCode}]]', dataType: 'string', dataIndx: 'warekey', editable: false, hidden: true },								// 창고	
		{ title: '[[#{grid.whnamlc}]]', dataType: 'string', dataIndx: 'whnamlc', editable: false, hidden: true },								// 창고명칭	
		{ title: '[[#{wm.wasnif.doccate}]]', dataType: 'string', dataIndx: 'doccate', editable: false, hidden: true },							// 문서유형
		{ title: '[[#{wm.wasnif.doctype}]]', dataType: 'string', dataIndx: 'doctype', editable: false, hidden: true },							// 문서타입
		{ title: '[[#{md.mdocma.doctynm}]]', dataType: 'string', dataIndx: 'doctynm', editable: false },										// 문서타입명칭
		{ title: '[[#{grid.ownamlc}]]', dataType: 'string', dataIndx: 'ownerky', editable: false },												// 화주
		{ title: '[[#{grid.skuCode}]]', dataType: 'string', dataIndx: 'skumkey', editable: false },												// 상품 
		{ title: '[[#{grid.skunm}]]', dataType: 'string', dataIndx: 'skudesc', editable: false },												// 상품명
		{ title: '[[#{wm.wasnif.skuskey}]]', dataType: 'string', dataIndx: 'skuskey', editable: false , hidden: true},							// 대표상품						
		{ title: '[[#{wm.wtrhis.stotqty}]]', dataType: 'integer', dataIndx: 'stotqty', editable: false, format: '#,###',						// 재고수량
			summary: { type: 'sum' }	
		},
		{ title: '[[#{wm.wasnif.asndqty}]]', dataType: 'integer', dataIndx: 'asndqty', editable: false, format: '#,###',						// 입고예정수량	
			summary: { type: 'sum' }	
		},
		{ title: '[[#{md.mskuwc.propqty}]]',  dataType: 'integer', dataIndx: 'propqty', format: '#,###', editable: false,						// 적정재고수량
			summary: { type: 'sum' },
			render : function(ui) {
				return ui.rowData.propqty ? ui.rowData.propqty : 0;
			} 
		},
		{ title: '[[#{md.mskuwc.salfqty}]]',  dataType: 'integer', dataIndx: 'salfqty', format: '#,###', editable: false,						// 안전재고수량
			summary: { type: 'sum' },
			render : function(ui) {
				return ui.rowData.salfqty ? ui.rowData.salfqty : 0;
			} 
		},
		{ title: '[[#{md.mpakma.packqty}]]',  dataType: 'integer', dataIndx: 'packqty', format: '#,###', editable: false,						// 입수량
			summary: { type: 'sum' } 
		},	
		{ title: '[[#{om.omp02.asitbox}]]', dataType: 'integer', dataIndx: 'asitbox', editable: false, format: '#,###',							// 박스수량	
			summary: { type: 'sum' }
		},						
		{ title: '[[#{wm.wasnif.asnstat}]]', dataType: 'string', dataIndx: 'asnstat', editable: false, hidden: true },							// ASN 상태
		{ title: '[[#{wm.wasnif.asnstat}]]', dataType: 'string', dataIndx: 'comcdtx', editable: false },										// 공통코드값 명칭(ASN상태)
		{ title: '[[#{wm.wasnif.asndate}]]', dataType: 'string', dataIndx: 'asndate', editable: false },										// 입고예정일
		{ title: '[[#{wm.wasnif.asntime}]]', dataType: 'string', dataIndx: 'asntime', editable: false },										// 입고예정시간
		{ title: '[[#{wm.wasnif.auomkey}]]', dataType: 'string', dataIndx: 'auomkey', editable: false },										// 입고예정단위
		{ title: '[[#{md.mskuwc.miniqty}]]',  dataType: 'integer', dataIndx: 'miniqty', format: '#,###', editable: false,						// 최소발주수량
			summary: { type: 'sum' },
			render : function(ui) {
				return ui.rowData.miniqty ? ui.rowData.miniqty : 0;
			} 
		},				
		{ title: '[[#{wm.wasnif.sirbcod}]]', dataType: 'string', dataIndx: 'sirbcod', editable: false, hidden: true },							// 개별관리번호
		{ title: '[[#{wm.wasnif.poitqty}]]', dataType: 'integer', dataIndx: 'poitqty', editable: false, format: '#,###',						// 발주수량
			summary: { type: 'sum' }	
		},								
		{ title: '[[#{wm.wasnif.puomkey}]]', dataType: 'string', dataIndx: 'puomkey', editable: false },										// 발주단위		
		{ title: '[[#{wm.wasnif.truntyp}]]', dataType: 'string', dataIndx: 'truntyp', editable: false, hidden: true },							// Transfer Unit type
		{ title: '[[#{wm.wasnif.rchpqty}]]', dataType: 'integer', dataIndx: 'rchpqty', editable: false, format: '#,###',						// 입하완료 누적수량
			summary: { type: 'sum' }
		},						
		{ title: '[[#{wm.wasnif.rchsqty}]]', dataType: 'integer', dataIndx: 'rchsqty', editable: false, format: '#,###',						// 입하완료수량	
			summary: { type: 'sum' }
		},						
		{ title: '[[#{wm.wasnif.rchsuom}]]', dataType: 'string', dataIndx: 'rchsuom', editable: false },										// 입하완료 단위UOM
		{ title: '[[#{wm.wasnif.vendkey}]]', dataType: 'string', dataIndx: 'vendkey', editable: false },										// 부품사	
		{ title: '[[#{wm.wasnif.carrkey}]]', dataType: 'string', dataIndx: 'carrkey', editable: false },										// 운송사	
		{ title: '[[#{wm.wasnif.truckno}]]', dataType: 'string', dataIndx: 'truckno', editable: false },										// 입고차량번호	
		{ title: '[[#{wm.wasnif.tructon}]]', dataType: 'string', dataIndx: 'tructon', editable: false },										// 입고차량톤수	
		{ title: '[[#{wm.wasnif.asnmemo}]]', dataType: 'string', dataIndx: 'asnmemo', editable: false },										// 입고요청사항	
		{ title: '[[#{wm.wasnif.proddat}]]', dataType: 'string', dataIndx: 'proddat', editable: false, hidden: true },							// 생산일자	
		{ title: '[[#{wm.wasnif.shelife}]]', dataType: 'integer', dataIndx: 'shelife', editable: false, format: '#,###', hidden: true },		// 유통기한	
		{ title: '[[#{wm.wasnif.expidat}]]', dataType: 'string', dataIndx: 'expidat', editable: false },										// 유통기간	
		{ title: '[[#{wm.wasnif.custkey}]]', dataType: 'string', dataIndx: 'custkey', editable: false },										// 고객
		{ title: '[[#{wm.wasnif.destkey}]]', dataType: 'string', dataIndx: 'destkey', editable: false },										// 도착지
		{ title: '[[#{wm.wasnif.stkstat}]]', dataType: 'string', dataIndx: 'stkstat', editable: false, hidden: true },							// 재고상태
		{ title: '[[#{wm.wasnif.rsncode}]]', dataType: 'string', dataIndx: 'rsncode', editable: false },										// 입고사유코드
		{ title: '[[#{wm.wasnif.rcvsrmk}]]', dataType: 'string', dataIndx: 'rcvsrmk', editable: false },										// 입고사유내용
		{ title: '[[#{wm.wasnif.copodky}]]', dataType: 'string', dataIndx: 'copodky', editable: false },										// 발주문서
		{ title: '[[#{wm.wasnif.copodit}]]', dataType: 'integer', dataIndx: 'copodit', editable: false, format: '#,###' },						// 발주아이템번호
		{ title: '[[#{wm.wasnif.refsodc}]]',  dataType: 'string', dataIndx: 'refsodc', editable: false, hidden: true },							// ref ERP SO
		{ title: '[[#{wm.wasnif.refsoit}]]',  dataType: 'string', dataIndx: 'refsoit', editable: false, hidden: true },							// ref ERP SO Item
		{ title: '[[#{wm.wasnif.refdndc}]]',  dataType: 'string', dataIndx: 'refdndc', editable: false, hidden: true },							// ref ERP DN
		{ title: '[[#{wm.wasnif.refdnit}]]',  dataType: 'string', dataIndx: 'refdnit', editable: false, hidden: true },							// ref ERP DN Item
		{ title: '[[#{wm.wasnif.refsddc}]]',  dataType: 'string', dataIndx: 'refsddc', editable: false, hidden: true },							// ref ERP SD
		{ title: '[[#{wm.wasnif.refsdit}]]',  dataType: 'string', dataIndx: 'refsdit', editable: false, hidden: true },							// ref ERP DD Item
		{ title: '[[#{wm.wasnif.credate}]]',  dataType: 'string', dataIndx: 'credate', editable: false },										// 생성일자
		{ title: '[[#{wm.wasnif.cretime}]]',  dataType: 'string', dataIndx: 'cretime', editable: false },										// 생성일시
		{ title: '[[#{wm.wasnif.creuser}]]',  dataType: 'string', dataIndx: 'creuser', editable: false },										// 생성사용자
		{ title: '[[#{wm.wasnif.lmodate}]]',  dataType: 'string', dataIndx: 'lmodate', editable: false },										// 수정일자
		{ title: '[[#{wm.wasnif.lmotime}]]',  dataType: 'string', dataIndx: 'lmotime', editable: false },										// 수정일시
		{ title: '[[#{wm.wasnif.lmouser}]]',  dataType: 'string', dataIndx: 'lmouser', editable: false },										// 수정사용자
		{ title: '[[#{wm.wasnif.indibzl}]]',  dataType: 'string', dataIndx: 'indibzl', editable: false, hidden: true },							// biz logic indicator
		{ title: '[[#{wm.wasnif.indiarc}]]',  dataType: 'string', dataIndx: 'indiarc', editable: false, hidden: true },							// Archieve indicator
		{ title: '[[#{wm.wasnif.updtchk}]]',  dataType: 'integer', dataIndx: 'updtchk', editable: false, format: '#,###', hidden: true }		// Update Check
	];
	
	omp04GridObject = new GridUtil(omp04GridColModel, '[[${gprogrid}]]', pageId + '_pqgrid');
	omp04GridObject.setFind();
	
	omp04GridObject.setCheck(function(event, ui) {
		const findSameEoasnky = omp04GridObject.getGrid().getData().filter(function(obj) {
			return obj.eoasnky === ui.rowData.eoasnky && obj.asnstat !== 'CANCEL';				
		});
		
		for(const sameEoasnky of findSameEoasnky) {
			this.updateRow({
				rowIndx : sameEoasnky.pq_ri,
				newRow : {
					state : ui.check ? 'Y' : 'N'
				},
				checkEditable : false
			});
		}
	});
	
	omp04GridObject.setCreate(async function(event, ui) { 
		
		await _commonInit();
		
		if(!('[[${userattr.ownerky}]]')) { 													//3PL ROLE 접근 시 전체 option 태그 삽입.
			const html = '<option value="" selected>[[#{ms.chooseAll}]]</option>';
			document.querySelector('#omp04_ownerky').insertAdjacentHTML('afterbegin', html); 
			$('#omp04_ownerky').pqSelect({ deselect : false }); 
		}
		
		initWarekey = document.querySelector('#omp04_warekey').value;
		const initData = await fetchUtil('GET', '/om/purchase/omp04/init', { warekey : initWarekey });
		initList = await initData.json(); 

		setCheckboxInSearchArea('asnstat', initList.asnstatList, pageId);  
		setCheckboxInSearchArea('doctype', initList.doctypeList, pageId); 

		let html = '<option value="" selected>[[#{ms.chooseAll}]]</option>';
	    if(custkeyList.length === 1) { 
			const destkeyList = await getDestkeyByCustkey(custkeyList[0].ptnrkey, tempDestkeyArr); 
			for(const destkey of destkeyList) {
				html += '<option value="' + destkey.destkey + '">' + destkey.denamlc + '</option>';
			}

			document.querySelector('#omp04_destkey').innerHTML = html;
	    }else{
	    	document.querySelector('#omp04_custkey').insertAdjacentHTML('afterBegin', html);
	    	document.querySelector('#omp04_custkey').selectedIndex = 0;
	    }
		$('#omp04_destkey').pqSelect({ deselect : false });
	});
	
	omp04GridObject.open();

});

//MPTNMA : 고객에 따른 도착지 조회. array에 미존재 시 DB에서 조회 후 array에 추가.
async function getDestkeyByCustkey(param, arr) {
	
	if(!arr[param]) {
		const destkeyData = await fetchUtil('GET', '/om/purchase/common/destination/' + param);
		arr[param] = await destkeyData.json();
	}
	
	return arr[param];
}

// ASN LIST 조회
async function omp04Search() {
	const grid = pq.grid('#omp04_pqgrid');
	const searchParams = document.querySelectorAll('input[id*="omp04_"]:not([type="checkbox"]), select[id*="omp04_"]');
	
	const params = {
			asnstats : [],
			doctypes : []
	};
	
	//asnstat 및 doctype을 제외한 검색 조건 params.
	for(const searchParam of searchParams) {
		const key = searchParam.id.substring(6);
		params[key] = searchParam.value;
	}
	
	//전체 체크가 되어있지 않은 asnstat(asn상태) 및 doctype(문서타입) 검색조건 params에 push
	const checkedObjs = document.querySelectorAll('input[name*="omp04_"]:checked'); 
	for(const checkObj of checkedObjs) {
		checkObj.name === 'omp04_asnstat' ? params.asnstats.push(checkObj.value) : params.doctypes.push(checkObj.value);
	}
	
	grid.showLoading();
	const asnData = await fetchUtil('GET', '/om/purchase/omp04/grids', params);
	if(asnData.status === 200) { 
		const asnList = await asnData.json();
		grid.option('dataModel', { data: asnList, recIndx: 'rowkey' });
	}
	grid.hideLoading();
	grid.refreshDataAndView();
}

//============================================================
// 검색조건 영역 체크박스 생성.
//============================================================
function setCheckboxInSearchArea(columnName, dataList, pageId) { 
	
	const selector = pageId + '_' + columnName;

	if(document.querySelector('input[name="'+ selector +'"]')) {
		return;
	}
	
	let html = '';
	for(const column of dataList) {
		html += '<label class="check-box">';
		html += '<input type="checkbox" name="' + selector +'" value="' + column.combovl +'">';
		html +=  '<span>' + column.combonm + '</span></label>';
	}
	document.querySelector('#' + selector + 'Checkbox').insertAdjacentHTML('beforeend', html);
	
	// 문서타입이 존재하지 않을 시에 임시로 전체 체크박스 추가되도록.
	if(dataList.length !== 1) {	
		let allCheckHTML = '<label class="check-box">';
		allCheckHTML += '<input type="checkbox" id="' + selector +'AllCheck" value="">';
		allCheckHTML += '<span>[[#{ms.chooseAll}]]</span></label>';
		document.querySelector('#' + selector +'Checkbox').insertAdjacentHTML('afterBegin', allCheckHTML);
		document.querySelector('#' + selector +'AllCheck').checked = true;
	}

	const checkboxObjs = document.querySelectorAll('#' + selector + 'Checkbox input');
	// 검색조건 체크박스의 개수가 하나일 시 체크 해제 못하고 체크 유지되도록.
	if(checkboxObjs.length === 1) {
		checkboxObjs[0].disabled = true;
		checkboxObjs[0].checked = true;
		checkboxObjs[0].addEventListener('click', function(event){
			event.preventDefault();
		});
		return;
	}
	
	checkboxEvent(columnName, pageId);	
}

//checkboxEvent. 전체 선택 시 나머지 체크박스 해제. 전체를 제외한 체크박스 모두 선택 시 전체 선택.
function checkboxEvent(columnName, pageId) { 

	const selector = pageId + '_' + columnName;
	const checkboxSelector = '#' + selector + 'Checkbox input'; 
	const allCheckObj = document.querySelector('#' + selector + 'AllCheck'); 
	const notAllCheckObjs = document.querySelectorAll('input[name="' + selector + '"]');
	
 	document.querySelectorAll(checkboxSelector).forEach(function(element) {
		element.addEventListener('change', function() {
			allCheckObj.checked = false;
			const checkedObjs = document.querySelectorAll('input[name="' + selector + '"]' + ':checked');
			if(notAllCheckObjs.length === checkedObjs.length || !checkedObjs.length || element.id === selector + 'AllCheck') {
				allCheckObj.checked = true;
				for(const checkedObj of checkedObjs) {
					checkedObj.checked = false;	
				}
			}
		});
	}); 
}

//============================================================
//input 키보드 엔터 이벤트
//============================================================
function omp04KeyUp() {
	const key = this.event.key || this.event.keyCode;
	if (key === 'Enter' || key === 13) {
		omp04Search();
	}
}

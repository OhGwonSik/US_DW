    // 공통 콤보박스 (GridID, 컬럼키 & ID , Param, URL)
    //============================================================
    function Combo (gridnm, colnm, param, url, mapob, type){

        if(!colnm){
            return false;
        }

        this.url = url ? url : "/md/common/code/common-code";
        this.url = rPath + this.url;
        if(!gridnm){
            $.getJSON(this.url, param, function (response) {
                $("#" + colnm + " option").not("[value='']").remove();	//초기화
                if(mapob != null && mapob.combovl != undefined && mapob.combonm != undefined){
                    $.each(response, function(key, value) { $('#' + colnm) .append($("<option></option>").attr("value",value[mapob.combovl]).text(value[mapob.combonm])); });
                }else{
                    $.each(response, function(key, value) { $('#' + colnm) .append($("<option></option>").attr("value",value.combovl).text(value.combonm)); });
                }
            });
        }else{
            $.getJSON(this.url, param, function (response) {
                var grid = pq.grid("#" + gridnm)
                    , column = grid.getColumn({ dataIndx: colnm });

                var options = response.map(function(obj){
                    var rObj = {};
                    if(mapob != null && mapob.combovl != undefined && mapob.combonm != undefined){
                        rObj[obj[mapob.combovl]] = obj[mapob.combonm];
                    }else{
                        rObj[obj.combovl] = obj.combonm;
                    }
                    return rObj;
                });
                column.editor.options = type === true ? response : options;
            });
        }
    }

    //============================================================
    //공통 Ajax
    //============================================================
    var AjaxUtil_Order = function(url, params, type, dataType ){
        if(!url){
            alert("url 정보가 없습니다.");
            return null;
        }
        // AjaxUtil_Order 생성자 함수를 사용하여 새로운 객체를 생성 할 때, 매개변수(param) url을
        // this 객체 내부의 url 멤버 변수에 할당시키기 위해 사용
        // 인스턴스 변수를 생성하여 객체 인스턴스 내부에서 사용 가능
        this.url = rPath + url;

        var generateJSON = function(params) {
            if(!params){
                return "";
            }
            return JSON.stringify(params);
        }

        this.type = type ? type : "POST";
        this.dataType = dataType ? dataType : "json";
        this.param = type === "GET" ? params : generateJSON(params);

        this.callbackSuccess = function(json) {
            var data = JSON.stringify(json);
        }
        this.setCallbackSuccess = function(callback) {
            this.callbackSuccess = callback;
        }

        this.complete = function() {

        }
        this.setComplete = function(fun){
            this.complete = fun;
        }

        this.err = function(xhr, status, e) {
            if(xhr.status=="500"){
                logout("Login Session Expired");
            }else{
                if (xhr.responseJSON) {
                    var obj = xhr.responseJSON;
                    alert(obj.code + ":" + obj.message);
                } else {
                    alert('AjaxUtil_Order error');
                    console.log("AjaxUtil_Order url=" + this.url + " 에러 = " + e);

                }
            }
        }
        this.setErr = function(fun){
            this.err = fun;
        }

        this.send = function() {
            $.ajax({
                type : this.type,
                url : this.url,
                dataType : this.dataType,
                beforeSend : function(xhr) {
                    xhr.setRequestHeader("Accept", "application/json");
                    xhr.setRequestHeader("Content-Type","application/json;charset=utf-8");
                    xhr.setRequestHeader("AJAX", true);
                },
                data : this.param,
                success : this.callbackSuccess,
                error : this.err,
                complete : this.complete
            });
        }
    }

    function callAjax(rType, method, tUrl, param){
        tUrl = rPath + tUrl;

        {

            case 'pdf':
                return new Promise((resolve, reject)=>{

                    $.ajax({
                        type: method,
                        url: tUrl,
                        data: method === "GET" ? param : JSON.stringify(param),
                        xhrFields: {
                            responseType: "blob",
                        },
                        contentType: "application/json",
                        success: function(data, message, xhr) {
                            resolve({
                                data: data,
                                header: xhr.getResponseHeader('Content-Disposition')
                            });
                        },
                        error: function(data) {
                            reject(data);
                        }
                    })
                })

                                console.log("AjaxUtil_Order url=" + this.url + " 에러 = " + e);

                            }

            case "msg":

    //============================================================
    //공통 Javascript 숫자 3자리(천단위) 마다 콤마 찍기
    //============================================================
    function comma(num){
        var parts = num.toString().split('.')
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',')
        return parts.join('.');
//return val.toString().replace(/\B(?<!\.\d*)(?=(\d{3})+(?!\d))/g, ",");
    }

    //============================================================
    //공통 Javascript 숫자 3자리(천단위) 콤마 제거
    //============================================================
    function uncomma(num){
        str = String(num);
        return Number(str.replace(/[^-+\d]+/g, ''));
        //return val.replace(/,/g, "");
    }

    //============================================================
    //공통 Javascript 숫자(정수)만 가능(양수,음수)
    //============================================================
    function onlyNumber(e){
        var regexp = /^[-]?[0-9]*([0-9]?)?$/;
        var regexp2 = /\s/g;

        var value = $(e).val().replaceAll(",","");
        value = value.replace(/^[-]?0+/, "")
        if(!regexp.test(value)){
            var result = value.replace(value,"");
            $(e).val(comma(result));
            $(e).focus();
            return false; //
        }
        $(e).val(comma(value));
    }

    //============================================================
    //공통 Javascript 숫자(양수)만 가능
    //============================================================
    function onlyNumberPlus(e){
        var regexp = /[^0-9]/g;

        var value = $(e).val().replaceAll(",","");
        value = value.replace(/(^0+)/, "");
        if(regexp.test(value)){
            var result = value.replace(value,"");
            $(e).val(comma(result));
            $(e).focus();
            return false;
        }
        $(e).val(comma(value));
    }

    //============================================================
    //공통 Javascript 숫자(실수)만 가능
    //============================================================
    function onlyFloat(e){
        var regexp = /[^0-9|.]/g;
        var regexp2 = /\s/g;

        var value = $(e).val().replaceAll(",","");

        if(regexp.test(value)){
            var result = value.replace(regexp,"");
            $(e).val(comma(result));
            $(e).focus();
            return false;
        }
        $(e).val(comma(value));
    }

    //============================================================
    //공통 params json 형식으로 리턴
    //============================================================
    function paramsJsonData(d){
        if(d){
            d = d.replace(/ /g, "");
            d = d.replace(/{/g, "");
            d = d.replace(/}/g, "");
            d = d.split(',');
            var prams = d.reduce((newObj, obj) => {
                dobj = obj.split('=');
                newObj[dobj[0]] = dobj[1];
                return newObj;
            }, {});
            return prams;
        }else{
            return null;
        }
    }

        var len = 0;
        for (var i = 0; i < str.length; i++) {
            if (escape(str.charAt(i)).length == 6) {
                len++;
            }
            len++;
        }
        return len;
    }
    //문자열 자르기
    function getStrCut(str, len)
    {
        var s = 0;
        for (var i=0; i<str.length; i++) {
            s += (str.charCodeAt(i) > 128) ? 2 : 1;
            if (s > len) return str.substring(0,i) + "..";
        }
        return str;
    }
    //문자열에 공백매꾸기 : n=문저열, digits=공백갯수
    function setleadingSpaces(n, digits) {
        var space = '';
        n = n.toString();

        if (n.length < digits) {
            for (var i = 0; i < digits - n.length; i++)
                space += '&nbsp;';
        }
        return space + n;
    }

    //============================================================
    // url get Parameter 리턴
    //============================================================
    function getParameter(param){
        //현재 주소를 decoding
        var requestParam;
        var url = unescape(location.href);

        //파라미터만 자르고, 다시 &그분자를 잘라서 배열에 넣는다.
        var paramArr = (url.substring(url.indexOf("?")+1,url.length)).split("&");

        for(var i = 0 ; i < paramArr.length ; i++){
            var temp = paramArr[i].split("="); //파라미터 변수명을 담음

            if(temp[0].toUpperCase() == param.toUpperCase()){
                // 변수명과 일치할 경우 데이터 삽입
                requestParam = paramArr[i].split("=")[1];
                break;
            }
        }

        return requestParam;
    }

	// 최초 생성일시 : 2023.08.22
	// 최초 생성자	: Park. T. S.
	// 입력 파라미터 : intervalFromYear : 날짜포맷 년 간격, intervalFromMonth : 날짜포맷 월 간격, intervalFromDate : 날짜포맷 일 간격, noFromDate : 일 간격 사용 안함
	// 설명 : 검색영역 내의 input과 select box를 모두 정해진 공통 조건으로 초기화한다.
	//---------------------------------------------------------------
	// 수정일자 : 2023.08.24
	// 수정자 : Park. S. H.
	// 수정내용 : 세부 조건 및 기능 추가
	//---------------------------------------------------------------
	// 수정일자 : 2023.09.18
	// 수정자 : Park. T. S.
	// 수정내용 : month type 분기 추가
	//---------------------------------------------------------------
	// 수정일자 : 2023.10.18
	// 수정자 : Park. T. S.
	// 수정내용 : 일부 초기화 안되는 버그 수정
	//---------------------------------------------------------------
	// 수정일자 : 2023.11.20
	// 수정자 : Park. T. S.
	// 수정내용 : 날짜 초기화 조건 수정
	//============================================================
    function resetSearchConditions(intervalFromYear = 0, intervalFromMonth = 0, intervalFromDate = 1, noFromDate = false){
        const $inputConditionDOMs = $('.setting-grid-content').find('input'); // 검색영역 dom 변경시 바꿔줄 부분
        const $selectConditionDOMs = $('.setting-grid-content').find('select'); // 검색영역 dom 변경시 바꿔줄 부분

        for(const inputConditionDOM of $inputConditionDOMs){
            const type = inputConditionDOM.type;

            if('text' === type){ // text type은 단순 초기화
                inputConditionDOM.value = '';
            } else if('date' === type || 'month' === type){ // date or month type
                const lastDateNode = $(inputConditionDOM).parent().find(':last-child')[0];
                const toDate = new Date();
                const fromDate = new Date();

                fromDate.setFullYear(fromDate.getFullYear() - intervalFromYear);
                fromDate.setMonth(fromDate.getMonth() - intervalFromMonth);
                fromDate.setDate(fromDate.getDate() - ('date' === type ? intervalFromDate : 0)); // month type일 경우 날짜를 1일 빼면 매달 1일에 이전 달이 출력되므로 안되게 분기처리

                if(inputConditionDOM.isSameNode(lastDateNode)){ // lastChild일 경우
                    $(inputConditionDOM).val(String(toDate.getFullYear()) + '-' + String((toDate.getMonth()+1)).padStart(2, '0') + String('date' === type ? '-' + String(toDate.getDate()).padStart(2, '0') : ''));
                } else {
                	let dateValue = String(fromDate.getFullYear()) + '-' + String((fromDate.getMonth()+1)).padStart(2, '0');

                	if('date' === type){
                		dateValue +=  '-' + String(fromDate.getDate()).padStart(2, '0'); // lint에서 로직을 따로 분리하라고 하여 위에서 3항연산자로 사용하지 않음
                	}

                	$(inputConditionDOM).val(!noFromDate ? dateValue : '');
                }
            } else if('checkbox' === type){ // 체크박스는 전부 false 처리
            	inputConditionDOM.checked = false;
            }
        }

        for(const selectConditionDOM of $selectConditionDOMs){
            const $selectOptionConditionDOMs = $(selectConditionDOM).children('option');
            const selectedOption = $selectOptionConditionDOMs.filter((_key, value) => {
                return value.dataset.selected
            });

            selectConditionDOM.value = selectedOption[0]
								                ? selectedOption[0].dataset.selected
								                : selectConditionDOM[0].value;

			if('pq-select' === selectConditionDOM.className){
				$('#' + selectConditionDOM.id).pqSelect('refreshData');
			} // pqSelect일 경우 갱신을 위해 refreshData 처리
            // selected를 설정한 것이 아니라면 맨 첫번째 값으로 선택
        }
    }

	// 함수명 : makeDuplicateRowText
	// 최초 생성일시 : 2023.10.10
	// 최초 생성자	: Park. T. S.
	// 입력 파라미터 : keys - 중복을 검사했던 key들을 가지고 있는 배열, gridObj - pqGrid 객체, gridCheck - grid에서 선택 된 데이터, gridData - grid 전체 데이터
	// 출력 파라미터 : rText(String)
	// 설명 : grid validation을 진행할 때 중복오류가 발생할 경우 보여줄 텍스트를 만드는 function(pqGrid 내부함수 사용)
	//============================================================
	function makeDuplicateRowText(keys, gridObj, gridCheck, gridData){
		let rText = '';

		for(let idx=0; idx<keys.length; idx++){
			rText += (gridCheck.hasOwnProperty(keys[idx]) && gridCheck[keys[idx]] === gridData[keys[idx]]) ? gridObj.getColumn({dataIndx : keys[idx]}).title + '[[#{ms.col}]] ' +  gridData[keys[idx]] : ' ';

			if(idx !== keys.length-1 && gridCheck.hasOwnProperty(keys[idx]) && gridCheck[keys[idx]] === gridData[keys[idx]]){
				rText += ' / ';
			}
		}

		return rText;
	}

	// 최초 생성일시 : 2023.10.10
	// 최초 생성자	: Park. T. S.
	// 입력 파라미터 : keys - 중복을 검사할 key들을 가지고 있는 배열, gridCheck - grid에서 선택 된 데이터, gridData - grid 전체 데이터
	// 출력 파라미터 : bool
	// 설명 : validation 로직에서 복합키 값 중복 체크
	//============================================================
	function isKeyDuplication(keys, gridCheck, gridData){
		for(const key of keys){
			if(gridCheck[key] !== gridData[key]){ // 모든 키 컬럼의 값들이 중복되야 함
				return false;
			}
		}

		return true;
	}

	//============================================================
	// 함수명 : createTabModel
	// 최초 생성일시 : 2023.10.11
	// 최초 생성자	: Go. H. R. & Park. T. S.
	// 입력 파라미터 : rData - 가공 전 데이터, colModel - tabModel서 사용할 pqGrid colModel, groupCols - 그룹으로 지정할 level별 column들,
	// 						groupBy - 데이터 그룹 기준, groupByName - 각 groupBy 기준에 해당하는 이름, summaryCols - 요약 col 지정, doSkipSingleSummary - 단일 합계 출력할지 여부
	// 출력 파라미터 : reTabs(Array)
	// 설명 : 파라미터로 데이터와 조건을 받아 pqGrid Tab Model에 사용할 데이터를 생성함
	//============================================================
	function createTabModel(rData, colModel, groupCols, groupBy, groupByName, summaryCols, doSkipSingleSummary=true){ // groupBy는 반드시 key값으로
		// rData : 가공 전 데이터, colModel : tabModel의 colModel, groupCols : 그룹으로 지정할 level별 column들,
		// groupBy : 데이터를 가공(묶음) 기준, groupByName : 각 groupBy 기준에 해당하는 이름, summaryCols : 요약 col 지정, doSkipSingleSummary : 단일 합계 출력할지 여부
		const reTabs = [];
		const tabsFilterOption = rData.reduce((tab, now) => { // 기존 배열을 순회하면서 새로운 배열을 반환
			let groupByOption = '';

			for(let groupOrder=0; groupOrder<groupBy.length; groupOrder++){ // 탭 객체에 넣을 데이터를 가공하여 배열 생성
				if(now.hasOwnProperty(groupBy[groupOrder])){
					groupByOption += (groupByName && Array.isArray(groupByName) && groupByName[groupOrder] ? now[groupByName[groupOrder]] : now[groupBy[groupOrder]])
											+ (groupOrder !== groupBy.length-1 ? '_' : '')
				} // groupByName이 있을경우 groupByName을 이용해 탭을 생성. 없으면 groupBy로 생성
			}

			tab[groupByOption] ? tab[groupByOption].push(now) : tab[groupByOption] = [now];

			return tab;
		}, {});

		for(let index of Object.keys(tabsFilterOption)){ // 배열을 돌면서 탭 객체를 생성.
			reTabs.push( {
				name: index,
				hidden: false,
				noClose: true,
				noRename: true,
				gridOptions: {
					colModel: colModel,
					dataModel: { data: tabsFilterOption[index] },
					groupModel: {
						dataIndx: groupCols || [],
						showSummary: summaryCols || [],
						grandSummary: true,
						merge: true,
						on: true,
						header: false,
						skipSingleSummary: doSkipSingleSummary
					}
				}
			});
		}

		return reTabs.sort((a, b) => a.name > b.name ? 1 : -1); // 이름으로 오름차순 정렬
	}

	//============================================================
	// 함수명 : resetTabContainer
	// 최초 생성일시 : 2023.10.11
	// 최초 생성자	: Park. T. S.
	// 입력 파라미터 : gridObj - pqGrid 객체
	// 설명 : grid Object가 가지고 있는 탭을 초기화 한다. 탭 초기화(pqgrid 탭은 1개가 무조건 있어야 해서 한 번에 초기화가 안되고 번거롭게 삭제해야함.(히든 포함))
	//============================================================
	async function resetTabContainer(gridObj){
		if(!gridObj){
			return;
		}

		const gridTab = gridObj.Tab();
		const tabModel = gridObj.option('tabModel');

		const startIdxForInit = tabModel.tabs.length-1; // push 전 길이

		tabModel.tabs.push(createDefaultTabObject(gridObj.option('colModel')));

		for(let idx=startIdxForInit; idx<tabModel.tabs.lenght; idx++){
			gridTab.create(idx);
		}

		gridTab.activate(startIdxForInit+1); // 추가된 tab 중 첫번째 활성화(기존 탭들을 지우기 위해서 )

		const tabsLength = gridTab.tabs().length; // remove를 하면 length값이 변하기 때문에 고정 값이 필요함

		for(let tIdx=0; tIdx<tabsLength; tIdx++){
			gridTab.remove(0); // remove를 하게 되면 자동으로 앞으로 당겨짐(빈 탭이 마지막에 추가됐으니 0번째만 순서대로 지움)
		}
	}

		}

                }
            }

        const errorHandler = (customErrorHandlerFunc && 'function' === (typeof customErrorHandlerFunc))

        const headers = function(dataType) {
            if ('JSON' === dataType) {

                return { 'Content-Type': 'application/x-www-form-urlencoded' };

            }
        };

        this.preViewShowPage = function(url, param){	//그리드 뷰의 미리보기 창을 화면에 표시(url : 미리보기 창에 표시할 url)

            var urlParameters = "";
            var tURL = "";

            $("#"+gridId).closest(".grid-container").addClass("fl-block");	//선택된 gridId로 지정된 id 속성을 가진 HTML 요소에서 가장 가까운 grid-container 클래스를 갖는 요소에 fl-block 클래스 추가
            $("#"+gridId).closest(".grid-container").find(".grid-preview").addClass("active");	//.find는 선택된 HTML 요소의 하위 요소 중 grid-preview 클래스를 갖는 요소를 선택해서 active 클래스 추가

            if(url != null){
                if(param != null) urlParameters = Object.entries(param).map(e => e.join('=')).join('&');
                tURL = url+"&"+urlParameters;

                $("#"+gridId).closest(".grid-container").find(".grid-preview").load(tURL);
            }
        }

        this.preViewShow = function(){	// 뷰 페이지 보여주기, 내용 초기화?
            var gridColDom 		= $("#"+gridId).closest(".row").find(".grid-col");
            var preViewColDom 	= $("#"+gridId).closest(".row").find(".preview-col");

            preViewColDom.show();  // preViewColDom 보여주기?

            gridColDom.removeClass();	// gridColDom에 클래스 삭제
            gridColDom.addClass("grid-col col-md-9");	// gridColDom에 클래스 추가

            preViewColDom.removeClass();
            preViewColDom.addClass("preview-col col-md-3");
            preViewColDom.find(".grid-preview").children().remove();	// preViewColDom에 grid-preview 클래스를 가진 요소의 자식 요소 삭제
        }

        this.preViewAppendDom = function(dom){	// 미리보기 창에 새로운 dom 요소 추가
            var preViewColDom 	= $("#"+gridId).closest(".row").find(".preview-col");
            preViewColDom.find(".grid-preview").children().remove();
            preViewColDom.find(".grid-preview").append(dom);	// preViewColDom에 grid-preview 클래스를 가진 요소에 dom 요소 추가
        }

    //============================================================
    //공통 그리드 : grid Column Layout 재정의
    //============================================================
    function setColModel(colModel, gridColMD){
        for(var gridCol of gridColMD){
            for(var idx = 0; idx < colModel.length; idx++){
                var col = colModel[idx]
                if(col.dataIndx === gridCol.dataidx){
                    //hidden 값 추가 부분
                    if(gridCol.phidden !== null){
                        col.hidden = gridCol.phidden;
                    }
                    //Width 값 추가 부분
                    if(gridCol.pqwidth !== null){
                        col.width = gridCol.pqwidth;
                    }
                    //순서 바꾸기
                    var item = colModel.splice(idx, 1);
                    colModel.splice(gridCol.sortnum, 0, item[0]);
                }
            }
        }
        return colModel;
    }

    function exportData(format){	//그리드의 데이터를 다양한 형식으로 내보내기 위한 기능 제공
        var blob = this.exportData({
            format : format
        })
        if(typeof blob === "string"){
            blob = new Blob([blob]);
        }
        saveAs(blob, "logistics_"+ this.origOptions.gprogrid + "." + format );
    }

    //============================================================
    // Grid Find : Data 찾기 이벤트
    //============================================================
    var findRules = [];

    function findHandler() {	//이벤트 핸들러 등록 시 해당 함수가 이미 등록되어 있는지 확인하고 이미 등록되어 있다면 해당 함수를 반환하여 중복 등록 방지
        var $toolbar = this.$top.find('.pq-toolbar-search');
        var value = $toolbar.find(".findValue").val();
        var dataIndx = $toolbar.find(".findColumn").val();

        if (dataIndx === "") {
            var obj = [];
            this.getColModel().map(function(column){
                if(column.dataIndx === 'state' || column.hidden === true || column.dataType === 'integer'){
                    return;
                }else{
                    obj.push({ dataIndx: column.dataIndx, value: value });
                }
            })
            findRules = obj;
        }else {
            findRules = [{ dataIndx: dataIndx, value: value}];
        }
        this.refreshView();
    }

    function findRender(ui) {	// 특정 텍스트가 발견되면 해당 부분을 하이라이트 표시
        if(ui.cellData !== null && ui.cellData !== undefined && ui.cellData !== '' && ui.dataIndx !== 'state' && findRules.length > 0 && ui.column.dataType !== 'integer' && ui.column.dataType !== 'date' && ui.column.type !== 'checkbox' && ui.column.dataType !== 'float' && ui.column.dataType !== 'bool'){
            var valType = typeof ui.cellData;
            var val = ui.cellData.toString();
            var valUpper = val.toUpperCase();
            var col = ui.dataIndx;
            var indx = -1;

            for(var findRule of findRules){
                var txt = findRule.value.toUpperCase();
                indx = valUpper.indexOf(txt);
                if(col === findRule.dataIndx){
                    if (indx >= 0) {
                        var txt1 = val.substring(0, indx);
                        var txt2 = val.substring(indx, indx + txt.length);
                        var txt3 = val.substring(indx + txt.length);
                        return txt1 + "<span style='background:yellow;color:#333;'>" + txt2 + "</span>" + txt3;
                    }
                }
            }
            return valType === "string" ? val : Number(val);
        }
    }

    function getSelectedIdx(focusRules, sel){
        var selectedIdx = 0;
        for(var idx = 0; idx < focusRules.length; idx++){
            if(sel.isSelected({rowIndx: focusRules[idx].rowIndx, colIndx: focusRules[idx].colIndx})){
                selectedIdx =  idx;
            }
        }
        return selectedIdx;
    }

    //============================================================
    // Grid Find : Find Data 포커스 이벤트.
    //============================================================

    function focusHandler() {
    	let toolbar = this.$top.find('.pq-toolbar-search');
    	let value = toolbar.find(".findValue").val();
        if(!value){
            return;
        }

        let datas = this.getData();
        let val = value?.toString();
        let valUpper = val?.toUpperCase();
        let focusRules = [];

        for(let data of datas){
            for(let findRule of findRules){
            	let dataVal = !data[findRule.dataIndx] ? '' : data[findRule.dataIndx].toString();
            	let dataValUpper = dataVal?.toUpperCase();
                if (dataValUpper.indexOf(valUpper) !== -1) {
                    focusRules.push({ rowIndx: data.pq_ri, colIndx: this.getColIndx( { dataIndx: findRule.dataIndx } ) });
                }
            }
        }
        if(focusRules.length){
        	let sel = this.Selection();
        	let selectedIdx = getSelectedIdx(focusRules, sel);
            if(selectedIdx < focusRules.length){
                this.setSelection( {rowIndx: focusRules[selectedIdx !== focusRules.length-1 ? selectedIdx+1 : 0].rowIndx, colIndx: focusRules[selectedIdx !== focusRules.length-1 ? selectedIdx+1 : 0].colIndx} );
            }
        }
    }

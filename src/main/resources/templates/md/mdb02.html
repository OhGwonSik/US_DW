		function initMdb02(){
							//callAjax 비동기
			let mdb02Init = callAjax("data", "GET" , "/md/billingMaster/mdb02/init", {});
			
			// 창고 리스트
			if(mdb02Init.warekeyList){
				$("#mdb02_warekey option").not("[value='']").remove();
				$.each(mdb02Init.warekeyList, function(key, value) {
					$('#mdb02_warekey').append($("<option></option>").attr("value",value.combovl).text(value.combonm)); 
				});
			}
			
			// 화주 리스트
			if(mdb02Init.ownerkyList){
				$.each(mdb02Init.ownerkyList, function(key, value) { 
					$('#mdb02_ownerky').append($("<option></option>").attr("value",value.combovl).text(value.combonm)); 
				});
			}
			
			// 협력사 리스트
			if(mdb02Init.ptnrkeyList){
				$.each(mdb02Init.ptnrkeyList, function(key, value) {
					$('#mdb02_ptnrkey').append($("<option></option>").attr("value",value.combovl).text(value.combonm)); 
				});
			}
			
	        $('#mdb02_ptnrkey').pqSelect({
	            deselect: false
	        });
			
			// 대금구분
			if(mdb02Init.blrpmgbList){
				$.each(mdb02Init.blrpmgbList, function(key, value) {
					$('#mdb02_blrpmgb').append($("<option></option>").attr("value",value.combovl).text(value.combonm)); 
				});
			}
			
			// 계정
			if(mdb02Init.blrcsgbList){
				$("#mdb02_blrcsgb option").not("[value='']").remove();
				$.each(mdb02Init.blrcsgbList, function(key, value) {
					$('#mdb02_blrcsgb').append($("<option></option>").attr("value",value.combovl).text(value.combonm)); 
				});
			}
			
			// sub계정
			if(mdb02Init.blrtkgbList){
				$.each(mdb02Init.blrtkgbList, function(key, value) {
					$('#mdb02_blrtkgb').append($("<option></option>").attr("value",value.combovl).text(value.combonm)); 
				});
			}
			
	        $('#mdb02_ownerky').pqSelect({
	            deselect: false
	        });

			return mdb02Init;
		}

		  const rows = [];
		
		  if (checkList.length > 0) {
		    const rowDelete = window.confirm("[[#{ms.choiceRowDelete}]]");
		
		    if (rowDelete) {
		      for (let i = 0; i < checkList.length; i++) {

		  }

	  async function saveMdb02List(saveData){
			if(!saveData){
				return false;
			}
			const grid = pq.grid('#mdb02_grid');
			grid.showLoading();
			const saveMdb02Response = await fetchUtil('POST', '/md/billingMaster/mdb02/grids/1', saveData);
			if(saveMdb02Response.status===200){
				await mdb02List();
				//alert('[[#{ms.saveSuccess}]]');
			}
			grid.hideLoading();
		}
		
	});
	
  async function mdb02List(){
	  
		// 검색 영역 필수값 확인
		const selectedPoint = $('#mdb02PointDom input:checked').val();

	    if (selectedPoint === 'APP') {
			if( $('#mdb02_blrdate').val()===''){
				alert('[[#{bm.blrdate}]]'); //적용시작년월을 선택해주세요.
				return false;
			}
	        // APP 조회 형태인 경우 사용자가 선택한 값 사용
	        AppDate = $('#mdb02_blrdate').val();
	        blrdate = AppDate.replace(/-/g, '');
	    } else {
	    	blrdate = $('#mdb02_blrdate').val();
	    };
		
		const grid = pq.grid('#mdb02_grid');
		grid.showLoading();

		const data = { warekey : $('#mdb02_warekey').val(), ownerky : $('#mdb02_ownerky').val()
					  ,ptnrkey : $('#mdb02_ptnrkey').val(), blrpmgb : $('#mdb02_blrpmgb').val()
					  ,blrcsgb : $('#mdb02_blrcsgb').val(), blrtkgb : $('#mdb02_blrtkgb').val()
					  ,blrdate  : blrdate
					  ,selectpoint : selectedPoint
					 };

	 	const response = await fetchUtil('GET','/md/billingMaster/mdb02/grids/1', data);
	 	if(response.status===200){
	 		resContent = await response.json();

	 		grid.option( 'dataModel', { data: resContent, recIndx: 'rowkey' } );
	 		grid.refreshDataAndView();
	 	}
			grid.hideLoading();
	};

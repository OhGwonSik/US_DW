<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="fragments-mainContent">
	<div class="tab-contents">
		<div class="search-conditions con-box">
			<div class="setting-grid">
				<label for="mdu04Truntyp" class="setting-grid-title">[[#{md.mtutma.truntyp}]]</label>
				<div class="setting-grid-content">
					<div class="input-wrapper">
						<input type="text" th:placeholder="${#messages.msg('md.mtutma.truntyp')}" id="mdu04Truntyp">
					</div>
				</div>
				<label for="mdu04Trunnam" class="setting-grid-title">[[#{md.mtutma.trunnam}]]</label>
				<div class="setting-grid-content">
					<div class="input-wrapper">
						<input type="text" th:placeholder="${#messages.msg('md.mtutma.trunnam')}" id="mdu04Trunnam">
					</div>
				</div>
			</div>
			<div class="search-btn-group">
				<button type="button" class="btn-search btn-navy btn-green" id="mdu04Search" >
					<img>[[#{bt.search}]]
				</button>
				<button type="button" class="btn-clear btn-white" id="mdu04Reset">
					<img>[[#{bt.reset}]]
				</button>
			</div>
		</div>
		<div class="search-list">
			<div class="list-top">
				<div class="list-title ic-title-mark">
					<span th:text="${gnatitle}"></span>
				</div>
				<div class="edit-btn-wrapper">
					<button class="btn-navy btn-green" id="mdu04Save" >
						<img class="ic-bt-save">[[#{bt.save}]]
					</button>
				</div>
			</div>
			<div class="list-grid-wrapper con-box">
				<div id="mdu04Grid"></div>
			</div>
		</div>
	</div>
	<script>
	/*
	  ------------------------------------------
	  - 페이지명 : mdu04
	  - 최초생성자 : Park. T. S.
	  - 최초생성일시 : 2023.07.21
	  - 설명 : 이동용기
	  ------------------------------------------
	*/
$(function() {
	//----------- 전역변수 ------------//
	const mdu04ComboData = new Object;
	let mdu04InitData;
	//----------- 전역변수 end ------------//

	//============================================================
	//검색 화면 이벤트
	//============================================================
	$('#' + '[[${gprogrid}]]' + 'Search').click(function() {
		getMdu04List();
	});

	$('#' + '[[${gprogrid}]]' + 'Save').click(async function(){
		const grid = pq.grid('#' + '[[${gprogrid}]]' + 'Grid');
		const gridCheck = grid.Checkbox('[[#{common.grid.checkBoxName.state}]]').getCheckedNodes();

		if(gridCheck.length===0) {
			alert('[[#{ms.choiceRowZero}]]');

			return;
		}

		const gridChange = grid.getChanges({all: true});

		//===============================================================
		// 체크된 데이터 필수 값 & 중복 체크
		//===============================================================
		for(let gCheck of gridCheck){
    		const essentialCols = ['truntyp', 'trunnam'];

    		for(let checkCol of essentialCols){
    			if(null === gCheck[checkCol] || undefined === gCheck[checkCol] || '' === gCheck[checkCol]){
	    	  		alert((gCheck.pq_ri+1)+' Row '+'[[#{ms.requiredValue}]]' + '(' + grid.getColModel().find(e => e.dataIndx === checkCol).title + ')');	//필수입력 값을 입력해주세요.
	      			grid.focus({
						rowIndxPage: gCheck.pq_ri,
						colIndx: $('#' + '[[${gprogrid}]]' + 'Grid').pqGrid( 'getColIndx', { dataIndx: checkCol })
					});

	    	  		return false;
    			}
    		}

			for(let gData of grid.getData()){
   				const keyCols = ['truntyp'];

   				if(gCheck.pq_ri !== gData.pq_ri && isKeyDuplication(keyCols, gCheck, gData)){
   					const alertTxt = makeDuplicateRowText(keyCols, grid, gCheck, gData) + ' [[#{ms.DuplicateKeyErr}]]' + '( ' + (gData.pq_ri+1) + '[[#{ms.row}]] & ' + (gCheck.pq_ri+1) + '[[#{ms.row}]] )';

   					alert(alertTxt);
	      			grid.focus({
						rowIndxPage: gCheck.pq_ri,
						colIndx: $('#' + '[[${gprogrid}]]' + 'Grid').pqGrid( 'getColIndx', { dataIndx: 'truntyp' } )
					});

	      			return false;
				}
			}
		}

		//updateList 체크 데이터 정제
		for (let z=0; z<gridChange.updateList.length; z++) {
			if (gridChange.updateList[z]['[[#{common.grid.checkBoxName.state}]]'] !== true) {
				gridChange.updateList.splice(z, 1);
				gridChange.oldList.splice(z, 1);
			}
		}
		//addList 체크 데이터 정제
		gridChange.addList = gridChange.addList.filter(e => e['[[#{common.grid.checkBoxName.state}]]'] === true);

		if(await !confirm('[[#{ms.checksave}]]')) {
			return;
		}

		saveMdu04List(gridChange);
	});

	$('#' + '[[${gprogrid}]]' + 'Reset').click(async function(){
		resetSearchConditions();
		makeEmptyGrid(mdu04Grid);
	});

	//----------- 검색영역 Event end ------------//

	// Grid Column Model
	const mdu04GridCM = [
		{
			title: '',
			dataType: 'bool',
			dataIndx: '[[#{common.grid.checkBoxName.state}]]',
			align: 'center',
			type: 'checkbox',
			sortable: false,
			editor: false,
			cb: {
				all: false,
				header: true
			}
		},
		{
			title: '[[#{common.grid.recIndx}]]',
			dataType: 'string',
			dataIndx: '[[#{common.grid.recIndx}]]',
			editable: false,
			hidden: true
		},
		{
			title: '[[#{md.mtutma.compkey}]]',
			dataType: 'string',
			dataIndx: 'compkey',
			editable: false,
			hidden: true
		},
		{
			title: '[[#{md.mtutma.truntyp}]]',
			dataType: 'string',
			dataIndx: 'truntyp',
			styleHead: {
				'background-color': '[[#{grid.styleHead01}]]'
			},
			validations: [
				{
					type: 'minLen',
					value: 1,
					msg: '[[#{ms.validations.minLenLength(1)}]]'
				},
				{
					type: 'maxLen',
					value: 10,
					msg: '[[#{ms.validations.maxLenLength(10)}]]'
				}
			],
	        editable: ui => !ui.rowData['[[#{common.grid.recIndx}]]']
		},
		{
			title: '[[#{md.mtutma.trunnam}]]',
			dataType: 'string',
			dataIndx: 'trunnam',
			styleHead: {
				'background-color': '[[#{grid.styleHead01}]]'
			},
			validations: [
				{
					type: 'minLen',
					value: 0,
					warn: true,
					msg: '[[#{ms.validations.minLenLength(0)}]]'
				},
				{
					type: 'maxLen',
					value: 20,
					msg: '[[#{ms.validations.maxLenLength(20)}]]'
				}
			]
		},
		{
			title: '[[#{md.mtutma.truseyn}]]',
			dataIndx: 'truseyn',
			align: 'center',
			styleHead: {
				'background-color': '[[#{grid.styleHead02}]]'
			},
			type: 'checkbox',
			editor: false,
			cb: {
				all: false,
				header: true,
				check: 'Y',
				uncheck: 'N'
			}
		},
		{
			title: '[[#{md.mtutma.tutleng}]]',
			dataType: 'integer',
			dataIndx: 'tutleng',
			format: '#,###', //길이
			styleHead: {
				'background-color': '[[#{grid.styleHead02}]]'
			},
			validations: [
				{
					type: 'gte',
					value: 0,
					warn: true,
					msg: '[[#{ms.validations.minLenLength(0)}]]'
				},
				{
					type: 'lte',
					value: 1000000000,
					warn: true,
					msg: '[[#{ms.validations.maxLenLength(9)}]]'
				},
				{
					type: 'regexp',
					value: regNum9Digit,
					warn: true,
					msg: '[[#{ms.validations.maxLenLength(9)}]]'
				}
			]
		},
		{
			title: '[[#{md.mtutma.tutwidh}]]',
			dataType: 'integer',
			dataIndx: 'tutwidh',
			format: '#,###', //폭
			styleHead: {
				'background-color': '[[#{grid.styleHead02}]]'
			},
			validations: [
				{
					type: 'gte',
					value: 0,
					warn: true,
					msg: '[[#{ms.validations.minLenLength(0)}]]'
				},
				{
					type: 'lte',
					value: 1000000000,
					warn: true,
					msg: '[[#{ms.validations.maxLenLength(9)}]]'
				},
				{
					type: 'regexp',
					value: regNum9Digit,
					warn: true,
					msg: '[[#{ms.validations.maxLenLength(9)}]]'
				}
			]
		},
		{
			title: '[[#{md.mtutma.tutheig}]]',
			dataType: 'integer',
			dataIndx: 'tutheig',
			format: '#,###', //높이
			styleHead: {
				'background-color': '[[#{grid.styleHead02}]]'
			},
			validations: [
				{
					type: 'gte',
					value: 0,
					warn: true,
					msg: '[[#{ms.validations.minLenLength(0)}]]'
				},
				{
					type: 'lte',
					value: 1000000000,
					warn: true,
					msg: '[[#{ms.validations.maxLenLength(9)}]]'
				},
				{
					type: 'regexp',
					value: regNum9Digit,
					warn: true,
					msg: '[[#{ms.validations.maxLenLength(9)}]]'
				}
			]
		},
		{
			title: '[[#{md.mtutma.tutcubi}]]',
			dataType: 'integer',
			dataIndx: 'tutcubi',
			format: '#,###', //입방미터
			styleHead: {
				'background-color': '[[#{grid.styleHead02}]]'
			},
			validations: [
				{
					type: 'gte',
					value: 0,
					warn: true,
					msg: '[[#{ms.validations.minLenLength(1)}]]'
				},
				{
					type: 'lte',
					value: 1000000000,
					warn: true,
					msg: '[[#{ms.validations.maxLenLength(9)}]]'
				},
				{
					type: 'regexp',
					value: regNum9Digit,
					warn: true,
					msg: '[[#{ms.validations.maxLenLength(9)}]]'
				}
			]
		},
		{
			title: '[[#{md.mtutma.tutweig}]]',
			dataType: 'integer',
			dataIndx: 'tutweig',
			format: '#,###', //중량
			styleHead: {
				'background-color': '[[#{grid.styleHead02}]]'
			},
			validations: [
				{
					type: 'gte',
					value: 0,
					warn: true,
					msg: '[[#{ms.validations.minLenLength(1)}]]'
				},
				{
					type: 'lte',
					value: 1000000000,
					warn: true,
					msg: '[[#{ms.validations.maxLenLength(9)}]]'
				},
				{
					type: 'regexp',
					value: regNum9Digit,
					warn: true,
					msg: '[[#{ms.validations.maxLenLength(9)}]]'
				}
			]
		},
		{
			title: '[[#{md.mtutma.uomekey}]]',
			dataType: 'string',
			dataIndx: 'uomekey',
			styleHead: {
				'background-color': '[[#{grid.styleHead02}]]'
			},
			editor: {
				type: 'select',
				init: ui => {
					ui.$cell.find('select').pqSelect({
						search: false,
						singlePlaceholder: '',
						width: getSelectBoxWidthCondition(ui)
					});
					ui.$cell.find('select').pqSelect('open');
				},
				options: ui => mdu04ComboData[ui.dataIndx],
				prepend: { '' : ' ' }
			},
			render: ui => {
				const option = mdu04ComboData[ui.dataIndx].find(obj => obj[ui.cellData]);

				return option ? option[ui.cellData] : ui.cellData;
			}
		},
		{
			title: '[[#{md.mtutma.credate}]]',
			dataType: 'string',
			dataIndx: 'credate',
			editable: false
		},
		{
			title: '[[#{md.mtutma.cretime}]]',
			dataType: 'string',
			dataIndx: 'cretime',
			editable: false
		},
		{
			title: '[[#{md.mtutma.creuser}]]',
			dataType: 'string',
			dataIndx: 'creuser',
			editable: false
		},
		{
			title: '[[#{md.mtutma.lmodate}]]',
			dataType: 'string',
			dataIndx: 'lmodate',
			editable: false
		},
		{
			title: '[[#{md.mtutma.lmotime}]]',
			dataType: 'string',
			dataIndx: 'lmotime',
			editable: false
		},
		{
			title: '[[#{md.mtutma.lmouser}]]',
			dataType: 'string',
			dataIndx: 'lmouser',
			editable: false
		}
	];

	// Grid Object 및 기초 세팅
	const mdu04Grid = new GridUtil(mdu04GridCM, '[[${gprogrid}]]', '[[${gprogrid}]]' + 'Grid');

	// Grid 검색 세팅
	mdu04Grid.setFind();

	// Grid 초기화 세팅
	mdu04Grid.setReset();

	// Grid 데이터 추가 이벤트
	mdu04Grid.setAdd(function(evt, ui) {
		const rowIndx = this.addRow({
			rowData: {
				state: true,
				compkey: '[[${userattr.compkey}]]',
				truseyn: 'Y',
				uomekey: '[[#{md.mdu04.uomekey.default}]]'
			},
			checkEditable: false
		});

		this.goToPage({ rowIndx: rowIndx });
		this.focus({
			rowIndxPage: rowIndx,
			colIndx: $('#' + '[[${gprogrid}]]' + 'Grid').pqGrid( 'getColIndx', { dataIndx: rowIndx} )
		});
	});

	// Grid 생성시 이벤트
	mdu04Grid.setCreate(async function(evt, ui) {
		const url = '[[#{common.url.master}]]' + '[[#{common.url.units}]]' + '/' + '[[${gprogrid}]]' + '[[#{common.url.init}]]';
		const response = await fetchUtil('GET', url);
		const responseObj = await response.json();

		mdu04InitData = responseObj.item;

		for(let key of Object.keys(mdu04InitData)){
			const gData = mdu04InitData[key];
			const options = gData.map(obj => {
	        	let rObj = {};

	        	rObj[obj['combovl']] = obj['combonm'];

	        	return rObj;
			});

			mdu04ComboData[key] = options;
		}
	});

	// Grid 데이터 변경 이벤트
	mdu04Grid.setChange(async function(evt, ui) {
		if ('edit' === ui.source || 'paste' === ui.source) {
			const updateRowList = [];

			await ui.updateList.forEach(updateData => {
				let newRow = {state : true};

				if (updateData.newRow.hasOwnProperty('truntyp') && updateData.oldRow.hasOwnProperty('truntyp')) {
					newRow['truntyp'] = updateData.newRow['truntyp']?.toUpperCase();
				}

    			if(updateData.newRow.hasOwnProperty('uomekey') && updateData.oldRow.hasOwnProperty('uomekey')){
    				const option = mdu04ComboData['uomekey'].find(obj => obj[updateData.rowData['uomekey']]);

				    newRow['uomekey'] = option ? updateData.rowData['uomekey'] : null;
    			}

    			updateRowList.push({
					rowIndx: updateData.rowIndx,
					newRow : newRow
				});
			});
			await this.updateRow({
				rowList: updateRowList,
				checkEditable: false
			});
		} else if ('checkbox' === ui.source) {
			const updateRowList = [];

			await ui.updateList.forEach(updateData => {
				let newRow = {state : true};

				if (updateData.newRow.hasOwnProperty('truseyn')) {
	    			updateRowList.push({
						rowIndx: updateData.rowIndx,
						newRow: newRow
					});
				}
			});
			await this.updateRow({
				rowList: updateRowList,
				checkEditable: false
			});
		}

		if ('paste' === ui.source) {
			await ui.addList.forEach(addData =>
    			addData.newRow = {
   					state: true,
   					compkey: '[[${userattr.compkey}]]',
   					truseyn: addData.newRow['truseyn'] ? addData.newRow['truseyn'] : 'Y'
   			});
			await this.updateRow({
				rowList: ui.addList,
				checkEditable: false
			});
		}
	});

	// Grid 객체 생성
	mdu04Grid.open();

	// 그리드 저장 함수
	async function saveMdu04List(saveData) {
		if (!saveData) {
			return false;
		}

		const grid = pq.grid('#' + '[[${gprogrid}]]' + 'Grid');
		const url = '[[#{common.url.master}]]' + '[[#{common.url.units}]]' + '/' + '[[${gprogrid}]]' + '[[#{common.url.grids}]]' + '/1';
		grid.showLoading();

		const saveMdu04Response = await fetchUtil('POST', url, saveData);

		if(saveMdu04Response.status === 200){
			await getMdu04List();
		}

		grid.hideLoading();
	}

	// 그리드 조회 함수
	async function getMdu04List() {
		const grid = pq.grid('#' + '[[${gprogrid}]]' + 'Grid');

		grid.showLoading();

		const data = {
			truntyp : $('#' + '[[${gprogrid}]]' + 'Truntyp').val(),
			trunnam : $('#' + '[[${gprogrid}]]' + 'Trunnam').val()
		};

		const url = '[[#{common.url.master}]]' + '[[#{common.url.units}]]' + '/' + '[[${gprogrid}]]' + '[[#{common.url.grids}]]' + '/1';
		const response = await fetchUtil('GET', url, data);

		if(response.status===200){
			const resContent = await response.json();

			grid.option( 'dataModel', {
				data: resContent,
				recIndx: '[[#{common.grid.recIndx}]]'
			});
			grid.refreshDataAndView();
		}

		grid.hideLoading();
	}
});
</script>
</div>
</html>

	});

	$('#' + '[[${gprogrid}]]' + 'Save').click(function(){
		const grid = pq.grid('#' + '[[${gprogrid}]]' + 'Grid')
		const gridCheck = grid.Checkbox('[[#{common.grid.checkBoxName.state}]]').getCheckedNodes();

		if(gridCheck.length === 0){
			alert('[[#{ms.choiceRowZero}]]');

			return;
		}

		const gridChange = grid.getChanges({all: true});

		//===============================================================
		// 체크된 데이터 필수 값 & 중복 체크
		//===============================================================
		for(let gCheck of gridCheck){
    		const essentialCols = ['ptnrkey', 'destkey', 'denamlc'];

    		for(let checkCol of essentialCols){
    			if(null === gCheck[checkCol] || undefined === gCheck[checkCol] || '' === gCheck[checkCol]){
	    	  		alert((gCheck.pq_ri+1)+' Row '+'[[#{ms.requiredValue}]]' + '(' + grid.getColModel().find(e => e.dataIndx === checkCol).title + ')');	//필수입력 값을 입력해주세요.
	      			grid.focus({
	      				rowIndxPage: gCheck.pq_ri,
	      				colIndx: $('#' + '[[${gprogrid}]]' + 'Grid').pqGrid( 'getColIndx', { dataIndx: checkCol} )
	      			});

	    	  		return false;
    			}
    		}
			for(let gData of grid.getData()){
   				const keyCols = ['ptnrkey', 'destkey'];

   				if(gCheck.pq_ri !== gData.pq_ri && isKeyDuplication(keyCols, gCheck, gData)){
   					const alertTxt = makeDuplicateRowText(keyCols, grid, gCheck, gData) + ' [[#{ms.DuplicateKeyErr}]]' + '( ' + (gData.pq_ri+1) + '[[#{ms.row}]] & ' + (gCheck.pq_ri+1) + '[[#{ms.row}]] )';

   					alert(alertTxt);
	      			grid.focus({
	      				rowIndxPage: gCheck.pq_ri,
	      				colIndx: $('#' + '[[${gprogrid}]]' + 'Grid').pqGrid( 'getColIndx', { dataIndx: 'ptnrkey' } )
	      			});

					return false;
				}
			}
		}

		//updateList 체크 데이터 정제
		for(let z=0; z<gridChange.updateList.length; z++){
			if(gridChange.updateList[z]['[[#{common.grid.checkBoxName.state}]]'] !== true){
				gridChange.updateList.splice(z, 1);
				gridChange.oldList.splice(z, 1);
			}
		}
		//addList 체크 데이터 정제
		gridChange.addList = gridChange.addList.filter(e => e['[[#{common.grid.checkBoxName.state}]]'] === true);

		if(!confirm('[[#{ms.checksave}]]')){
			return;
		}

		saveMdp30List(gridChange);
	});

			dataIndx: 'cusperm',
			styleHead: { 'background-color': '[[#{grid.styleHead02}]]' },
			validations: [

			]
		},
		{
			title: '[[#{md.mwarma.credate}]]',
			dataType: 'string',
			dataIndx: 'credate',
			editable: false
		},
		{

			dataType: 'string',
			dataIndx: 'cretime',
			editable: false
		},
		{
			title: '[[#{md.mwarma.creuser}]]',

			dataIndx: 'creuser',
			editable: false
		},
		{

			dataIndx: 'lmodate',

		},
		{

			dataIndx: 'lmotime',

		},
		{
			title: '[[#{md.mwarma.lmouser}]]',
			dataType: 'string',
			dataIndx: 'lmouser',
			editable: false
		}
	];

	// Grid Object 및 기초 세팅
	const mdp30Grid = new GridUtil(mdp30GridCM, '[[${gprogrid}]]', '[[${gprogrid}]]' + 'Grid');

	// Grid 검색 세팅
	mdp30Grid.setFind();

	// Grid 초기화 세팅
	mdp30Grid.setReset();

	// Grid 데이터 추가 이벤트
	mdp30Grid.setAdd(function(evt, ui){
		const rowData = {
			state: true,
			compkey: '[[${userattr.compkey}]]',
			deuseyn: 'Y',
			sundavl: 'N',
			mondavl: 'N',
			tuedavl: 'N',
			weddavl: 'N',
			thudavl: 'N',
			fridavl: 'N',
			satdavl: 'N',
			nathval: 'N',
		};
		const rowIndx = this.addRow({
			rowData: rowData,
			checkEditable: false
		});

		this.goToPage({ rowIndx : rowIndx });
		this.focus({
			rowIndxPage: rowIndx,
			colIndx: $('#' + '[[${gprogrid}]]' + 'Grid').pqGrid( 'getColIndx', { dataIndx: rowIndx} )
		});
	});

	// Grid Cell 더블클릭 이벤트
	mdp30Grid.setCellDblClick(function (evt, ui){
		//도착지 우편번호 클릭시
		if('deposcd' === ui.dataIndx){
			//카카오 우편번호 api 호출(2023.11.06 최강호)
			let zoneCode;

			new daum.Postcode({
				//검색결과 선택시 이벤트
				oncomplete : data => zoneCode = data.zonecode,
				onclose : state => {
					if('COMPLETE_CLOSE' === state){
						mdp30Grid.getGrid().updateRow({
			 				rowIndx: ui.rowData.pq_ri,
			 				newRow: {
			 					state: true,
			 					deposcd: zoneCode
			 				},
			 				checkEditable: false
			 			});
					}
				}
			}).open({
				popupTitle: 'postcode',
				popupKey: '[[${gprogrid}]]'+'PostcodePopup'
			});
		}
	});

	// Grid 생성시 이벤트
	mdp30Grid.setCreate(async function (evt, ui) {
		const response = await initMdp30();

		mdp30InitData = response.item;

		for(let key of Object.keys(mdp30InitData)){
			const gData = mdp30InitData[key];
			const options = gData.map(obj => {
	        	let rObj = {};

	        	rObj[obj['combovl']] = obj['combonm'] + '(' + obj['combovl'] + ')';

	        	return rObj;
			});

			mdp30ComboData[key] = options;
		}
	});

	// Grid 데이터 변경 이벤트
	mdp30Grid.setChange(async function(evt, ui){
		if('edit' === ui.source || 'paste' === ui.source){
    		const updateRowList = [];

    		await ui.updateList.forEach(async updateData => {
    			let newRow = {state : true};

    			if(updateData.newRow.hasOwnProperty('destkey') && updateData.oldRow.hasOwnProperty('destkey')){
    				newRow['destkey'] = updateData.newRow['destkey']?.toUpperCase();
    			}

    			if(updateData.newRow.hasOwnProperty('ptnrkey') && updateData.oldRow.hasOwnProperty('ptnrkey')){
    				const option = mdp30ComboData['ptnrkey'].find( obj => obj[updateData.rowData['ptnrkey']]);

    				newRow['ptnrkey'] = option ? updateData.rowData['ptnrkey'] : null;
    			}

    			const vhctncdCols = ['unavat1', 'unavat2', 'unavat3'];

    			await vhctncdCols.forEach(cols => {
        			if(updateData.newRow.hasOwnProperty(cols) && updateData.oldRow.hasOwnProperty(cols)){
        				const option = mdp30ComboData['vhctncd'].find(obj =>obj[updateData.rowData[cols]]);

    				    newRow[cols] = option ? updateData.rowData[cols] : null;
        			}
    			});

    			if(updateData.newRow.hasOwnProperty('ptnrkey') && updateData.oldRow.hasOwnProperty('ptnrkey')){
    				const option = mdp30ComboData['ptnrkey'].find( obj => obj[updateData.rowData['ptnrkey']]);

    				newRow['ptnrkey'] = option ? updateData.rowData['ptnrkey'] : null;
    			}

    			updateRowList.push({
    				rowIndx: updateData.rowIndx,
    				newRow: newRow
    			});
    		});
			await this.updateRow({
				rowList: updateRowList,
				checkEditable: false
			});
    	} else if('checkbox' === ui.source){
    		const updateRowList = [];

    		for(let updateData of ui.updateList){
    			const checkboxCols = ['deuseyn', 'sundavl', 'mondavl', 'tuedavl', 'weddavl', 'thudavl', 'fridavl', 'satdavl', 'nathval'];
    			let newRow = {state : true};

    			for(let checkboxCol of checkboxCols){
    				if(updateData.newRow.hasOwnProperty(checkboxCol)){
            			updateRowList.push({
            				rowIndx: updateData.rowIndx,
            				newRow: newRow
            			});
           			}
    			}
   			}

			await this.updateRow({
				rowList: updateRowList,
				checkEditable: false
			});
    	}

		if('paste' === ui.source){
			await ui.addList.forEach(addData =>
    			addData.newRow = {
       				state: true,
       				compkey: '[[${userattr.compkey}]]',
       				deuseyn: addData?.newRow?.deuseyn || 'Y',
					sundavl: addData?.newRow?.sundavl || 'N',
					mondavl: addData?.newRow?.mondavl || 'N',
					tuedavl: addData?.newRow?.tuedavl || 'N',
					weddavl: addData?.newRow?.weddavl || 'N',
					thudavl: addData?.newRow?.thudavl || 'N',
					fridavl: addData?.newRow?.fridavl || 'N',
					satdavl: addData?.newRow?.satdavl || 'N',
					nathval: addData?.newRow?.nathval || 'N',
    		});
			await this.updateRow({
				rowList: ui.addList,
				checkEditable: false
			});
    	}
	});

	// Grid 객체 생성
	mdp30Grid.open();

	// 페이지 초기화 함수
	async function initMdp30(){
		const url = '[[#{common.url.master}]]' + '[[#{common.url.partner}]]' + '/' + '[[${gprogrid}]]' + '[[#{common.url.init}]]';
		const response = await fetchUtil('GET', url);

		return response.json();
	}

	// 그리드 조회 함수
	async function getMdp30List(){
		const grid = pq.grid('#' + '[[${gprogrid}]]' + 'Grid');
		const data = {
				ptnamlc : $('#' + '[[${gprogrid}]]' + 'Ptnamlc').val().toUpperCase(),
				denamlc : $('#' + '[[${gprogrid}]]' + 'Denamlc').val()
		};

		grid.showLoading();

		const url = '[[#{common.url.master}]]' + '[[#{common.url.partner}]]' + '/' + '[[${gprogrid}]]' + '[[#{common.url.grids}]]' + '/1';
		const response = await fetchUtil('GET', url, data);

		if(response.status===200){
			const resContent = await response.json();

			grid.option( 'dataModel', {
				data: resContent,
				recIndx: '[[#{common.grid.recIndx}]]'
			});
			grid.refreshDataAndView();
		}

		grid.hideLoading();
	}

	// 그리드 저장 함수
	async function saveMdp30List(saveData){
		if(!saveData){
			return false;
		}

		const grid = pq.grid('#' + '[[${gprogrid}]]' + 'Grid');

		grid.showLoading();

		const url = '[[#{common.url.master}]]' + '[[#{common.url.partner}]]' + '/' + '[[${gprogrid}]]' + '[[#{common.url.grids}]]' + '/1';
		const saveMdp30Response = await fetchUtil('POST', url, saveData);

		if(saveMdp30Response.status === 200){
			await getMdp30List();
		}

		grid.hideLoading();
	}
});
</script>
